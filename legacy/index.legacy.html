      </div>
    </div>`:''}

    <!-- Desglose por categoría -->
    <h5 style="font-size:14px;font-weight:700;margin:10px 0 6px">Detalle por categoría</h5>
    <table class="tbl" style="margin:0">
      <thead><tr><th>Categoría</th><th class="text-right">Productos</th><th class="text-right">Unidades</th><th class="text-right">Valor a costo</th><th class="text-right">Valor a venta</th><th class="text-right">Utilidad potencial</th></tr></thead>
      <tbody>
        ${Object.entries(r.invPorCategoria).sort((a,b)=>b[1].valorCosto-a[1].valorCosto).map(([cat,d])=>{
          const uti=d.valorVenta-d.valorCosto;
          return `<tr>
            <td><b>${esc(cat)}</b></td>
            <td class="text-right">${d.nSKUs}</td>
            <td class="text-right">${fmt(d.unidades)}</td>
            <td class="text-right"><b style="color:#8b5cf6">${money(d.valorCosto)}</b></td>
            <td class="text-right"><b style="color:var(--primary)">${money(d.valorVenta)}</b></td>
            <td class="text-right"><b style="color:#10b981">${money(uti)}</b></td>
          </tr>`;
        }).join('')}
        <tr style="background:var(--surface-2);font-weight:700">
          <td><b>TOTAL INVENTARIO</b></td>
          <td class="text-right">${r.invSKUs}</td>
          <td class="text-right">${fmt(r.invUnidades)}</td>
          <td class="text-right"><b style="color:#8b5cf6;font-size:15px">${money(r.invValorCosto)}</b></td>
          <td class="text-right"><b style="color:var(--primary);font-size:15px">${money(r.invValorVenta)}</b></td>
          <td class="text-right"><b style="color:#10b981;font-size:15px">${money(r.invUtilidadPotencial)}</b></td>
        </tr>
      </tbody>
    </table>
  </div>`:''}

  <!-- Desglose de gastos por categoría -->
  <div class="card p-4 mt-4" style="background:var(--surface-2)">
    <h4 class="brandfont mb-2" style="font-size:18px">💸 Gastos por categoría</h4>
    ${cats.length?`<table class="tbl"><tbody>
      ${cats.map(([k,v])=>`<tr>
        <td>${GASTO_ICONS[k]||'📌'} <b>${esc(k)}</b></td>
        <td style="width:120px;color:var(--muted)">${r.gastos>0?(v/r.gastos*100).toFixed(0):0}%</td>
        <td style="text-align:right"><b style="color:var(--danger)">${money(v)}</b></td>
      </tr>`).join('')}
      <tr><td colspan="2"><b>Total gastos</b></td><td style="text-align:right"><b style="color:var(--danger);font-size:18px">${money(r.gastos)}</b></td></tr>
    </tbody></table>`:`<div class="text-center p-4" style="color:var(--muted)">No hay gastos en este periodo. <button class="chip" onclick="go('gastos')">➕ Registrar gastos</button></div>`}
  </div>`;
}
function repFila(label,valor,color,bold,grande){
  const neg=valor<0;
  return `<div class="flex justify-between" style="padding:5px 0;${grande?'font-size:21px':bold?'font-size:17px':'font-size:16px'}">
    <span style="${bold?'font-weight:800':'font-weight:600'};color:${bold?color:'var(--text-soft)'}">${esc(label)}</span>
    <b style="color:${color};${bold?'font-weight:800':''}">${neg?'-':''}${money(Math.abs(valor))}</b></div>`;
}
function pintarGraficos(){
  destroyCharts();
  if(typeof Chart==='undefined'){toast('Gráficos no disponibles (sin internet para CDN)','warn');return;}
  const css=getComputedStyle(document.documentElement);
  const cP=css.getPropertyValue('--primary').trim(),cA=css.getPropertyValue('--accent').trim(),cText=css.getPropertyValue('--text-soft').trim(),cGrid=css.getPropertyValue('--border').trim();
  Chart.defaults.color=cText;Chart.defaults.font.family="'Plus Jakarta Sans',sans-serif";
  // 14 días
  const labels=[],datos=[];
  for(let i=13;i>=0;i--){const dt=new Date();dt.setDate(dt.getDate()-i);const k=dt.toISOString().slice(0,10);
    labels.push(dt.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit'}));
    datos.push(rangoTotales(k,k).total);}
  charts.v=new Chart($('#chVentas'),{type:'line',data:{labels,datasets:[{label:'Ventas',data:datos,borderColor:cP,backgroundColor:cP+'33',fill:true,tension:.35,borderWidth:3,pointRadius:3}]},
    options:{plugins:{legend:{display:false}},scales:{y:{grid:{color:cGrid},ticks:{callback:v=>money(v)}},x:{grid:{display:false}}}}});
  // métodos de pago
  const met={};DB.facturas.forEach(f=>{const m=(f.metodo||'').split(' ')[0]||'Otro';met[m]=(met[m]||0)+f.total;});
  const mk=Object.keys(met);
  charts.p=new Chart($('#chPago'),{type:'doughnut',data:{labels:mk.length?mk:['Sin datos'],datasets:[{data:mk.length?Object.values(met):[1],backgroundColor:[cP,cA,'#2563eb','#a855f7','#ef4444','#10b981']}]},options:{plugins:{legend:{position:'bottom'}}}});
  // top productos
  const cnt={};DB.facturas.forEach(f=>f.items.forEach(i=>{cnt[i.nombre]=(cnt[i.nombre]||0)+i.cantidad;}));
  const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,7);
  charts.t=new Chart($('#chTop'),{type:'bar',data:{labels:top.map(t=>t[0].length>22?t[0].slice(0,22)+'…':t[0]),datasets:[{label:'Unidades',data:top.map(t=>t[1]),backgroundColor:cA,borderRadius:8}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:cGrid}},y:{grid:{display:false}}}}});
  // clientes frecuentes
  const cli={};DB.facturas.forEach(f=>{const k=f.clienteNombre||'Cliente General';if(!cli[k])cli[k]={n:0,t:0};cli[k].n++;cli[k].t+=f.total;});
  const tc=Object.entries(cli).sort((a,b)=>b[1].t-a[1].t).slice(0,6);
  $('#topClientes').innerHTML=tc.length?tc.map(([n,v],i)=>`<div class="flex items-center justify-between p-2" style="border-bottom:1px solid var(--border)">
    <div><b>${i+1}. ${esc(n)}</b><br><span style="color:var(--muted);font-size:13px">${v.n} compra(s)</span></div><b style="color:var(--primary)">${money(v.t)}</b></div>`).join('')
    :'<div class="text-center p-6" style="color:var(--muted)">Sin datos todavía</div>';
}

/* ---- Exportar reporte por rango a PDF (hoja carta) ---- */
function exportReportePDF(){
  if(!repRango){toast('Elige un rango de fechas','warn');return;}
  if(typeof window.jspdf==='undefined'){toast('PDF no disponible (sin internet para CDN)','err');return;}
  const r=reporteRango(repRango.desde,repRango.hasta);
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'letter'});
    const W=216, M=16; let y=18;
    const m=DB.config.moneda||'$';
    const mny=v=>m+Math.round(num(v)).toLocaleString('es-CO');
    const line=()=>{doc.setDrawColor(200);doc.line(M,y,W-M,y);y+=5;};
    const fila=(l,v,bold,size)=>{doc.setFont('helvetica',bold?'bold':'normal');doc.setFontSize(size||11);
      doc.text(String(l),M,y);doc.text(mny(v),W-M,y,{align:'right'});y+=size?size*0.5+2:6;};
    // Encabezado
    doc.setFont('helvetica','bold');doc.setFontSize(17);doc.text(DB.config.negocio||'PetPOS',M,y);y+=7;
    doc.setFont('helvetica','normal');doc.setFontSize(10);
    if(DB.config.direccion){doc.text(DB.config.direccion+(DB.config.ciudad?' · '+DB.config.ciudad:''),M,y);y+=5;}
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.text('Reporte financiero por fechas',M,y);y+=6;
    doc.setFont('helvetica','normal');doc.setFontSize(10);
    doc.text('Periodo: '+fechaBonita(r.desde)+'  al  '+fechaBonita(r.hasta),M,y);y+=4;
    doc.text(r.nFac+' venta(s) · '+r.nCompras+' compra(s) · '+r.nGastos+' gasto(s)',M,y);y+=6;
    line();
    // Utilidad por margen
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.text('UTILIDAD POR MARGEN (rentabilidad)',M,y);y+=7;
    fila('Ventas del periodo',r.ventas);
    fila('(-) Costo de lo vendido',-r.costoVenta);
    line();
    fila('= Utilidad bruta',r.utilidadBruta,true);
    fila('(-) Gastos operativos',-r.gastos);
    line();
    doc.setTextColor(r.utilidadNeta>=0?21:200, r.utilidadNeta>=0?160:38, r.utilidadNeta>=0?74:38);
    fila('= UTILIDAD NETA (real)',r.utilidadNeta,true,14);
    doc.setTextColor(40);
    y+=4; line();
    // Flujo de caja
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.text('FLUJO DE CAJA (dinero del periodo)',M,y);y+=7;
    fila('Ventas (entró)',r.ventas);
    fila('(-) Compras de mercancía',-r.compras);
    fila('(-) Gastos pagados',-r.gastos);
    if(r.abonosDelPeriodo>0) fila('(-) Abonos a proveedores',-r.abonosDelPeriodo);
    line();
    doc.setTextColor(r.flujoCaja>=0?21:200, r.flujoCaja>=0?160:38, r.flujoCaja>=0?74:38);
    fila('= FLUJO DE CAJA',r.flujoCaja,true,14);
    doc.setTextColor(40);
    y+=4; line();

    // CUENTAS POR PAGAR
    if(r.cxpTotal>0){
      // Salto de página si queda poco espacio
      if(y>220){doc.addPage();y=18;}
      doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(245,158,11);
      doc.text('CUENTAS POR PAGAR A PROVEEDORES',M,y);y+=7;
      doc.setTextColor(40);
      doc.setFont('helvetica','normal');doc.setFontSize(9);
      doc.text('Foto actual de la deuda (independiente del periodo)',M,y);y+=5;
      fila('Deuda total',r.cxpTotal,true);
      if(r.cxpVencido>0){
        doc.setTextColor(220,38,38);
        fila('  > Vencido',r.cxpVencido);
        doc.setTextColor(40);
      }
      if(r.cxpPorVencer>0) fila('  > Por vencer',r.cxpPorVencer);
      if(r.cxpSinFecha>0)  fila('  > Sin fecha',r.cxpSinFecha);
      doc.setFontSize(9);doc.setTextColor(100);
      doc.text(r.nFacturasPorPagar+' factura(s) pendiente(s)',M,y);y+=6;
      doc.setTextColor(40);

      if(r.creditoNuevoPeriodo>0 || r.abonosDelPeriodo>0){
        doc.setFont('helvetica','bold');doc.setFontSize(10);
        doc.text('Movimientos del periodo:',M,y);y+=5;
        doc.setFont('helvetica','normal');
        if(r.creditoNuevoPeriodo>0) fila('  Nuevos créditos ('+r.nCreditosNuevos+')',r.creditoNuevoPeriodo);
        if(r.abonosDelPeriodo>0)    fila('  Abonos realizados ('+r.nAbonos+')',-r.abonosDelPeriodo);
      }

      // Desglose por proveedor
      const provs=Object.entries(r.cxpPorProveedor).sort((a,b)=>b[1].saldo-a[1].saldo);
      if(provs.length){
        if(y>240){doc.addPage();y=18;}
        doc.setFont('helvetica','bold');doc.setFontSize(10);
        doc.text('Detalle por proveedor:',M,y);y+=5;
        doc.setFont('helvetica','normal');doc.setFontSize(9);
        provs.forEach(([prov,d])=>{
          if(y>270){doc.addPage();y=18;}
          const txt=prov+(d.vencidas>0?' (⚠'+d.vencidas+' venc.)':'')+' · '+d.nFacturas+' fact.';
          doc.text(txt.length>60?txt.slice(0,60)+'…':txt,M,y);
          doc.text(mny(d.saldo),W-M,y,{align:'right'});
          y+=5;
        });
      }
      line();fila('TOTAL DEUDA',r.cxpTotal,true,12);
      y+=4; line();
    }

    // INVENTARIO ACTUAL
    if(r.invValorCosto>0){
      if(y>220){doc.addPage();y=18;}
      doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(139,92,246);
      doc.text('VALOR DEL INVENTARIO ACTUAL',M,y);y+=7;
      doc.setTextColor(40);
      doc.setFont('helvetica','normal');doc.setFontSize(9);
      doc.text('Foto actual de tu mercancía en bodega',M,y);y+=5;
      fila('Valor a costo (lo que pagaste)',r.invValorCosto,true);
      fila('Valor a precio de venta',r.invValorVenta);
      doc.setTextColor(16,185,129);
      fila('Utilidad potencial',r.invUtilidadPotencial,true);
      doc.setTextColor(40);
      doc.setFontSize(9);doc.setTextColor(100);
      doc.text('Margen: '+r.invMargenPct.toFixed(1)+'% sobre costo · '+fmt(r.invUnidades)+' uds en '+r.invSKUs+' producto(s)',M,y);y+=5;
      if(r.invBajoStock>0){doc.text('⚠ '+r.invBajoStock+' producto(s) con stock bajo',M,y);y+=4;}
      if(r.invSinStock>0){doc.text('🚫 '+r.invSinStock+' producto(s) agotados',M,y);y+=4;}
      doc.setTextColor(40);y+=2;

      // Desglose por categoría
      const cats=Object.entries(r.invPorCategoria).sort((a,b)=>b[1].valorCosto-a[1].valorCosto);
      if(cats.length){
        if(y>240){doc.addPage();y=18;}
        doc.setFont('helvetica','bold');doc.setFontSize(10);
        doc.text('Por categoría:',M,y);y+=5;
        doc.setFont('helvetica','normal');doc.setFontSize(9);
        cats.forEach(([cat,d])=>{
          if(y>270){doc.addPage();y=18;}
          const txt=cat+' · '+d.nSKUs+' prod · '+fmt(d.unidades)+' uds';
          doc.text(txt.length>60?txt.slice(0,60)+'…':txt,M,y);
          doc.text(mny(d.valorCosto),W-M,y,{align:'right'});
          y+=5;
        });
      }
      y+=2; line();
    }

    // Gastos por categoría
    const cats=Object.entries(r.gastosPorCat).sort((a,b)=>b[1]-a[1]);
    if(cats.length){
      if(y>240){doc.addPage();y=18;}
      doc.setFont('helvetica','bold');doc.setFontSize(12);doc.text('GASTOS POR CATEGORÍA',M,y);y+=7;
      cats.forEach(([k,v])=>fila(k,v));
      line();fila('Total gastos',r.gastos,true);
    }
    doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(130);
    doc.text('Generado por PetPOS · '+new Date().toLocaleString('es-CO'),M,287);
    doc.save('reporte-'+r.desde+'_a_'+r.hasta+'.pdf');
    toast('PDF del reporte generado','ok');
  }catch(e){console.error(e);toast('No se pudo generar el PDF','err');}
}

/* ---- Exportar reporte por rango a Excel (resumen + detalle) ---- */
function exportReporteExcel(){
  if(!repRango){toast('Elige un rango de fechas','warn');return;}
  if(typeof XLSX==='undefined'){toast('Excel no disponible (sin internet para CDN)','err');return;}
  const r=reporteRango(repRango.desde,repRango.hasta);
  try{
    const wb=XLSX.utils.book_new();
    // Hoja 1: Resumen
    const resumen=[
      ['REPORTE FINANCIERO — '+(DB.config.negocio||'PetPOS')],
      ['Periodo',fechaBonita(r.desde)+' al '+fechaBonita(r.hasta)],
      [],
      ['UTILIDAD POR MARGEN'],
      ['Ventas del periodo',r.ventas],
      ['Costo de lo vendido',-r.costoVenta],
      ['Utilidad bruta',r.utilidadBruta],
      ['Gastos operativos',-r.gastos],
      ['UTILIDAD NETA (real)',r.utilidadNeta],
      [],
      ['FLUJO DE CAJA'],
      ['Ventas',r.ventas],
      ['Compras de mercancía',-r.compras],
      ['Gastos pagados',-r.gastos],
      ['Abonos a proveedores',-r.abonosDelPeriodo],
      ['FLUJO DE CAJA',r.flujoCaja],
      [],
      ['CUENTAS POR PAGAR (foto actual)'],
      ['Deuda total a proveedores',r.cxpTotal],
      ['  Vencido',r.cxpVencido],
      ['  Por vencer',r.cxpPorVencer],
      ['  Sin fecha de vencimiento',r.cxpSinFecha],
      ['N° facturas pendientes',r.nFacturasPorPagar],
      ['Flujo proyectado (si pagas todo hoy)',r.flujoCajaProyectado],
      [],
      ['MOVIMIENTOS DE CRÉDITO EN EL PERIODO'],
      ['Nuevos créditos generados ('+r.nCreditosNuevos+')',r.creditoNuevoPeriodo],
      ['Abonos realizados ('+r.nAbonos+')',r.abonosDelPeriodo],
      [],
      ['VALOR DEL INVENTARIO ACTUAL (foto actual)'],
      ['Valor a costo (lo que pagaste)',r.invValorCosto],
      ['Valor a precio de venta',r.invValorVenta],
      ['Utilidad potencial',r.invUtilidadPotencial],
      ['Margen sobre costo (%)',r.invMargenPct.toFixed(1)],
      ['Unidades totales',r.invUnidades],
      ['N° productos (SKUs)',r.invSKUs],
      ['Productos con stock bajo',r.invBajoStock],
      ['Productos agotados',r.invSinStock],
      [],
      ['CONTEOS'],
      ['N° de ventas',r.nFac],
      ['N° de compras',r.nCompras],
      ['N° de gastos',r.nGastos],
      [],
      ['GASTOS POR CATEGORÍA']
    ];
    Object.entries(r.gastosPorCat).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>resumen.push([k,v]));
    const ws1=XLSX.utils.aoa_to_sheet(resumen);ws1['!cols']=[{wch:38},{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws1,'Resumen');
    // Hoja 2: Ventas
    const fv=DB.facturas.filter(f=>{const d=f.fecha.slice(0,10);return d>=r.desde&&d<=r.hasta;});
    const ventasRows=[['N° Factura','Fecha','Cliente','Método','Total','Utilidad']];
    fv.forEach(f=>ventasRows.push([f.folio,f.fecha.slice(0,10),f.clienteNombre||'',f.metodo||'',num(f.total),num(f.utilidad||0)]));
    ventasRows.push(['','','','TOTAL',r.ventas,r.utilidadBruta]);
    const ws2=XLSX.utils.aoa_to_sheet(ventasRows);ws2['!cols']=[{wch:10},{wch:12},{wch:24},{wch:18},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws2,'Ventas');
    // Hoja 3: Compras
    const fc=DB.compras.filter(c=>{const d=(c.fecha||'').slice(0,10);return d>=r.desde&&d<=r.hasta;});
    const comprasRows=[['Fecha','Proveedor','Referencia','Tipo','Total','Saldo','Vence']];
    fc.forEach(c=>comprasRows.push([
      (c.fecha||'').slice(0,10),
      c.proveedor||'',
      c.ref||'',
      (c.tipoPago||'contado')==='credito'?'Crédito':'Contado',
      num(c.total),
      (c.tipoPago||'contado')==='credito'?num(c.saldo):0,
      c.vence||''
    ]));
    comprasRows.push(['','','','TOTAL',r.compras,'','']);
    const ws3=XLSX.utils.aoa_to_sheet(comprasRows);ws3['!cols']=[{wch:12},{wch:24},{wch:16},{wch:10},{wch:14},{wch:14},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws3,'Compras');
    // Hoja 4: Gastos
    const fg=DB.gastos.filter(g=>{const d=(g.fecha||'').slice(0,10);return d>=r.desde&&d<=r.hasta;});
    const gastosRows=[['Fecha','Categoría','Concepto','Nota','Monto']];
    fg.forEach(g=>gastosRows.push([(g.fecha||'').slice(0,10),g.categoria||'',g.concepto||'',g.nota||'',num(g.monto)]));
    gastosRows.push(['','','','TOTAL',r.gastos]);
    const ws4=XLSX.utils.aoa_to_sheet(gastosRows);ws4['!cols']=[{wch:12},{wch:16},{wch:28},{wch:24},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws4,'Gastos');

    // Hoja 5: Cuentas por pagar (detalle por factura)
    if(r.cxpTotal>0){
      const cxpRows=[['Fecha compra','Proveedor','Factura','Vence','Estado','Total','Abonado','Saldo']];
      const todasCXP=(DB.compras||[]).filter(c=>(c.tipoPago||'contado')==='credito' && num(c.saldo)>0.5)
        .sort((a,b)=>{
          // vencidas primero, luego por fecha de vencimiento
          const av=a.vence||'9999-12-31';
          const bv=b.vence||'9999-12-31';
          return av.localeCompare(bv);
        });
      const hoy=todayISO();
      todasCXP.forEach(c=>{
        const abonado=(c.abonos||[]).reduce((s,a)=>s+num(a.monto),0);
        let estado='Sin fecha';
        if(c.vence){
          estado = c.vence<hoy ? 'VENCIDO' : 'Por vencer';
        }
        cxpRows.push([
          (c.fecha||'').slice(0,10),
          c.proveedor||'',
          c.ref||'',
          c.vence||'',
          estado,
          num(c.total),
          num(abonado),
          num(c.saldo)
        ]);
      });
      cxpRows.push(['','','','','TOTAL','','',r.cxpTotal]);
      cxpRows.push([]);
      cxpRows.push(['RESUMEN POR PROVEEDOR']);
      cxpRows.push(['Proveedor','N° Facturas','Total compras','Abonado','Saldo']);
      Object.entries(r.cxpPorProveedor).sort((a,b)=>b[1].saldo-a[1].saldo).forEach(([prov,d])=>{
        cxpRows.push([prov,d.nFacturas,num(d.total),num(d.abonado),num(d.saldo)]);
      });
      const ws5=XLSX.utils.aoa_to_sheet(cxpRows);ws5['!cols']=[{wch:14},{wch:24},{wch:16},{wch:12},{wch:14},{wch:14},{wch:14},{wch:14}];
      XLSX.utils.book_append_sheet(wb,ws5,'Cuentas por pagar');
    }

    // Hoja: Inventario actual (detalle producto a producto)
    if(r.invValorCosto>0){
      const invRows=[['Código','Producto','Categoría','Stock','Costo unit.','Precio unit.','Valor a costo','Valor a venta','Utilidad potencial','Alerta']];
      const productosOrdenados=[...(DB.productos||[])]
        .filter(p=>num(p.stock)>0 || num(p.stockMin)>0)
        .sort((a,b)=>{
          const va=num(a.stock)*num(a.costo);
          const vb=num(b.stock)*num(b.costo);
          return vb-va;
        });
      productosOrdenados.forEach(p=>{
        const st=num(p.stock), co=num(p.costo), pr=num(p.precio), sm=num(p.stockMin);
        let alerta='';
        if(st<=0) alerta='AGOTADO';
        else if(st<=sm) alerta='Stock bajo';
        invRows.push([
          p.codigo||'',
          p.nombre||'',
          p.categoria||'Sin categoría',
          st,
          co,
          pr,
          st*co,
          st*pr,
          st*(pr-co),
          alerta
        ]);
      });
      invRows.push(['','','TOTAL','',  '','',  r.invValorCosto, r.invValorVenta, r.invUtilidadPotencial,'']);
      invRows.push([]);
      invRows.push(['RESUMEN POR CATEGORÍA']);
      invRows.push(['Categoría','N° productos','Unidades','Valor a costo','Valor a venta','Utilidad potencial']);
      Object.entries(r.invPorCategoria).sort((a,b)=>b[1].valorCosto-a[1].valorCosto).forEach(([cat,d])=>{
        invRows.push([cat,d.nSKUs,d.unidades,d.valorCosto,d.valorVenta,d.valorVenta-d.valorCosto]);
      });
      const wsInv=XLSX.utils.aoa_to_sheet(invRows);
      wsInv['!cols']=[{wch:12},{wch:30},{wch:18},{wch:10},{wch:14},{wch:14},{wch:16},{wch:16},{wch:16},{wch:12}];
      XLSX.utils.book_append_sheet(wb,wsInv,'Inventario');
    }

    XLSX.writeFile(wb,'reporte-'+r.desde+'_a_'+r.hasta+'.xlsx');
    toast('Excel del reporte generado','ok');
  }catch(e){console.error(e);toast('No se pudo generar el Excel','err');}
}

const IMPORT_CAMPOS={
  productos:[
    {k:'nombre',   label:'Nombre',              req:true, syn:['nombre','producto','articulo','descripcion','detalle','item','nombredelproducto']},
    {k:'codigo',   label:'Código / SKU',        syn:['codigo','sku','ref','referencia','cod','codigosku']},
    {k:'barras',   label:'Código de barras',    syn:['barras','codigodebarras','ean','upc','barcode','codbarras']},
    {k:'categoria',label:'Categoría',           syn:['categoria','linea','grupo','familia','tipo','seccion']},
    {k:'costo',    label:'Costo',               syn:['costo','compra','costounitario','valorcompra','preciocompra']},
    {k:'precio',   label:'Precio',              syn:['precio','valor','pvp','precioventa','venta','preciounitario','preciopublico']},
    {k:'stock',    label:'Stock / Existencias', syn:['stock','existencia','existencias','cantidad','inventario','disponible','saldo']},
    {k:'stockMin', label:'Stock mínimo',        syn:['stockmin','minimo','stockminimo','min','minimostock']},
    {k:'proveedor',label:'Proveedor',           syn:['proveedor','marca','fabricante','distribuidor']}
  ],
  clientes:[
    {k:'nombre',   label:'Nombre',              req:true, syn:['nombre','cliente','nombres','razonsocial','contacto','nombrecompleto']},
    {k:'negocio',  label:'Negocio / Empresa',   syn:['negocio','empresa','establecimiento','local','tienda','comercio']},
    {k:'telefono', label:'Teléfono',            syn:['telefono','tel','celular','movil','whatsapp','cel','contacto','numero']},
    {k:'direccion',label:'Dirección',           syn:['direccion','dir','domicilio','ubicacion']},
    {k:'ciudad',   label:'Ciudad',              syn:['ciudad','municipio','poblacion','localidad','depto']},
    {k:'obs',      label:'Observaciones',       syn:['obs','observaciones','nota','notas','comentario','comentarios','detalle']}
  ]
};
function normTxt(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');}
function autoMapear(cols,campos){
  const ncols=cols.map(c=>({raw:c,n:normTxt(c)}));
  const usados=new Set(); const mapa={};
  // Pase 1: coincidencia exacta de sinónimos
  campos.forEach(f=>{const hit=ncols.find(c=>!usados.has(c.raw)&&f.syn.includes(c.n));if(hit){mapa[f.k]=hit.raw;usados.add(hit.raw);}});
  // Pase 2: coincidencia parcial
  campos.forEach(f=>{if(mapa[f.k])return;const hit=ncols.find(c=>!usados.has(c.raw)&&f.syn.some(s=>c.n.includes(s)||s.includes(c.n)));if(hit){mapa[f.k]=hit.raw;usados.add(hit.raw);}});
  return mapa;
}
let _imp={rows:[],tipo:null,cols:[],hoja:''};
function importarArchivo(input,tipo){
  const f=input.files[0];if(!f)return;
  if(typeof XLSX==='undefined'){toast('Lector de Excel no disponible (sin conexión)','err');input.value='';return;}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const hoja=wb.SheetNames[0];
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[hoja],{defval:''});
      if(!rows.length){toast('El archivo está vacío o no tiene encabezados','warn');return;}
      _imp={rows,tipo,cols:Object.keys(rows[0]),hoja};
      mapearColumnas();
    }catch(err){console.error(err);toast('No se pudo leer el archivo. ¿Es un Excel o CSV válido?','err');}
    input.value='';
  };
  r.readAsBinaryString(f);
}
function mapearColumnas(){
  const {rows,tipo,cols,hoja}=_imp;
  const campos=IMPORT_CAMPOS[tipo];
  const mapa=autoMapear(cols,campos);
  const ej=col=>{const v=col?rows[0][col]:'';return (v===''||v==null)?'—':String(v);};
  const prev=rows.slice(0,3);
  openModal(`<div class="p-5">
    <div class="flex items-center justify-between mb-1">
      <h3 style="font-size:22px">📥 Importar ${tipo==='productos'?'productos':'clientes'} desde Excel</h3>
      <button class="chip" onclick="closeModal()">✕</button>
    </div>
    <div style="color:var(--muted)" class="mb-3">Hoja <b>${esc(hoja)}</b> · ${fmt(rows.length)} fila(s). Detectamos las columnas automáticamente; <b>revisa que cada campo apunte a la columna correcta</b>. El campo con <span style="color:var(--danger)">*</span> es obligatorio.</div>
    <div class="card p-2 mb-3" style="background:var(--surface-2);overflow:auto;max-height:24vh">
      <div style="font-size:12px;color:var(--muted);padding:2px 6px">👁️ Vista previa de tu archivo:</div>
      <table class="tbl" style="font-size:13px;white-space:nowrap"><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead>
      <tbody>${prev.map(row=>`<tr>${cols.map(c=>`<td>${esc(String(row[c]??''))}</td>`).join('')}</tr>`).join('')}</tbody></table>
    </div>
    <div class="grid gap-3" style="grid-template-columns:1fr 1fr;max-height:40vh;overflow:auto">
      ${campos.map(f=>`<div>
        <label class="lbl">${esc(f.label)} ${f.req?'<span style="color:var(--danger)">*</span>':''}</label>
        <select class="input" style="padding:10px" data-map="${f.k}" onchange="actualizarEjemplosMap()">
          <option value="">— Ninguna —</option>
          ${cols.map(col=>`<option value="${esc(col)}" ${mapa[f.k]===col?'selected':''}>${esc(col)}</option>`).join('')}
        </select>
        <div data-ej="${f.k}" style="font-size:12px;color:var(--muted);margin-top:3px;min-height:16px">Ejemplo: ${esc(ej(mapa[f.k]))}</div>
      </div>`).join('')}
    </div>
    <div id="impAviso" class="mt-2" style="font-size:14px;min-height:20px"></div>
    <div class="flex gap-3 mt-3">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary btn-block" onclick="ejecutarImport()">✅ Importar</button>
    </div>
  </div>`);
  const wrap=$('#modal-content .modal-box');if(wrap)wrap.style.maxWidth='840px';
  actualizarEjemplosMap();
}
function actualizarEjemplosMap(){
  const rows=_imp.rows;
  $$('#modal-content [data-map]').forEach(sel=>{
    const ej=$(`[data-ej="${sel.dataset.map}"]`);
    if(ej){const col=sel.value;const v=col?rows[0][col]:'';ej.textContent='Ejemplo: '+((v===''||v==null)?'—':String(v));}
  });
  const nombreSel=$('#modal-content [data-map="nombre"]');
  const aviso=$('#impAviso');
  if(aviso){

function ejecutarImport(){
  const {rows,tipo}=_imp;
  const mapa={};$$('#modal-content [data-map]').forEach(s=>{if(s.value)mapa[s.dataset.map]=s.value;});
  if(!mapa.nombre){toast('Debes asignar la columna del campo Nombre','warn');return;}

    if(!nombre){om++;return;}
    if(tipo==='productos'){
      DB.productos.push({id:uid(),codigo:String(get('codigo')||'P'+(DB.productos.length+n+1)),barras:String(get('barras')||''),nombre,

    }else{
      DB.clientes.push({id:uid(),nombre,negocio:String(get('negocio')||''),telefono:String(get('telefono')||''),direccion:String(get('direccion')||''),ciudad:String(get('ciudad')||''),obs:String(get('obs')||'')});
    }

  });
  save(tipo);closeModal();

/* ============================================================
   INVENTARIO: Excel completo + Hoja de auditoría imprimible
   ============================================================ */
function exportarInventarioCompleto(){
  if(typeof XLSX==='undefined'){toast('Excel no disponible (sin internet para CDN)','err');return;}
  const productos=DB.productos||[];
  if(!productos.length){toast('No hay productos en inventario','warn');return;}

  try{
    const wb=XLSX.utils.book_new();
    const hoy=todayISO();
    const negocio=DB.config.negocio||'PetPOS';

    // === HOJA 1: INVENTARIO DETALLADO ===
    // Ordenar por valor a costo descendente (más valiosos primero)
    const productosOrdenados=[...productos].sort((a,b)=>{
      const va=num(a.stock)*num(a.costo);
      const vb=num(b.stock)*num(b.costo);
      return vb-va;
    });

    let invValorCosto=0, invValorVenta=0, invUnidades=0, invBajoStock=0, invSinStock=0;

    const rows=[
      [negocio+' · INVENTARIO COMPLETO'],
      ['Fecha de corte: '+hoy],
      [],
      ['Código','Código barras','Producto','Categoría','Proveedor','Stock actual','Stock mínimo','Costo unit.','Precio unit.','Valor a costo','Valor a venta','Utilidad potencial','Margen %','Estado']
    ];

    productosOrdenados.forEach(p=>{
      const st=num(p.stock), co=num(p.costo), pr=num(p.precio), sm=num(p.stockMin);
      const valCosto=st*co, valVenta=st*pr, uti=valVenta-valCosto;
      const margen=co>0?((pr-co)/co*100):0;
      let estado='OK';
      if(st<=0){estado='AGOTADO';invSinStock++;}
      else if(st<=sm){estado='Stock bajo';invBajoStock++;}
      if(st>0){
        invValorCosto+=valCosto;
        invValorVenta+=valVenta;
        invUnidades+=st;
      }
      rows.push([
        p.codigo||'',
        p.barras||'',
        p.nombre||'',
        p.categoria||'Sin categoría',
        p.proveedor||'',
        st,
        sm,
        co,
        pr,
        valCosto,
        valVenta,
        uti,
        +margen.toFixed(1),
        estado
      ]);
    });

    // Totales al final
    rows.push([]);
    rows.push(['','','TOTAL INVENTARIO','','',invUnidades,'','','',invValorCosto,invValorVenta,invValorVenta-invValorCosto,'','']);

    const ws1=XLSX.utils.aoa_to_sheet(rows);
    ws1['!cols']=[
      {wch:12},{wch:14},{wch:32},{wch:18},{wch:18},
      {wch:10},{wch:10},{wch:12},{wch:12},
      {wch:14},{wch:14},{wch:14},{wch:10},{wch:14}
    ];
    XLSX.utils.book_append_sheet(wb,ws1,'Inventario detallado');

    // === HOJA 2: RESUMEN POR CATEGORÍA ===
    const porCat={};
    productos.forEach(p=>{
      const st=num(p.stock);
      const cat=p.categoria||'Sin categoría';
      if(!porCat[cat])porCat[cat]={nSKUs:0,unidades:0,valorCosto:0,valorVenta:0};
      porCat[cat].nSKUs++;
      if(st>0){
        porCat[cat].unidades+=st;
        porCat[cat].valorCosto+=st*num(p.costo);
        porCat[cat].valorVenta+=st*num(p.precio);
      }
    });
    const catRows=[
      [negocio+' · RESUMEN POR CATEGORÍA'],
      ['Fecha: '+hoy],
      [],
      ['Categoría','N° Productos','Unidades en stock','Valor a costo','Valor a venta','Utilidad potencial','% del total a costo']
    ];
    Object.entries(porCat).sort((a,b)=>b[1].valorCosto-a[1].valorCosto).forEach(([cat,d])=>{
      const pct=invValorCosto>0?(d.valorCosto/invValorCosto*100):0;
      catRows.push([cat,d.nSKUs,d.unidades,d.valorCosto,d.valorVenta,d.valorVenta-d.valorCosto,+pct.toFixed(1)]);
    });
    catRows.push([]);
    catRows.push(['TOTAL',productos.length,invUnidades,invValorCosto,invValorVenta,invValorVenta-invValorCosto,100]);
    const ws2=XLSX.utils.aoa_to_sheet(catRows);
    ws2['!cols']=[{wch:24},{wch:14},{wch:18},{wch:14},{wch:14},{wch:18},{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws2,'Por categoría');

    // === HOJA 3: ALERTAS (productos con stock bajo o agotados) ===
    const conAlerta=productosOrdenados.filter(p=>{
      const st=num(p.stock), sm=num(p.stockMin);
      return st<=0 || st<=sm;
    });
    if(conAlerta.length){
      const alertRows=[
        [negocio+' · PRODUCTOS A REABASTECER'],
        ['Fecha: '+hoy],
        [],
        ['Estado','Código','Producto','Categoría','Proveedor','Stock actual','Stock mínimo','Faltante para mínimo','Costo unit.','Reposición sugerida']
      ];
      conAlerta.forEach(p=>{
        const st=num(p.stock), co=num(p.costo), sm=num(p.stockMin);
        const estado=st<=0?'AGOTADO':'Stock bajo';
        const falt=Math.max(0,sm-st);
        const sugerencia=falt*co;
        alertRows.push([estado,p.codigo||'',p.nombre||'',p.categoria||'',p.proveedor||'',st,sm,falt,co,sugerencia]);
      });
      const ws3=XLSX.utils.aoa_to_sheet(alertRows);
      ws3['!cols']=[{wch:12},{wch:12},{wch:32},{wch:18},{wch:20},{wch:12},{wch:12},{wch:18},{wch:12},{wch:18}];
      XLSX.utils.book_append_sheet(wb,ws3,'Reabastecer');
    }

    // === HOJA 4: HOJA DE CONTEO MANUAL (para imprimir y auditar) ===
    const conteoRows=[
      [negocio+' · HOJA DE CONTEO PARA AUDITORÍA'],
      ['Fecha de corte: '+hoy],
      ['Realizada por: ________________________   Fecha del conteo: __________'],
      [],
      ['Código','Producto','Categoría','Stock sistema','Conteo físico','Diferencia','Observaciones']
    ];
    // Orden alfabético por nombre para hacer el conteo más fácil
    [...productos].sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||'')).forEach(p=>{
      conteoRows.push([p.codigo||'',p.nombre||'',p.categoria||'',num(p.stock),'','','']);
    });
    const ws4=XLSX.utils.aoa_to_sheet(conteoRows);
    ws4['!cols']=[{wch:12},{wch:34},{wch:18},{wch:14},{wch:14},{wch:14},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws4,'Hoja de conteo');

    XLSX.writeFile(wb,'inventario-'+hoy+'.xlsx');
    toast('Inventario exportado · 4 hojas','ok');
  }catch(e){console.error(e);toast('No se pudo generar el Excel','err');}
}

/* ============================================================
   DIAGNÓSTICO DE SINCRONIZACIÓN
   Permite ver pendientes/muertos, forzar reintento, limpiar cola
   y re-subir todo desde la UI sin tocar la consola.
   ============================================================ */
function _pintarSyncPanel(){
  const body=document.getElementById('syncPanelBody');
  if(!body)return;
  if(!window.posSync || typeof window.posSync.getQueueStats!=='function'){
    body.innerHTML='<span style="color:var(--muted)">Módulo de sincronización no disponible.</span>';
    return;
  }
  const s=window.posSync.getQueueStats();
  const online=window.posSync.isOnline?window.posSync.isOnline():false;
  if(s.total===0){
    body.innerHTML='<span style="color:var(--success);font-weight:700">✓ Todo sincronizado.</span> '+(online?'Conexión activa.':'<span style="color:var(--warn)">Sin conexión.</span>');
    return;
  }
  const itemsTabla=Object.entries(s.porTabla).map(([t,n])=>`<li><b>${esc(t)}</b>: ${fmt(n)}</li>`).join('');
  const edad=s.masVieja?Math.round((Date.now()-s.masVieja)/1000):0;
  const partes=[];
  if(s.pending>0) partes.push(`<span style="color:var(--warn);font-weight:700">⏳ ${fmt(s.pending)} pendiente(s)</span>`);
  if(s.waiting>0) partes.push(`<span style="color:var(--muted)">(${fmt(s.waiting)} esperando reintento)</span>`);
  if(s.dead>0)    partes.push(`<span style="color:var(--err);font-weight:700">❌ ${fmt(s.dead)} fallido(s)</span>`);
  body.innerHTML=`<div>${partes.join(' · ')}</div>
    <ul style="margin:6px 0 0 18px;padding:0">${itemsTabla}</ul>
    ${edad>0?`<div style="margin-top:6px;font-size:12px;color:var(--muted)">Más antiguo: hace ${edad} segundo(s)</div>`:''}`;
}

function diagnosticarSync(){
  _pintarSyncPanel();
  if(!window.posSync||typeof window.posSync.getQueueStats!=='function'){
    toast('Sync no disponible','warn');return;
  }
  const s=window.posSync.getQueueStats();
  if(s.total===0){toast('Todo sincronizado','ok');return;}
  toast((s.pending+s.dead)+' registro(s) en la cola — ver detalles arriba','info');
}

function reintentarSync(){
  if(!window.posSync||typeof window.posSync.flushNow!=='function'){
    toast('Sync no disponible','warn');return;
  }
  setSyncStatus('syncing','Reintentando…');
  window.posSync.flushNow()
    .then(()=>{toast('Sincronizado','ok');_pintarSyncPanel();})
    .catch(err=>{
      console.warn('[sync] reintento falló:',err);
      toast('Algunos pendientes no se pudieron subir: '+(err&&err.message||'error'),'warn');
      _pintarSyncPanel();
    });
}

function verErroresSync(){
  if(!window.posSync||typeof window.posSync.getDeadItems!=='function'){
    toast('Sync no disponible','warn');return;
  }
  const muertos=window.posSync.getDeadItems();
  if(muertos.length===0){toast('No hay registros fallidos','ok');return;}
  // Modal con lista detallada de errores
  const filas=muertos.map(m=>{
    const tabla=esc(m.coleccion||'?');
    const rid=esc(m.recordId||'?');
    const err=esc(m.lastError||'sin detalle');
    const op=esc(m.op||'?');
    const cuando=new Date(m.createdAt||Date.now()).toLocaleString('es-CO');
    return `<div class="card p-3" style="background:var(--surface-2);margin-bottom:8px">
      <div style="font-weight:700">${tabla} · <code style="font-size:12px;background:var(--surface);padding:2px 6px;border-radius:4px">${rid}</code></div>
      <div style="font-size:12px;color:var(--muted);margin:2px 0">${op} · creado ${cuando} · ${m.retries} intento(s)</div>
      <div style="color:var(--err);font-size:13px;margin-top:4px">⚠ ${err}</div>
      <button class="btn btn-ghost" style="margin-top:6px;font-size:12px;padding:4px 10px" onclick="descartarMuertoSync('${esc(m.id)}')">Descartar este</button>
    </div>`;
  }).join('');
  openModal(`<div class="p-5" style="max-width:680px;max-height:80vh;overflow-y:auto">
    <h3 style="font-size:22px" class="mb-3">⚠️ Registros que no se pudieron sincronizar</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:12px">Estos registros fallaron 5 veces y dejaron de reintentar para no bloquear el resto. Corrige la causa (RLS, esquema, datos inválidos) y usa "Reintentar fallidos" para que vuelvan a la cola normal.</p>
    ${filas}
    <div class="flex gap-3 mt-4">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-primary btn-block" onclick="reintentarMuertosSync();closeModal();">💉 Reintentar todos</button>
    </div>
  </div>`);
}

function reintentarMuertosSync(){
  if(!window.posSync||typeof window.posSync.retryDead!=='function'){
    toast('Sync no disponible','warn');return;
  }
  const n=window.posSync.retryDead();
  if(n===0){toast('No hay registros fallidos para reintentar','info');return;}
  toast(n+' registro(s) re-encolado(s) para subir','ok');
  setTimeout(_pintarSyncPanel,500);
}

function descartarMuertoSync(itemId){
  if(!window.posSync||typeof window.posSync.dropItem!=='function')return;
  const n=window.posSync.dropItem(itemId);
  if(n>0){
    toast('Registro descartado','ok');
    closeModal();
    setTimeout(()=>{ _pintarSyncPanel(); verErroresSync(); },200);
  }
}

function limpiarColaSync(){
  if(!window.posSync||typeof window.posSync.clearQueue!=='function'){
    toast('Sync no disponible','warn');return;
  }
  const s=window.posSync.getQueueStats();
  if(s.total===0){toast('La cola ya está vacía','info');return;}
  confirmBox('Vas a DESCARTAR '+s.total+' registro(s) de la cola ('+s.pending+' pendientes + '+s.dead+' fallidos). Los datos LOCALES no se borran, solo se pierden los push pendientes. ¿Continuar?',()=>{
    const n=window.posSync.clearQueue();
    toast('Cola limpiada: '+n+' registro(s) descartado(s)','ok');
    _pintarSyncPanel();
  },'Sí, limpiar');
}

function reSubirTodoSync(){
  if(!window.posSync||typeof window.posSync.forceResync!=='function'){
    toast('Sync no disponible','warn');return;
  }
  confirmBox('Vas a re-encolar TODOS los datos locales para subirlos a la nube. Útil si la cola estaba dañada o si la nube perdió datos. ¿Continuar?',()=>{
    setSyncStatus('syncing','Re-subiendo todo…');
    window.posSync.forceResync().then(()=>{
      toast('Datos re-encolados, subiendo…','ok');
      setTimeout(_pintarSyncPanel,500);
    });
  },'Sí, re-subir');
}

/* Resumen humano de lo que se va a borrar */
function _bdResumen(tipos){
  const out=[];
  if(tipos.includes('stock')){
    const conStock=DB.productos.filter(p=>num(p.stock)>0).length;
    out.push('📊 Stock de '+fmt(conStock)+' producto(s) → quedarán en 0');
  }
  if(tipos.includes('productos')) out.push('📦 '+fmt(DB.productos.length)+' producto(s) del catálogo');
  if(tipos.includes('clientes'))  out.push('👥 '+fmt(DB.clientes.length)+' cliente(s)');
  if(tipos.includes('facturas'))  out.push('🧾 '+fmt(DB.facturas.length)+' factura(s) / venta(s)');
  if(tipos.includes('compras'))   out.push('🚚 '+fmt(DB.compras.length)+' compra(s)');
  if(tipos.includes('gastos'))    out.push('💸 '+fmt(DB.gastos.length)+' gasto(s)');
  if(tipos.includes('proveedores'))out.push('🏭 '+fmt(DB.proveedores.length)+' proveedor(es)');
  if(tipos.includes('plantillas'))out.push('🎨 '+fmt(DB.plantillas.length)+' plantilla(s) de recibo');
  if(tipos.includes('config'))    out.push('⚙️ Configuración del negocio (nombre, NIT, logo, mensajes)');

  if(!tipos.length){toast('No has seleccionado nada para borrar','warn');return;}

  }

    if(!confirm(msg))return;
    _ejecutarBorrado(tipos);

/* Ejecuta el borrado real de las colecciones seleccionadas */
function _ejecutarBorrado(tipos){
  const sync=window.posSync;
  const upsert=(sync && typeof sync.upsert==='function')?sync.upsert.bind(sync):null;
  const remove=(sync && typeof sync.remove==='function')?sync.remove.bind(sync):null;

  // 1) Solo poner stock en 0 (sin tocar productos completos)
  if(tipos.includes('stock') && !tipos.includes('productos')){
    DB.productos.forEach(p=>{
      if(num(p.stock)!==0){
        p.stock=0;
        if(upsert){ try{ upsert('productos', p); }catch(e){} }
      }
    });
    save('productos');
  }

  // 2) Colecciones-array: para cada una, recordamos los ids y vaciamos
  const colecciones=['productos','clientes','facturas','compras','gastos','proveedores','plantillas'];
  colecciones.forEach(k=>{
    if(!tipos.includes(k))return;
    if(!Array.isArray(DB[k]))return;
    const ids=DB[k].map(x=>x.id).filter(Boolean);
    DB[k]=[];
    save(k);
    if(remove){ ids.forEach(id=>{ try{ remove(k, id); }catch(e){} }); }
  });

  // 3) Configuración del negocio
  if(tipos.includes('config')){
    DB.config=Object.assign({}, (typeof CONFIG_DEFAULT==='object'?CONFIG_DEFAULT:{}));
    save('config');
    if(sync && typeof sync.saveConfig==='function'){ try{ sync.saveConfig(); }catch(e){} }
  }

  // 4) Si borraron plantillas, asegurar que quede al menos una predeterminada
  if(tipos.includes('plantillas')){
    asegurarPlantillas();
  }

  updateBrand();
  toast('Datos borrados correctamente','ok');

  // Refrescar la vista para que se vean los contadores actualizados
  if(currentView==='config'){ renderConfig(); }
  else { go('dashboard'); }
}

/* Compatibilidad: el botón viejo "Borrar todos los datos" sigue funcionando si algo lo llama */
function borrarTodo(){
  confirmBox('¿BORRAR TODO? Se eliminarán productos, clientes, facturas y compras.',()=>{
    confirmBox('Esta acción NO se puede deshacer. ¿Confirmas?',()=>{
      const sync=window.posSync;
      const remove=(sync && typeof sync.remove==='function')?sync.remove.bind(sync):null;
      // Notificar al sync cada borrado fila por fila antes de limpiar
      ['productos','clientes','facturas','compras','gastos','proveedores','plantillas'].forEach(k=>{
        if(Array.isArray(DB[k]) && remove){
          DB[k].forEach(x=>{ if(x && x.id){ try{ remove(k, x.id); }catch(e){} } });
        }
      });
      for(const k in STORE)localStorage.removeItem(STORE[k]);
      seed();
      if(sync && typeof sync.saveConfig==='function'){ try{ sync.saveConfig(); }catch(e){} }
      go('dashboard');toast('Datos reiniciados','ok');
    },'Sí, borrar definitivamente');
  },'Continuar');
}

<!-- ============================================================
     PetPOS · MÓDULO DE SINCRONIZACIÓN REAL CON SUPABASE
     ============================================================
     Reemplaza COMPLETAMENTE el bloque viejo que terminaba con
     "MODULO DE SINCRONIZACION EN TIEMPO REAL CON SUPABASE".

     Arquitectura:
       · Una tabla por entidad (productos, clientes, facturas, etc.)
       · localStorage solo se usa como cache offline + cola pendiente
       · Realtime fila-por-fila por tenant_id
       · Soft-delete con deleted_at
       · Migración automática de localStorage → Supabase al primer arranque
       · Cola de operaciones offline con retry exponencial
     ============================================================ -->
<script>
(function(){
  'use strict';

  // ============================================================
  //  CONFIGURACIÓN
  // ============================================================
  const CFG     = window.SUPABASE_CONFIG || {};
  const TENANT  = CFG.tenantId || 'default';

  // Mapeo: clave en DB (JS)  →  tabla en Supabase
  const TABLES = {
    productos:   'productos',
    clientes:    'clientes',
    proveedores: 'proveedores',
    facturas:    'facturas',
    compras:     'compras',
    gastos:      'gastos',
    plantillas:  'plantillas'
    // config y meta se manejan aparte (tabla `config` clave/valor)
  };

  // Convertir un registro JS → fila para Supabase (camelCase → snake_case)
  // Por entidad. Devuelve solo las columnas que existen en la tabla.
  function toRow(coleccion, item){
    const base = {
      id:         String(item.id || uid()),
      tenant_id:  TENANT,
      device_id:  DEVICE_ID,
      updated_at: new Date().toISOString()
    };
    if(coleccion === 'productos'){

      });
    }
    if(coleccion === 'facturas'){
      return Object.assign(base, {
        folio:           item.folio || null,
        fecha:           item.fecha || new Date().toISOString(),
        cliente_id:      item.clienteId      || null,
        cliente_nombre:  item.clienteNombre  || null,

        cliente_tel:     item.clienteTel     || null,

        total:           num(item.total),
        utilidad:        num(item.utilidad),
        metodo:          item.metodo || null,
        recibido:        num(item.recibido),
        cambio:          num(item.cambio),
        extra:           stripKnown(item, ['id','folio','fecha','clienteId','clienteNombre','clienteNegocio','clienteTel','clienteDir','items','subtotal','descuento','total','utilidad','metodo','recibido','cambio'])
      });
    }
    if(coleccion === 'compras'){
      return Object.assign(base, {
        fecha:            item.fecha || new Date().toISOString(),
        proveedor_id:     item.proveedorId     || null,
        proveedor_nombre: item.proveedorNombre || item.proveedor || null,
        items:            item.items || [],
        subtotal:         num(item.subtotal),
        descuento:        num(item.descuento),
        total:            num(item.total),
        metodo:           item.metodo || null,
        obs:              item.obs    || null,
        extra:            Object.assign(
          {
            tipoPago: item.tipoPago || 'contado',
            vence:    item.vence    || '',
            abonos:   item.abonos   || [],
            saldo:    num(item.saldo),
            ref:      item.ref      || ''
          },
          stripKnown(item, ['id','fecha','proveedorId','proveedorNombre','proveedor','items','subtotal','descuento','total','metodo','obs','tipoPago','vence','abonos','saldo','ref'])
        )

    if(coleccion === 'gastos'){
      return Object.assign(base, {
        fecha:     item.fecha || new Date().toISOString(),
        categoria: item.categoria || null,
        concepto:  item.concepto  || item.descripcion || null,

        obs:       item.obs    || null,
        extra:     stripKnown(item, ['id','fecha','categoria','concepto','descripcion','monto','valor','metodo','obs'])
      });
    }
    if(coleccion === 'plantillas'){
      return Object.assign(base, {
        nombre: item.nombre || 'Plantilla',

      });
    }
    return base;
  }

  // Convertir fila de Supabase → registro JS plano (compatible con DB[k])
  function fromRow(coleccion, row){
    if(!row) return null;

        items:           row.items || [],
        subtotal:        +row.subtotal || 0,

        utilidad:        +row.utilidad || 0,
        metodo:          row.metodo || '',
        recibido:        +row.recibido || 0,
        cambio:          +row.cambio || 0
      }, extra);
    }
    if(coleccion === 'compras'){
      return {
        id:               row.id,
        fecha:            row.fecha,
        proveedorId:      row.proveedor_id || '',
        proveedor:        row.proveedor_nombre || '',
        proveedorNombre:  row.proveedor_nombre || '',
        items:            row.items || [],
        subtotal:         +row.subtotal || 0,
        descuento:        +row.descuento || 0,
        total:            +row.total || 0,
        metodo:           row.metodo || '',
        obs:              row.obs || '',
        tipoPago:         extra.tipoPago || 'contado',
        vence:            extra.vence    || '',
        abonos:           extra.abonos   || [],
        saldo:            +extra.saldo   || 0,
        ref:              extra.ref      || ''
      };
    }
    if(coleccion === 'gastos'){
      return Object.assign({
        id:        row.id,

    }
