      return Object.assign({ id: row.id, nombre: row.nombre }, row.data || {});
    }
    return row;
  }

  // Helpers internos
  function num(v){ const n = +v; return isFinite(n) ? n : 0; }
  function uid(){ return 'r_' + Math.random().toString(36).slice(2) + Date.now().toString(36); }
  function stripKnown(obj, known){
    const out = {};
    for(const k in obj){ if(known.indexOf(k) === -1) out[k] = obj[k]; }
    return out;
  }

  // ============================================================
  //  ESTADO DEL MÓDULO
  // ============================================================
  const DEVICE_ID = (()=>{
    let id = localStorage.getItem('pos_device_id');
    if(!id){
      id = 'd_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('pos_device_id', id);
    }
    return id;
  })();

  let supabase   = null;
  let channels   = [];
  let online     = navigator.onLine;
  let ready      = false;          // true cuando ya hicimos pull inicial
  let applyingRemote = false;       // bandera para no reemitir cambios remotos

  // Cola de operaciones pendientes mientras estamos offline
  // ============================================================
  //  COLA PERSISTENTE DE PUSH (FASE 1: estados + dead queue)
  // ============================================================
  // Formato V3 de cada item:
  //   {
  //     id:           UUID interno del item de cola (no del registro),
  //     op:           'upsert' | 'delete',
  //     coleccion:    'productos' | 'clientes' | ...
  //     recordId:     id del registro en la tabla destino,
  //     row:          payload listo para Supabase (solo upsert),
  //     status:       'pending' | 'syncing' | 'done' | 'dead',
  //     retries:      0..N,
  //     lastError:    string descriptivo del último error,
  //     nextRetryAt:  ms epoch — no procesar antes de esta hora,
  //     createdAt:    ms epoch de creación
  //   }
  // ============================================================
  const QUEUE_KEY     = 'pos_sync_queue_v3';
  const QUEUE_KEY_OLD = 'pos_sync_queue_v2';   // para migrar la cola antigua
  const MAX_RETRIES   = 5;
  const OP_TIMEOUT_MS = 8000;
  // Sync diferido: por petición del usuario, los pushes a Supabase NO ocurren
  // instantáneamente sino cada 3 horas. Antes era ~250ms (debounce instantáneo).
  // Antes de cerrar la app, beforeunload fuerza un flush sincrónico best-effort.
  // TRADE-OFF: si se va la luz / crashea el browser / muere la batería en la
  // ventana entre flushes, las ventas hechas en esa ventana quedan solo en
  // localStorage hasta que la app se reabra con internet.
  const BACKGROUND_FLUSH_MS = 3 * 60 * 60 * 1000;   // 3 horas
  // Para reintentos de items con backoff usamos un delay mucho menor — esos
  // sí son urgentes porque ya fallaron antes y queremos recuperarlos rápido.
  const RETRY_DELAY_MS      = 30 * 1000;            // 30 segundos
  let queue = loadQueue();
  let flushTimer = null;
  let backgroundTimer = null;    // timer del flush periódico de 3 horas

  function qid(){ return 'q_'+Date.now()+'_'+Math.random().toString(36).slice(2,9); }

  function loadQueue(){
    // Carga V3, si no existe migra V2 (formato viejo sin estados)
    try{
      const v3 = localStorage.getItem(QUEUE_KEY);
      if(v3){
        const arr = JSON.parse(v3) || [];
        return arr.map(normalizeItem).filter(Boolean);
      }
      const v2 = localStorage.getItem(QUEUE_KEY_OLD);
      if(v2){
        const arr = JSON.parse(v2) || [];
        const migrated = arr.map(old => normalizeItem({
          op:         old.op,
          coleccion:  old.coleccion,
          recordId:   old.id,
          row:        old.row,
          createdAt:  old.ts || Date.now()
        })).filter(Boolean);
        localStorage.removeItem(QUEUE_KEY_OLD);
        return migrated;
      }
      return [];
    }catch(e){ console.warn('[sync] loadQueue falló:', e); return []; }
  }

  function normalizeItem(it){
    if(!it || !it.op) return null;
    return {
      id:          it.id || qid(),
      op:          it.op,
      coleccion:   it.coleccion,
      recordId:    it.recordId || (it.row && it.row.id) || null,
      row:         it.row || null,
      status:      it.status === 'dead' ? 'dead' : (it.status === 'done' ? 'done' : 'pending'),
      retries:     Number(it.retries) || 0,
      lastError:   it.lastError || null,
      nextRetryAt: Number(it.nextRetryAt) || 0,
      createdAt:   Number(it.createdAt) || Date.now()
    };
  }

  function saveQueue(){
    try{ localStorage.setItem(QUEUE_KEY, JSON.stringify(queue)); }catch(e){}
  }

  // Helper de timeout real: corta cualquier operación que tarde más que ms.
  // Garantiza que la cola no se cuelgue esperando una respuesta perdida.
  function withTimeout(promise, ms){
    return Promise.race([
      Promise.resolve(promise),
      new Promise((_, reject) => setTimeout(
        () => reject(new Error('Timeout Supabase ('+(ms||OP_TIMEOUT_MS)+'ms)')),
        ms || OP_TIMEOUT_MS
      ))
    ]);
  }

  // Estadísticas globales (cuántos pendientes, muertos, etc.)
  function queueStats(){
    let pending=0, dead=0, waiting=0;
    const now = Date.now();
    for(const it of queue){
      if(it.status === 'dead'){ dead++; }
      else if(it.status === 'pending'){
        if(it.nextRetryAt && it.nextRetryAt > now){ waiting++; }
        pending++;
      }
    }
    return { total: queue.length, pending, dead, waiting };
  }

  // ============================================================
  //  UI: badge de estado + toasts
  // ============================================================
  const badge = document.getElementById('syncBadge');
  function setStatus(state, text){
    if(!badge) return;
    // Mostrar pendientes/muertos en el texto del badge
    let final = text || '';
    try{
      const s = queueStats();
      const parts = [];
      if(s.pending > 0 && state !== 'syncing') parts.push(s.pending+' pend.');
      if(s.dead > 0) parts.push(s.dead+' fallidos');
      if(parts.length > 0) final = final + ' · ' + parts.join(' · ');
    }catch(e){}
    badge.classList.remove('sync-online','sync-syncing','sync-offline','sync-error');
    badge.classList.add('sync-'+state);
    const t = badge.querySelector('.sync-text'); if(t) t.textContent = final;
  }
  function syncToast(msg, type){
    try{
      if(typeof window.toast === 'function') window.toast(msg, type || 'info');
    }catch(e){}
  }

  // ============================================================
  //  CLIENTE SUPABASE
  // ============================================================
  function initClient(){
    if(!CFG.url || !CFG.anonKey){
      console.warn('[sync] Sin configuración de Supabase. Modo solo local.');
      setStatus('offline', 'Solo local');
      return false;
    }
    if(!window.supabase || !window.supabase.createClient){
      console.warn('[sync] SDK Supabase no cargó. Modo solo local.');
      setStatus('offline', 'Solo local');
      return false;
    }
    supabase = window.supabase.createClient(CFG.url, CFG.anonKey, {
      realtime: { params: { eventsPerSecond: 10 } },
      auth: { persistSession: false, autoRefreshToken: false }
    });
    return true;
  }

  // ============================================================
  //  PULL: descargar todo desde Supabase y poblar DB local
  // ============================================================
  async function pullAll(){
    if(!supabase) return;
    setStatus('syncing', 'Descargando…');

    let total = 0;
    for(const k in TABLES){
      try{
        const rows = await pullCollection(k);
        applyingRemote = true;
        try{
          window.DB[k] = rows.map(r => fromRow(k, r));
          // Cache offline
          try{ localStorage.setItem(window.STORE[k], JSON.stringify(window.DB[k])); }catch(e){}
        } finally { applyingRemote = false; }
        total += rows.length;
      }catch(err){
        console.warn('[sync] pull '+k+' falló', err);
      }
    }

    // CONFIG y META (tabla key/value)
    try{
      const { data, error } = await supabase
        .from('config')
        .select('clave, data')
        .eq('tenant_id', TENANT);
      if(!error && data){
        applyingRemote = true;
        try{
          for(const row of data){
            if(row.clave === 'config' && row.data){
              window.DB.config = Object.assign({}, window.CONFIG_DEFAULT || {}, row.data);
              try{ localStorage.setItem(window.STORE.config, JSON.stringify(window.DB.config)); }catch(e){}
            }
            if(row.clave === 'meta' && row.data){
              window.DB.meta = Object.assign({folio:1,theme:'light'}, row.data);
              try{ localStorage.setItem(window.STORE.meta, JSON.stringify(window.DB.meta)); }catch(e){}
            }
          }
        } finally { applyingRemote = false; }
      }
    }catch(err){ console.warn('[sync] pull config', err); }

    ready = true;
    setStatus('online', 'En vivo');
    if(total > 0) refreshCurrentView();
    return total;
  }

  // Pull paginado (Supabase limita a ~1000 por request)
  async function pullCollection(k){
    const table = TABLES[k];
    const all = [];
    const PAGE = 1000;
    let from = 0;
    while(true){
      const { data, error } = await supabase
        .from(table)
        .select('*')
        .eq('tenant_id', TENANT)
        .is('deleted_at', null)
        .order('updated_at', { ascending: true })
        .range(from, from + PAGE - 1);
      if(error) throw error;
      if(!data || data.length === 0) break;
      all.push.apply(all, data);
      if(data.length < PAGE) break;
      from += PAGE;
    }
    return all;
  }

  // ============================================================
  //  MIGRACIÓN AUTOMÁTICA: localStorage → Supabase
  //  Se ejecuta UNA SOLA VEZ por dispositivo si:
  //   1) Hay datos en localStorage
  //   2) Las tablas Supabase están vacías para este tenant
  // ============================================================
  const MIGRATION_FLAG = 'pos_migrated_v2_' + TENANT;

  async function maybeMigrate(){
    if(!supabase) return;
    if(localStorage.getItem(MIGRATION_FLAG) === '1') return;

    // ¿Hay algo local?
    const local = {};
    let hasLocal = false;
    for(const k in TABLES){
      try{
        const raw = localStorage.getItem(window.STORE[k]);
        local[k] = raw ? JSON.parse(raw) : [];
        if(Array.isArray(local[k]) && local[k].length > 0) hasLocal = true;
      }catch(e){ local[k] = []; }
    }
    try{ local.config = JSON.parse(localStorage.getItem(window.STORE.config) || 'null'); }catch(e){ local.config = null; }
    try{ local.meta   = JSON.parse(localStorage.getItem(window.STORE.meta)   || 'null'); }catch(e){ local.meta = null; }
    if(local.config || local.meta) hasLocal = true;

    if(!hasLocal){
      localStorage.setItem(MIGRATION_FLAG, '1');
      return;
    }

    // ¿Las tablas remotas están vacías?
    const { count, error } = await supabase
      .from('productos')
      .select('id', { count:'exact', head:true })
      .eq('tenant_id', TENANT);
    if(error){
      console.warn('[sync] check vacío falló', error);
      return; // no migramos si no podemos verificar
    }
    if((count || 0) > 0){
      // Ya hay datos en la nube. Marcamos migración hecha y dejamos
      // que el pull traiga lo de la nube (gana la nube).
      localStorage.setItem(MIGRATION_FLAG, '1');
      return;
    }

    // Subir todo lo local
    setStatus('syncing', 'Migrando datos…');
    syncToast('Subiendo tus datos a la nube por primera vez…', 'info');

    let totalSubidos = 0;
    for(const k in TABLES){
      const arr = Array.isArray(local[k]) ? local[k] : [];
      if(arr.length === 0) continue;
      // Lotes de 200 para evitar timeouts
      const BATCH = 200;
      for(let i=0; i<arr.length; i+=BATCH){
        const chunk = arr.slice(i, i+BATCH).map(item => toRow(k, item));
        const { error: e2 } = await supabase
          .from(TABLES[k])
          .upsert(chunk, { onConflict: 'id' });
        if(e2){
          console.error('[sync] migración '+k+' falló', e2);
          setStatus('error', 'Migración con errores');
          return; // no marcamos flag, reintentará la próxima vez
        }
        totalSubidos += chunk.length;
      }
    }

    // CONFIG + META
    const configRows = [];
    if(local.config) configRows.push({ tenant_id: TENANT, clave: 'config', data: local.config, device_id: DEVICE_ID, updated_at: new Date().toISOString() });
    if(local.meta)   configRows.push({ tenant_id: TENANT, clave: 'meta',   data: local.meta,   device_id: DEVICE_ID, updated_at: new Date().toISOString() });
    if(configRows.length){
      const { error: e3 } = await supabase
        .from('config')
        .upsert(configRows, { onConflict: 'tenant_id,clave' });
      if(e3) console.warn('[sync] migración config', e3);
    }

    localStorage.setItem(MIGRATION_FLAG, '1');
    syncToast('✓ '+totalSubidos+' registros sincronizados con la nube', 'ok');
  }

  // ============================================================
  //  PUSH: encolar un cambio (upsert o delete)
  //  Con dedup: si ya hay un upsert pendiente del mismo registro,
  //  lo reemplaza en lugar de duplicar. Esto evita que la cola
  //  crezca infinitamente cuando se edita el mismo producto N veces.
  // ============================================================
  function enqueue(op){
    const recordId = op.id || (op.row && op.row.id) || null;
    // Dedup: misma colección + mismo registro + mismo op + aún pending
    if(recordId){
      for(let i=queue.length-1; i>=0; i--){
        const it = queue[i];
        if(it.status === 'pending' && it.op === op.op &&
           it.coleccion === op.coleccion && it.recordId === recordId){
          // Reemplazar el payload con el más reciente; reseteamos retries/error
          it.row         = op.row || it.row;
          it.lastError   = null;
          it.retries     = 0;
          it.nextRetryAt = 0;
          saveQueue();
          scheduleFlush();
          return;
        }
      }
    }
    queue.push(normalizeItem({
      op:         op.op,
      coleccion:  op.coleccion,
      recordId:   recordId,
      row:        op.row || null,
      createdAt:  Date.now()
    }));
    saveQueue();
    scheduleFlush();
  }

  function scheduleFlush(delay){
    // Sync diferido: si no se pasa delay explícito, esperamos 3 horas.
    // Esto invierte el comportamiento previo (250ms = instantáneo).
    // Los reintentos del backoff sí pasan delays cortos explícitos, así que
    // los items que ya fallaron siguen reintentándose rápido.
    if(flushTimer) clearTimeout(flushTimer);
    flushTimer = setTimeout(processQueue, delay != null ? delay : BACKGROUND_FLUSH_MS);
  }

  // Detecta errores PERMANENTES vs TEMPORALES.
  //   Permanente → marcar el item como 'dead' inmediatamente.
  //   Temporal   → backoff exponencial y reintento.
  //   Códigos PostgreSQL: 22xxx=tipo, 23xxx=constraint, 42xxx=sintaxis/columna
  //   HTTP: 400/401/403/422 = cliente
  function isPermanentError(err){
    if(!err) return false;
    const code = String(err.code || '');
    const status = err.status || err.statusCode || 0;
    if(code.startsWith('22') || code.startsWith('23') || code.startsWith('42')) return true;
    if(status === 400 || status === 401 || status === 403 || status === 422) return true;
    const msg = String(err.message||'').toLowerCase();
    if(msg.includes('violates') || msg.includes('does not exist') || msg.includes('invalid input')) return true;
    return false;
  }

  // Marca un item como fallido y programa su próximo reintento.
  // Si supera MAX_RETRIES (o si el error es permanente), lo mata.
  function markItemFailed(it, err, forceDead){
    it.retries   = (it.retries || 0) + 1;
    it.lastError = String(err && err.message || err || 'error desconocido');
    if(forceDead || it.retries >= MAX_RETRIES){
      it.status = 'dead';
      it.nextRetryAt = 0;
      console.error('[sync] item DEAD tras '+it.retries+' intentos:', it.coleccion, it.recordId, it.lastError);
    } else {
      it.status = 'pending';
      // Backoff exponencial: 2s, 4s, 8s, 16s, 32s
      const wait = Math.pow(2, it.retries) * 1000;
      it.nextRetryAt = Date.now() + wait;
    }
  }

  // Ejecuta una operación individual contra Supabase.
  // Devuelve void si OK, lanza error si falla. Aplica timeout duro.
  async function executeItem(it){
    if(it.op === 'upsert'){
      const tabla = TABLES[it.coleccion] || (it.coleccion === 'config' || it.coleccion === 'meta' ? 'config' : null);
      if(!tabla) throw new Error('Colección desconocida: '+it.coleccion);
      const conflict = (tabla === 'config') ? 'tenant_id,clave' : 'id';
      const { error } = await withTimeout(
        supabase.from(tabla).upsert(it.row, { onConflict: conflict }),
        OP_TIMEOUT_MS
      );
      if(error) throw error;
    } else if(it.op === 'delete'){
      const tabla = TABLES[it.coleccion];
      if(!tabla) throw new Error('Colección desconocida: '+it.coleccion);
      const { error } = await withTimeout(
        supabase.from(tabla)
          .update({ deleted_at: new Date().toISOString(), device_id: DEVICE_ID })
          .eq('id', it.recordId)
          .eq('tenant_id', TENANT),
        OP_TIMEOUT_MS
      );
      if(error) throw error;
    } else {
      throw new Error('Op desconocida: '+it.op);
    }
  }

  // ============================================================
  //  PROCESADOR DE COLA PROFESIONAL
  //  - guard syncRunning para evitar ejecuciones paralelas
  //  - intento por lotes (rápido) con caída a item-por-item si falla
  //  - try/catch individual: un error NO bloquea la cola entera
  //  - dead queue: items con >=5 fallos no se reintentan
  //  - backoff exponencial por item
  //  - timeout duro por operación
  // ============================================================
  async function processQueue(){
    // Guard: nunca dos procesadores corriendo a la vez
    if(window.posSyncRunning){ return; }
    window.posSyncRunning = true;

    try{
      if(!supabase || !online){
        return;
      }

      // Filtrar items elegibles AHORA: pending y nextRetryAt vencido
      const now = Date.now();
      const elegibles = queue.filter(it =>
        it.status === 'pending' && (!it.nextRetryAt || it.nextRetryAt <= now)
      );

      if(elegibles.length === 0){
        // Si hay pendientes esperando su backoff, agendamos otro intento
        const proxima = queue
          .filter(it => it.status === 'pending' && it.nextRetryAt > now)
          .reduce((min, it) => Math.min(min, it.nextRetryAt), Infinity);
        if(proxima !== Infinity){
          const delta = Math.max(500, proxima - now);
          if(flushTimer) clearTimeout(flushTimer);
          flushTimer = setTimeout(processQueue, delta);
          setStatus('syncing', 'Reintentando en '+Math.ceil(delta/1000)+'s…');
        } else {
          const stats = queueStats();
          if(stats.dead > 0) setStatus('error', stats.dead+' registro(s) fallidos');
          else setStatus('online', 'En vivo');
        }
        return;
      }

      setStatus('syncing', 'Guardando ('+elegibles.length+')…');

      // === Fast path: agrupar items "limpios" (sin retries previos) por tabla ===
      // Si el lote sube OK, marcamos todos como done en una sola petición HTTP.
      // Si falla, descomponemos el lote y reintentamos item por item.
      const limpiosPorTabla = {};   // { tabla: [items] }
      const sucios = [];            // items con retries>0 → procesar uno por uno
      for(const it of elegibles){
        if(it.op === 'upsert' && it.retries === 0){
          const tabla = TABLES[it.coleccion] || (it.coleccion === 'config' || it.coleccion === 'meta' ? 'config' : null);
          if(!tabla){ markItemFailed(it, new Error('Colección desconocida'), true); continue; }
          if(!limpiosPorTabla[tabla]) limpiosPorTabla[tabla] = [];
          limpiosPorTabla[tabla].push(it);
        } else {
          sucios.push(it);
        }
      }

      // 1) Fast path: upserts en batch por tabla, lotes de 200
      for(const tabla in limpiosPorTabla){
        const items = limpiosPorTabla[tabla];
        const conflict = (tabla === 'config') ? 'tenant_id,clave' : 'id';
        for(let i=0; i<items.length; i+=200){
          const chunk = items.slice(i, i+200);
          const rows = chunk.map(x => x.row);
          try{
            const { error } = await withTimeout(
              supabase.from(tabla).upsert(rows, { onConflict: conflict }),
              OP_TIMEOUT_MS
            );
            if(error) throw error;
            // Éxito del lote → marcar todos como done
            for(const it of chunk){ it.status = 'done'; it.lastError = null; }
          }catch(err){
            console.warn('[sync] batch '+tabla+' falló, degradando a item-por-item:', err && err.message);
            // El batch falló: descomponer y mover al slow path
            for(const it of chunk){ sucios.push(it); }
          }
        }
      }

      // 2) Slow path: cada item se intenta por separado.
      //    Un fallo NO detiene el resto — sigue con el siguiente.
      for(const it of sucios){
        // Doble check de elegibilidad (puede haber pasado tiempo)
        if(it.status !== 'pending') continue;
        if(it.nextRetryAt && it.nextRetryAt > Date.now()) continue;
        it.status = 'syncing';
        try{
          await executeItem(it);
          it.status = 'done';
          it.lastError = null;
        }catch(err){
          const permanente = isPermanentError(err);
          markItemFailed(it, err, permanente);
        }
      }

      // 3) Limpieza: remover items en estado 'done' (ya no necesitamos guardarlos)
      const antes = queue.length;
      queue = queue.filter(it => it.status !== 'done');
      saveQueue();
      const procesados = antes - queue.length;
      if(procesados > 0){
        console.log('[sync] '+procesados+' item(s) sincronizados OK');
      }

      // 4) Actualizar UI según resultado
      const stats = queueStats();
      if(stats.pending > 0 && stats.waiting === stats.pending){
        // Todos los pendientes están esperando backoff: agendar y mostrar
        const proxima = queue
          .filter(it => it.status === 'pending' && it.nextRetryAt > Date.now())
          .reduce((min, it) => Math.min(min, it.nextRetryAt), Infinity);
        const delta = Math.max(500, proxima - Date.now());
        if(flushTimer) clearTimeout(flushTimer);
        flushTimer = setTimeout(processQueue, delta);
        setStatus('offline', 'Reintentando en '+Math.ceil(delta/1000)+'s…');
      } else if(stats.dead > 0 && stats.pending === 0){
        setStatus('error', stats.dead+' registro(s) fallidos');
        syncToast('Hay '+stats.dead+' registro(s) que no se pudieron sincronizar. Revisa Configuración → Sincronización.', 'warn');
      } else if(stats.pending > 0){
        // Hay más pendientes elegibles ahora mismo, agendar continuación
        if(flushTimer) clearTimeout(flushTimer);
        flushTimer = setTimeout(processQueue, 100);
      } else {
        setStatus('online', 'En vivo');
      }
    } catch(fatal){
      console.error('[sync] error fatal en processQueue:', fatal);
      setStatus('offline', 'Error temporal');
      if(flushTimer) clearTimeout(flushTimer);
      flushTimer = setTimeout(processQueue, 5000);
    } finally {
      window.posSyncRunning = false;
    }
  }

  // Alias retro-compat con el nombre anterior (otras partes del módulo lo llaman)
  const flushQueue = processQueue;

  // ============================================================
  //  API PÚBLICA: las funciones que reemplazan a save()/saveAll()
  //  para uso fila-por-fila. La app puede seguir llamando save(k)
  //  y nosotros detectamos diffs, PERO la forma correcta es usar:
  //    posSync.upsert('productos', objProducto)
  //    posSync.remove('productos', id)
  // ============================================================
  const api = {
    DEVICE_ID,
    TENANT,
    isReady: ()=>ready,
    isOnline: ()=>online,

    // Refresca el estado del badge sin disparar ningún flush. Útil cuando
    // hay cambios en la cola pendiente (p. ej. después de una venta) y
    // queremos actualizar el conteo "X pendientes" sin sincronizar todavía.
    refreshStatus(){
      try{
        const s = queueStats();
        if(!online){ setStatus('offline', 'Sin conexión'); return; }
        if(s.pending === 0 && s.dead === 0){ setStatus('online', 'Sincronizado'); return; }
        if(s.dead > 0 && s.pending === 0){ setStatus('error', s.dead+' fallidos'); return; }
        // Hay pendientes pero estamos online — sync diferido a 3 horas.
        setStatus('online', 'Local');
      }catch(e){}
    },

    // Upsert local + nube
    upsert(coleccion, item){
      if(!item || !item.id) item.id = uid();
      // Actualizar arreglo local
      if(Array.isArray(window.DB[coleccion])){
        const arr = window.DB[coleccion];
        const idx = arr.findIndex(x => x.id === item.id);
        if(idx >= 0) arr[idx] = item; else arr.push(item);
        try{ localStorage.setItem(window.STORE[coleccion], JSON.stringify(arr)); }catch(e){}
      }
      // Encolar push
      if(!applyingRemote){
        enqueue({ op:'upsert', coleccion, id: item.id, row: toRow(coleccion, item) });
      }
      return item;
    },

    // Soft delete
    remove(coleccion, id){
      if(Array.isArray(window.DB[coleccion])){
        window.DB[coleccion] = window.DB[coleccion].filter(x => x.id !== id);
        try{ localStorage.setItem(window.STORE[coleccion], JSON.stringify(window.DB[coleccion])); }catch(e){}
      }
      if(!applyingRemote){
        enqueue({ op:'delete', coleccion, id });
      }
    },

    // Reemplaza la colección completa (útil para imports / restauración)
    replaceAll(coleccion, arr){
      if(!Array.isArray(arr)) return;
      window.DB[coleccion] = arr;
      try{ localStorage.setItem(window.STORE[coleccion], JSON.stringify(arr)); }catch(e){}
      if(applyingRemote) return;
      // Empuja todo
      for(const item of arr){
        if(!item.id) item.id = uid();
        enqueue({ op:'upsert', coleccion, id: item.id, row: toRow(coleccion, item) });
      }
    },

    // Guardar config / meta (singletons)
    saveConfig(){
      if(applyingRemote) return;
      enqueue({
        op:'upsert',
        coleccion:'config',
        id: TENANT+':config',
        row: { tenant_id: TENANT, clave: 'config', data: window.DB.config || {}, device_id: DEVICE_ID, updated_at: new Date().toISOString() }
      });
    },
    saveMeta(){
      if(applyingRemote) return;
      enqueue({
        op:'upsert',
        coleccion:'meta',
        id: TENANT+':meta',
        row: { tenant_id: TENANT, clave: 'meta', data: window.DB.meta || {}, device_id: DEVICE_ID, updated_at: new Date().toISOString() }
      });
    },

    // Forzar resincronización completa (pull)
    async resync(){
      try{ await pullAll(); syncToast('Resincronizado', 'ok'); }
      catch(e){ syncToast('Error al resincronizar', 'err'); console.error(e); }
    },

    // Forzar un flush inmediato de la cola (sin esperar el debounce de 250ms).
    // Devuelve una Promise que resuelve cuando termina el flush o reject si hay error.
    async flushNow(){
      if(flushTimer){ clearTimeout(flushTimer); flushTimer = null; }
      if(!supabase || !online){ throw new Error('Sin conexión'); }
      const stats = queueStats();
      if(stats.pending === 0 && stats.dead === 0){ setStatus('online', 'En vivo'); return; }
      await processQueue();
      const after = queueStats();
      if(after.pending > 0 && after.waiting === 0) throw new Error('Quedan '+after.pending+' pendientes');
    },

    // Estadísticas detalladas de la cola.
    getQueueStats(){
      const s = queueStats();
      const stats = {
        total:    s.total,
        pending:  s.pending,
        waiting:  s.waiting,   // pendientes esperando su backoff
        dead:     s.dead,
        porTabla: {},
        masVieja: null
      };
      for(const op of queue){
        const t = TABLES[op.coleccion] || op.coleccion;
        stats.porTabla[t] = (stats.porTabla[t]||0) + 1;
        if(op.createdAt && (!stats.masVieja || op.createdAt < stats.masVieja)) stats.masVieja = op.createdAt;
      }
      return stats;
    },

    // Devuelve los items muertos con sus errores para mostrar en UI.
    getDeadItems(){
      return queue.filter(it => it.status === 'dead').map(it => ({
        id:         it.id,
        coleccion:  it.coleccion,
        recordId:   it.recordId,
        op:         it.op,
        retries:    it.retries,
        lastError:  it.lastError,
        createdAt:  it.createdAt
      }));
    },

    // Resucitar todos los items muertos (resetea retries y nextRetryAt).
    // Útil cuando ya se arregló el problema externo (RLS, esquema, etc).
    retryDead(){
      let n = 0;
      for(const it of queue){
        if(it.status === 'dead'){
          it.status = 'pending';
          it.retries = 0;
          it.nextRetryAt = 0;
          it.lastError = null;
          n++;
        }
      }
      saveQueue();
      if(n > 0) scheduleFlush(50);
      return n;
    },

    // Eliminar un item específico de la cola (útil cuando se quiere
    // descartar un dead irrecuperable manualmente).
    dropItem(itemId){
      const antes = queue.length;
      queue = queue.filter(it => it.id !== itemId);
      saveQueue();
      return antes - queue.length;
    },

    // Limpiar la cola entera. Los datos locales no se tocan.
    clearQueue(){
      const n = queue.length;
      queue = [];
      saveQueue();
      if(flushTimer){ clearTimeout(flushTimer); flushTimer = null; }
      setStatus('online', 'En vivo');
      return n;
    },

    // Re-subir TODO lo local a la nube.
    async forceResync(){
      for(const k in TABLES){
        if(!Array.isArray(window.DB[k])) continue;
        for(const item of window.DB[k]){
          if(!item || !item.id) continue;
          enqueue({ op:'upsert', coleccion: k, id: item.id, row: toRow(k, item) });
        }
      }
      this.saveConfig();
      this.saveMeta();
      scheduleFlush(50);
    },

    // Limpieza de migración (para forzar volver a migrar)
    resetMigration(){
      localStorage.removeItem(MIGRATION_FLAG);
    }
  };
  window.posSync = api;

  // ============================================================
  //  SYNC DIFERIDO: timer de fondo + beforeunload
  //  ============================================================
  //  El usuario pidió que los pushes a la nube NO sean instantáneos
  //  sino cada 3 horas, y que antes de cerrar la app SE FUERCE el
  //  guardado. Implementamos eso con dos mecanismos:
  //
  //  1) backgroundTimer: cada BACKGROUND_FLUSH_MS dispara processQueue
  //     incondicionalmente. Si no hay items pendientes no hace nada,
  //     pero garantiza que si los hay, salgan al menos cada 3 horas.
  //
  //  2) beforeunload: si hay items pendientes y estamos online, lanza
  //     processQueue (no-await — el browser puede cancelarlo pero suele
  //     esperar fetches en vuelo) y pide confirmación al usuario.
  // ============================================================
  function arrancarBackgroundFlush(){
    if(backgroundTimer) clearInterval(backgroundTimer);
    backgroundTimer = setInterval(()=>{
      // Solo intentar si hay algo que sincronizar
      const s = queueStats();
      if(s.pending > 0 && online){
        try{ processQueue(); }catch(e){ console.warn('[sync] backgroundFlush:', e); }
      }
    }, BACKGROUND_FLUSH_MS);
  }
  arrancarBackgroundFlush();

  // beforeunload: forzar guardado antes de salir si hay cambios pendientes
  window.addEventListener('beforeunload', function(e){
    const s = queueStats();
    if(s.pending === 0 && s.dead === 0) return;     // todo sincronizado, OK cerrar
    // Lanzar flush en paralelo. El browser puede cancelar fetches en vuelo
    // si el usuario insiste en cerrar, pero generalmente espera 1-2s. Lo más
    // importante es que el dato YA está en localStorage (eso no se pierde).
    if(online && supabase){
      try{ processQueue(); }catch(_){}
    }
    // Pedir confirmación. Browsers modernos ignoran el texto custom y muestran
    // su propio diálogo de "¿Salir del sitio?". Lo importante es que aparezca.
    const msg = 'Hay '+s.pending+' cambio(s) sin sincronizar a la nube. ¿Cerrar de todos modos?';
    e.preventDefault();
    e.returnValue = msg;
    return msg;
  });

  // ============================================================
  //  HOOK COMPATIBILIDAD: interceptar save() viejo
  //  Si la app llama save('productos'), detectamos el diff con
  //  la versión que teníamos antes y subimos solo los cambios.
  // ============================================================
  // Snapshot por colección: { id: jsonString }
  // Guardamos STRINGS (no referencias) para evitar dos problemas:
  //   1) Mutaciones in-place (p.stock = x) no contaminan el snapshot.
  //   2) Comparar strings es ~3x más rápido que stringificar dos veces en el diff.
  let lastSnapshot = {};
  function snapshotKey(k){
    if(!Array.isArray(window.DB[k])) return null;
    const map = {};
    for(const item of window.DB[k]){
      if(item && item.id) map[item.id] = JSON.stringify(item);
    }
    return map;
  }

  function diffAndPush(k){
    if(!Array.isArray(window.DB[k])) return;
    const before = lastSnapshot[k] || {};
    const arr = window.DB[k];
    const afterIds = new Set();
    // Recorrido único: detectar nuevos/modificados y construir el snapshot nuevo
    const newSnap = {};
    for(const item of arr){
      if(!item || !item.id) continue;
      afterIds.add(item.id);
      const s = JSON.stringify(item);
      newSnap[item.id] = s;
      if(before[item.id] !== s){
        enqueue({ op:'upsert', coleccion: k, id: item.id, row: toRow(k, item) });
      }
    }
    // Eliminados: los que estaban en before y ya no están
    for(const id in before){
      if(!afterIds.has(id)){
        enqueue({ op:'delete', coleccion: k, id });
      }
    }
    lastSnapshot[k] = newSnap;
  }

  function hookLegacySave(){
    if(typeof window.save !== 'function' || typeof window.STORE === 'undefined'){
      setTimeout(hookLegacySave, 200);
      return;
    }
    // Snapshot inicial
    for(const k in TABLES){ lastSnapshot[k] = snapshotKey(k) || {}; }

    const origSave = window.save;
    window.save = function(k){
      const r = origSave.apply(this, arguments);
      if(applyingRemote || !k) return r;
      if(k === 'config'){ api.saveConfig(); return r; }
      if(k === 'meta'){   api.saveMeta();   return r; }
      if(TABLES[k]){ diffAndPush(k); }
      return r;
    };
  }

  // ============================================================
  //  REALTIME: suscripción fila-por-fila por tabla
  // ============================================================
  function subscribeRealtime(){
    if(!supabase) return;
    // Limpieza previa
    for(const ch of channels){ try{ supabase.removeChannel(ch); }catch(e){} }
    channels = [];

    const filter = 'tenant_id=eq.' + TENANT;

    // Una suscripción por tabla (más fiable que un canal multi-tabla)
    const tablas = Object.keys(TABLES).concat(['config']);
    for(const k of tablas){
      const tabla = (k === 'config') ? 'config' : TABLES[k];
      const ch = supabase
        .channel('rt_' + tabla + '_' + TENANT)
        .on('postgres_changes',
            { event: '*', schema: 'public', table: tabla, filter },
            (payload)=>handleRealtime(k, payload))
        .subscribe((status)=>{
          if(status === 'SUBSCRIBED' && online){ setStatus('online','En vivo'); }
        });
      channels.push(ch);
    }
  }

  function handleRealtime(coleccion, payload){
    const row = payload.new || payload.old;
    if(!row) return;
    if(row.device_id === DEVICE_ID) return; // eco de nuestro propio cambio

    applyingRemote = true;
    try{
      // CONFIG y META
      if(coleccion === 'config'){
        if(row.clave === 'config' && row.data){
          window.DB.config = Object.assign({}, window.CONFIG_DEFAULT || {}, row.data);
          try{ localStorage.setItem(window.STORE.config, JSON.stringify(window.DB.config)); }catch(e){}
        } else if(row.clave === 'meta' && row.data){
          window.DB.meta = Object.assign({folio:1,theme:'light'}, row.data);
          try{ localStorage.setItem(window.STORE.meta, JSON.stringify(window.DB.meta)); }catch(e){}
        }
        scheduleIncrementalRefresh('config');
        return;
      }

      // Entidades normales
      if(!Array.isArray(window.DB[coleccion])) window.DB[coleccion] = [];
      const arr = window.DB[coleccion];

      if(payload.eventType === 'DELETE' || row.deleted_at){
        const idx = arr.findIndex(x => x.id === row.id);
        if(idx >= 0) arr.splice(idx, 1);
      } else {
        const item = fromRow(coleccion, row);
        const idx = arr.findIndex(x => x.id === item.id);
        if(idx >= 0) arr[idx] = item; else arr.push(item);
      }
      try{ localStorage.setItem(window.STORE[coleccion], JSON.stringify(arr)); }catch(e){}
      // Actualizar snapshot para que el hook no re-emita
      lastSnapshot[coleccion] = snapshotKey(coleccion) || {};
      // Refrescar índices de productos si cambió esa colección
      if(coleccion === 'productos' && typeof window.rebuildProductIndex === 'function'){
        window.rebuildProductIndex();
      }
    } finally {
      applyingRemote = false;
    }

    // Agendar refresh incremental SOLO para la colección afectada.
    scheduleIncrementalRefresh(coleccion);
    setStatus('online', 'Actualizado');
    setTimeout(()=>{ if(online) setStatus('online','En vivo'); }, 1200);
  }

  // ============================================================
  //  REFRESH INCREMENTAL POR COLECCIÓN
  //  En lugar de re-renderizar TODA la vista (go(currentView)) ante
  //  cualquier cambio remoto, agrupamos los cambios por colección y
  //  llamamos solo la función pintar* específica. Si el usuario está
  //  en otra vista, ni siquiera hacemos nada visible.
  //  Los cambios en ráfaga se agrupan en un solo frame con rAF.
  // ============================================================
  const _pendingRefresh = new Set();
  let _refreshScheduled = false;
  function scheduleIncrementalRefresh(coleccion){
    _pendingRefresh.add(coleccion);
    if(_refreshScheduled) return;
    _refreshScheduled = true;
    // Usar rAF para agrupar múltiples eventos remotos en el mismo frame.
    // Si llegan 20 cambios en 16ms, hacemos 1 sólo refresh por colección.
    requestAnimationFrame(()=>{
      _refreshScheduled = false;
      const cols = Array.from(_pendingRefresh);
      _pendingRefresh.clear();
      try{ runIncrementalRefresh(cols); }
      catch(e){ console.warn('[sync] refresh incremental falló, fallback a re-render:', e);
        // Fallback robusto si algo falla: re-render completo de la vista
        try{
          const v = window.currentView;
          if(typeof window.go === 'function' && v){ window.go(v); }
        }catch(_){}
      }
      if(typeof window.updateBrand === 'function') window.updateBrand();
    });
  }

  function runIncrementalRefresh(cols){
    const v = window.currentView;
    // Si hay un modal abierto, evitamos invadir su contenido — solo refrescamos
    // las vistas de listado del fondo cuando el usuario no esté editando algo.
    const modalAbierto = !!(document.getElementById('modal-root') && document.getElementById('modal-root').classList.contains('show'));

    for(const coleccion of cols){
      switch(coleccion){
        case 'productos':
          // Vistas que muestran productos:
          if(v === 'productos' && typeof window.pintarProductos === 'function'){
            // Mantener el filtro de búsqueda actual
            const q = (document.getElementById('prodQ') && document.getElementById('prodQ').value) || '';
            window.pintarProductos(q);
          }
          // En POS, refrescar la lista del carrito (los precios/stock pueden haber cambiado)
          if(v === 'ventas' && typeof window.renderCart === 'function' && !modalAbierto){
            window.renderCart();
          }
          break;
        case 'clientes':
          if(v === 'clientes' && typeof window.pintarClientes === 'function' && !modalAbierto){
            const q = (document.getElementById('cliQ') && document.getElementById('cliQ').value) || '';
            window.pintarClientes(q);
          }
          break;
        case 'facturas':
          if(v === 'facturas' && typeof window.pintarFacturas === 'function' && !modalAbierto){
            window.pintarFacturas();
          }
          if(v === 'dashboard' && typeof window.renderDashboard === 'function'){
            window.renderDashboard();
          }
          break;
        case 'compras':
          if(v === 'compras' && typeof window.renderCompras === 'function' && !modalAbierto){
            window.renderCompras();
          }
          break;
        case 'gastos':
          if(v === 'gastos' && typeof window.pintarGastos === 'function' && !modalAbierto){
            window.pintarGastos();
          }
          break;
        case 'proveedores':
          if(v === 'compras' && typeof window.renderCompras === 'function' && !modalAbierto){
            window.renderCompras();
          }
          break;
        case 'plantillas':
          if(v === 'config' && typeof window.pintarPlantillas === 'function' && !modalAbierto){
            window.pintarPlantillas();
          }
          break;
        case 'config':
          if(v === 'config' && typeof window.renderConfig === 'function' && !modalAbierto){
            window.renderConfig();
          }
          if(typeof window.updateBrand === 'function') window.updateBrand();
          break;
      }
    }
  }

  // ============================================================
  //  REFRESCAR VISTA COMPLETA (legacy, ya casi no se usa)
  // ============================================================
  function refreshCurrentView(){
    try{
      const v = window.currentView;
      if(typeof window.go === 'function' && v){ window.go(v); }
      if(typeof window.updateBrand === 'function') window.updateBrand();
    }catch(e){ console.warn('[sync] refresh view', e); }
  }

  // ============================================================
  //  ARRANQUE
  // ============================================================
  async function start(){
    if(!initClient()) return;
    setStatus('syncing','Conectando…');
    hookLegacySave();

    try{
      await maybeMigrate();
      await pullAll();
      subscribeRealtime();
      // Flush de cola pendiente si quedó algo
      scheduleFlush(500);
    }catch(err){
      console.error('[sync] arranque', err);
      setStatus('error','Error de sync');
    }

    // Eventos de conectividad
    window.addEventListener('online', ()=>{
      online = true;
      setStatus('syncing','Reconectando…');
      pullAll().then(()=>scheduleFlush(500)).catch(()=>{});
    });
    window.addEventListener('offline', ()=>{
      online = false;
      setStatus('offline','Sin conexión');
    });

    // Resincronización periódica de seguridad cada 5 minutos
    setInterval(()=>{ if(online) pullAll().catch(()=>{}); }, 5*60*1000);
  }

  if(document.readyState === 'loading'){
    window.addEventListener('DOMContentLoaded', ()=>setTimeout(start, 400));
  } else {
    setTimeout(start, 400);
  }
})();
</script>

</body>
