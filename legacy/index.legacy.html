}

// Confirma: revalida, cierra modal y llama al callback con la cantidad.
// Stock NO se valida aquí (es advertencia visual, no bloqueo).
// Único bloqueo: cantidad numérica ≤ 0.
function __mcConfirm(){
  const st = window.__mcState || {};
  const i = document.getElementById('mcCant');
  if(!i || !st.onConfirm) return;
  const raw = String(i.value).trim();
  // Vacío → default 1
  const cant = raw === '' ? 1 : parseInt(raw, 10);
  if(isNaN(cant) || cant <= 0){
    toast('Cantidad inválida','err');
    return;
  }
  // Advertencia (no bloqueo) si excede stock: deja al usuario decidir.
  if(cant > st.stockDisp){
    toast(
      st.stockDisp <= 0
        ? `Sin stock — agregado igual (${fmt(cant)})`
        : `Excede stock (${fmt(st.stockDisp)}) — agregado igual`,
      'warn'
    );
  }
  const cb = st.onConfirm;
  window.__mcState = null;
  closeModal();
  cb(cant);
}

function cartCalc(){
  let subtotal=0,desc=0,costoTotal=0;
  cart.forEach(c=>{const linea=c.precio*c.cantidad; subtotal+=linea; desc+=num(c.desc)*c.cantidad; costoTotal+=c.costo*c.cantidad;});
  const total=Math.max(0,subtotal-desc);
  const utilidad=total-costoTotal;
  return {subtotal,desc,total,utilidad,costoTotal};
}

function confirmarVenta(){
  const t=cartCalc();
  let metodo='',recibido=0,cambio=0;
  if(payMode==='mixto'){
    const sum=payments.efectivo+payments.transferencia+payments.qr+payments.tarjeta;
    if(sum<t.total-0.5){toast('El pago mixto no cubre el total','warn');return;}
    metodo='Mixto ('+Object.entries(payments).filter(([k,v])=>v>0).map(([k,v])=>k+': '+money(v)).join(', ')+')';
    recibido=sum;cambio=Math.max(0,sum-t.total);
  }else{
    metodo={efectivo:'Efectivo',transferencia:'Transferencia',qr:'QR',tarjeta:'Tarjeta'}[payMethod];
    if(payMethod==='efectivo'){recibido=num($('#recibido')?.value);if(recibido<t.total-0.5){toast('El efectivo recibido es menor al total','warn');return;}cambio=recibido-t.total;}
    else{recibido=t.total;}
  }

  // ====== OFFLINE-FIRST: construir factura ======
  const fac={
    id:uid(),folio:DB.meta.folio,fecha:new Date().toISOString(),
    clienteId:saleClient?saleClient.id:null,
    clienteNombre:saleClient?saleClient.nombre:'Cliente General',
    clienteNegocio:saleClient?saleClient.negocio:'', clienteTel:saleClient?saleClient.telefono:'', clienteDir:saleClient?saleClient.direccion:'',
    items:cart.map(c=>({id:c.id,codigo:c.codigo,nombre:c.nombre,precio:c.precio,costo:c.costo,cantidad:c.cantidad,desc:num(c.desc)})),
    subtotal:t.subtotal,descuento:t.desc,total:t.total,utilidad:t.utilidad,
    metodo,recibido,cambio
  };

  // 1) ACTUALIZAR ESTADO EN MEMORIA (instantáneo, sin tocar disco)
  //    El stock y la factura quedan disponibles inmediatamente para
  //    imprimirFactura() y el render del modal.
  DB.meta.folio++;
  DB.facturas.push(fac);
  cart.forEach(c=>{
    const p=DB.productos.find(x=>x.id===c.id);
    if(p) p.stock=num(p.stock)-c.cantidad;
  });

  // 2) CERRAR MODAL DE PAGO Y DISPARAR IMPRESIÓN ANTES QUE NADA.
  //    El orden importa: window.print() entra a la cola del navegador al
  //    final de TODO el JS síncrono que esté corriendo. Si antes hacemos
  //    ventaCerradaModal(fac) + renderCart(), el print espera a que esos
  //    terminen. Disparando imprimirFactura primero, el resto corre en
  //    paralelo mientras el browser prepara el diálogo de print.
  closeModal();
  cart=[]; saleClient=null;

  const c = DB.config;
  let imprimiendo = false;
  if(c.cajonActivo){
    if(c.cajonMetodo==='serial'){
      enviarKickSerial();
    }
    if(c.cajonImprimir){
      imprimirFactura(fac.id);   // ← entra a cola del navegador AHORA
      imprimiendo = true;
    }
  }

  // 3) UI POST-IMPRESIÓN: el resto de UI corre después. Si NO estamos
  //    imprimiendo (cajón desactivado), mostramos el modal "Venta exitosa".
  //    Si SÍ estamos imprimiendo, no abrimos otro modal encima del diálogo
  //    nativo del navegador — sería confuso para el usuario.
  beep();
  toast('Venta #'+fac.folio+' registrada · '+money(fac.total),'ok');
  setSyncStatus('printing','Imprimiendo…');
  renderCart();
  if(!imprimiendo){
    ventaCerradaModal(fac);
  }

  // 4) PERSISTIR + SINCRONIZAR EN IDLE, después de que el navegador haya
  //    pintado el modal y disparado el diálogo de impresión. Encolamos al
  //    sync por ITEM (factura nueva + solo los productos del carrito) para
  //    evitar que diffAndPush recorra TODAS las colecciones en cada venta.
  const productosTocados = fac.items
    .map(it => DB.productos.find(p => p.id === it.id))
    .filter(Boolean);

  const persistir = () => {
    try{
      // localStorage: inevitablemente reescribe la colección completa, pero
      // ahora ocurre DESPUÉS del print, no antes. No bloquea la impresión.
      save('facturas');
      save('productos');
      save('meta');
    }catch(e){ console.error('Error al persistir venta', e); }

    // Empuje a Supabase: solo lo que cambió (no diff completo de colecciones).
    // NOTA: el push NO se ejecuta ahora — solo se ENCOLA. El sync real ocurre
    // cada 3 horas (BACKGROUND_FLUSH_MS) o al cerrar la app (beforeunload).
    // Esta decisión es para no saturar la red en cada venta. Si querés
    // sincronizar manualmente, hay un botón "💾 Sincronizar ahora" en el badge.
    if(window.posSync && typeof window.posSync.upsert==='function'){
      try{ window.posSync.upsert('facturas', fac); }catch(e){}
      productosTocados.forEach(p => {
        try{ window.posSync.upsert('productos', p); }catch(e){}
      });
      if(typeof window.posSync.saveMeta==='function'){
        try{ window.posSync.saveMeta(); }catch(e){}
      }
    }

    // Actualizar el badge con conteo de pendientes (no dispara flush).
    if(window.posSync && typeof window.posSync.refreshStatus==='function'){
      try{ window.posSync.refreshStatus(); }catch(e){}
    }
  };

  // requestIdleCallback corre cuando el navegador esté libre — típicamente
  // después de que el diálogo de impresión se haya pintado. Fallback para
  // navegadores que no lo soporten (Safari < 16): setTimeout con 250ms.
  if(typeof requestIdleCallback==='function'){
    requestIdleCallback(persistir, { timeout: 2000 });
  } else {
    setTimeout(persistir, 250);
  }
}

let _serialPort=null, _serialWriter=null;
function cajonConectado(){return !!_serialWriter;}
function hexABytes(hex){
  const limpio=(hex||'').replace(/0x/gi,'').replace(/[^0-9a-fA-F]/g,'');
  const arr=[];for(let i=0;i+1<limpio.length;i+=2)arr.push(parseInt(limpio.substr(i,2),16));
  return new Uint8Array(arr.length?arr:[0x1B,0x70,0x00,0x19,0xFA]);
}
async function conectarCajonSerial(){
  if(!('serial' in navigator)){toast('Tu navegador no permite conexión directa. Usa Chrome o Edge en computador.','err');return;}
  try{
    const port=await navigator.serial.requestPort();
    await port.open({baudRate:num(DB.config.cajonBaud)||9600});
    _serialPort=port;_serialWriter=port.writable.getWriter();
    DB.config.cajonMetodo='serial';DB.config.cajonActivo=true;save('config');
    toast('Cajón conectado','ok');pintarCajon();
  }catch(e){
    console.error(e);
    if(e&&e.name==='NotFoundError')toast('No seleccionaste ningún puerto','warn');
    else toast('No se pudo conectar al puerto','err');
  }
}
async function reconectarCajonSerial(){
  if(!('serial' in navigator))return;
  try{
    const ports=await navigator.serial.getPorts();
    if(ports.length){const port=ports[0];await port.open({baudRate:num(DB.config.cajonBaud)||9600});_serialPort=port;_serialWriter=port.writable.getWriter();}
  }catch(e){/* silencioso: requiere reconexión manual */}
}
async function enviarKickSerial(){
  if(!_serialWriter){toast('El cajón no está conectado','warn');return false;}
  try{await _serialWriter.write(hexABytes(DB.config.cajonKick));return true;}
  catch(e){console.error(e);toast('No se pudo enviar la señal al cajón','err');_serialWriter=null;return false;}
}
async function probarCajon(){
  if(DB.config.cajonMetodo==='serial'){
    if(!_serialWriter)await conectarCajonSerial();
    const ok=await enviarKickSerial();if(ok)toast('Señal enviada al cajón','ok');
  }else{
    previewRecibo();
  }
}
/* Se llama al registrar cada venta.
   NOTA: a partir de la optimización de impresión rápida, la auto-impresión
   ya NO se dispara desde aquí — cobrar() llama imprimirFactura() de forma
   síncrona ANTES de la persistencia y el sync, para que el diálogo de
   impresión aparezca instantáneamente. Esta función queda solo como kick
   del cajón cuando el método es 'serial'.
   Si se invoca manualmente desde otro flujo (no cobrar), aún imprime. */
function dispararCajon(fac){
  const c=DB.config;if(!c.cajonActivo)return;
  if(c.cajonMetodo==='serial'){enviarKickSerial();}

  // cobrar() (p.ej. desde un botón manual), imprimir queda disponible.
  else if(c.cajonImprimir&&fac){setTimeout(()=>imprimirFactura(fac.id),50);}
}

function procesarCodigoEscaneado(code){
  // Búsqueda O(1) por índice Map. Crítico en lector pistola/USB que dispara
  // un keypress por carácter a alta velocidad.
  const p=findProductoExact(code);

function lectorPistolaKeydown(e){
  const c=DB.config;
  if(currentView!=='ventas')return;
  if(c.lector!=='pistola'&&c.lector!=='ambos')return;
  const ae=document.activeElement;
  if(ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName))return; // si escribe en un campo, lo maneja ese campo
  const now=Date.now();
  if(now-_gunLast>50)_gunBuf='';     // los lectores teclean muy rápido; un humano no
  _gunLast=now;
  if(e.key==='Enter'){
    const code=_gunBuf.trim();_gunBuf='';
    if(code.length>=3)procesarCodigoEscaneado(code);
    return;
  }
  if(e.key&&e.key.length===1)_gunBuf+=e.key;
}

/* ============================================================
   PREPARAR IMPRESIÓN POS (anti shrink-to-fit definitivo)
   ============================================================
   Setea el HTML del ticket, mide su altura REAL en mm, y aplica
   @page { size: anchoMM alturaMM } con dimensiones EXACTAS.

   Por qué esto importa: CSS @page { size: 80mm auto } NO significa
   "altura ilimitada como rollo térmico" — significa "altura por
   defecto del navegador" (≈297mm en Chrome). Cuando el ticket es
   más largo que eso, Chrome aplica un scale global para meterlo
   en la "página", encogiendo proporcionalmente toda la fuente.
   Por eso facturas largas salían con letra chica y facturas
   cortas con letra grande — el ratio dependía del contenido.

   Solución: medimos scrollHeight en píxeles CSS, convertimos a
   milímetros (1mm = 96/25.4 px en CSS print), y le decimos al
   @page que use exactamente ese tamaño. El browser ya no tiene
   que "encajar" nada: el papel virtual coincide con el contenido.
   ============================================================ */
function prepararImpresionPOS(html, anchoMM){
  anchoMM = num(anchoMM) || 80;
  const pa = $('#printArea');
  if(!pa) return;
  pa.innerHTML = html;

  // Mostrar el printArea OFF-SCREEN para que el navegador calcule layout.
  // visibility:hidden mantiene el cálculo de tamaño; position:fixed con
  // left negativo lo saca del viewport visible sin afectar el flujo.
  // Guardamos el style anterior por si hubiera alguno custom.
  const stylePrev = pa.getAttribute('style');
  pa.style.cssText = `display:block;visibility:hidden;position:fixed;left:-99999px;top:0;width:${anchoMM}mm;height:auto;background:#fff;color:#000;margin:0;padding:0;`;
  // Forzar reflow síncrono para que scrollHeight refleje la altura real.
  void pa.offsetHeight;
  const alturaPx = pa.scrollHeight;
  // Restaurar el style original (vuelve a quedar oculto por el CSS por defecto).
  if(stylePrev !== null) pa.setAttribute('style', stylePrev);
  else pa.removeAttribute('style');

  // Conversión px CSS → mm. En CSS print, 1 inch = 96px = 25.4mm.
  // Así que 1mm = 96/25.4 ≈ 3.7795px. Agregamos +8mm de margen de seguridad
  // por si las fuentes o la impresora interpretan un par de px de más.
  const alturaMM = Math.max(50, Math.ceil(alturaPx * 25.4 / 96) + 8);

  let st = document.getElementById('printSize');
  if(!st){ st = document.createElement('style'); st.id = 'printSize'; document.head.appendChild(st); }
  // size con dos valores (ancho alto) le dice al navegador EXACTAMENTE qué
  // página crear. Sin "auto" no hay shrink-to-fit posible.
  st.textContent = `@media print{
    body.print-pos #printArea{ width:${anchoMM}mm !important; }
    body.print-pos @page{ size:${anchoMM}mm ${alturaMM}mm; margin:0; }
  }`;
}
function _setPrintMode(modo){
  // 'pos' | 'carta' — agrega la clase al body y elimina la otra.
  document.body.classList.remove('print-pos','print-carta');
  document.body.classList.add('print-'+modo);
}
function _clearPrintMode(){
  document.body.classList.remove('print-pos','print-carta');
}
function imprimirFactura(id){

function pdfFactura(id){
  const fac=DB.facturas.find(f=>f.id===id);if(!fac){toast('Factura no encontrada','err');return;}
  const pl=plantillaActiva();
  if(typeof html2canvas==='undefined'||!window.jspdf)return pdfFacturaTexto(fac,pl);
  toast('Generando PDF…','info');
  const cont=document.createElement('div');
  cont.style.cssText=`position:fixed;left:-10000px;top:0;width:${num(pl.ancho)||80}mm;background:#fff`;
  cont.innerHTML=reciboHTML(fac,pl);
  document.body.appendChild(cont);
  const render=()=>html2canvas(cont,{scale:3,backgroundColor:'#ffffff',useCORS:true}).then(canvas=>{
    try{
      const {jsPDF}=window.jspdf;
      const wmm=num(pl.ancho)||80, hmm=wmm*(canvas.height/canvas.width);
      const doc=new jsPDF({unit:'mm',format:[wmm,hmm]});
      doc.addImage(canvas.toDataURL('image/png'),'PNG',0,0,wmm,hmm);
      doc.save('Factura-'+fac.folio+'.pdf');toast('PDF generado','ok');
    }catch(e){console.error(e);toast('No se pudo generar el PDF','err');}
    finally{cont.remove();}
  }).catch(e=>{console.error(e);toast('No se pudo generar el PDF','err');cont.remove();});
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(()=>setTimeout(render,120));}else{setTimeout(render,200);}
}
function pdfFacturaTexto(fac,pl){
  try{
    const {jsPDF}=window.jspdf;const c=DB.config;
    const W=num(pl.ancho)||80, right=W-5, cx=W/2;
    const doc=new jsPDF({unit:'mm',format:[W,300]});let y=8;
    const center=(t,size,bold)=>{doc.setFont('courier',bold?'bold':'normal');doc.setFontSize(size);doc.text(String(t),cx,y,{align:'center'});y+=size*0.45+1.5;};
    const row=(l,r,bold)=>{doc.setFont('courier',bold?'bold':'normal');doc.setFontSize(8);doc.text(String(l),5,y);doc.text(String(r),right,y,{align:'right'});y+=4;};
    const dash=()=>{doc.setLineDashPattern([1,1],0);doc.line(5,y,right,y);y+=3;};
    center(c.negocio,11,true);
    if(c.nit)center('NIT '+c.nit,8); if(c.regimen)center(c.regimen,8);
    if(c.direccion)center(c.direccion,8); if(c.ciudad)center(c.ciudad,8); center('Tel: '+c.telefono,8);
    dash();center(pl.tituloDoc||'REMISIÓN',9,true);
    row('Numero:',(pl.prefijoFolio||'')+fac.folio);row('Fecha:',new Date(fac.fecha).toLocaleDateString('es-CO'));row('Cliente:',String(fac.clienteNombre).slice(0,20));dash();
    // cabecera de columnas
    doc.setFont('courier','bold');doc.setFontSize(8);
    doc.text('Cant',5,y);doc.text('Producto',13,y);doc.text('Vr/Unit',right-16,y,{align:'right'});doc.text('Valor',right,y,{align:'right'});y+=4;
    fac.items.forEach(i=>{
      doc.setFont('courier','normal');doc.setFontSize(8);
      doc.text(String(fmt(i.cantidad)),5,y);
      const nom=doc.splitTextToSize(String(i.nombre),W-42);
      doc.text(nom,13,y);
      doc.text(money(i.precio),right-16,y,{align:'right'});
      doc.text(money((i.precio-i.desc)*i.cantidad),right,y,{align:'right'});
      y+=Math.max(nom.length*3.6,4);
    });
    dash();row('Subtotal:',money(fac.subtotal));if(fac.descuento)row('Descuento:','-'+money(fac.descuento));
    doc.setFont('courier','bold');doc.setFontSize(11);doc.text('TOTAL:',5,y);doc.text(money(fac.total),right,y,{align:'right'});y+=6;
    if(pl.mostrarMetodo)row(String(fac.metodo)+':',money(fac.recibido||fac.total));
    dash();center(pl.pie1||c.mensaje1||'',8);center(pl.pie2||c.mensaje2||'',8);
    doc.save('Factura-'+fac.folio+'.pdf');toast('PDF generado','ok');
  }catch(e){console.error(e);toast('No se pudo generar el PDF','err');}
}

/* ============================================================
   SISTEMA DUAL DE IMPRESIÓN — POS 80mm + CARTA empresarial
   ============================================================
   Estructura:
   - imprimirFactura(id)        → POS 80mm (existente, no cambia)
   - imprimirFacturaCarta(id)   → Carta empresarial (nuevo)

/* ------- PDF Carta empresarial ------- */
function pdfFacturaCarta(id){
  const fac=DB.facturas.find(f=>f.id===id);
  if(!fac){toast('Factura no encontrada','err');return;}
  if(typeof html2canvas==='undefined'||!window.jspdf){
    toast('PDF carta requiere html2canvas/jsPDF; usando impresión','warn');
    return imprimirFacturaCarta(id);
  }
  toast('Generando PDF tamaño carta…','info');
  const cont=document.createElement('div');
  // 794px ≈ 210mm a 96 DPI; usamos 816px (8.5"=letter) para más fidelidad letter
  cont.style.cssText='position:fixed;left:-10000px;top:0;width:816px;background:#fff';
  cont.innerHTML=renderPrintCarta(fac);
  document.body.appendChild(cont);
  const render=()=>html2canvas(cont,{scale:2,backgroundColor:'#ffffff',useCORS:true}).then(canvas=>{
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({unit:'mm',format:'letter',orientation:'portrait'});
      const pageW=216, pageH=279; // Letter en mm
      const imgRatio=canvas.height/canvas.width;
      const imgW=pageW, imgH=pageW*imgRatio;
      if(imgH<=pageH){
        // cabe en una sola página
        doc.addImage(canvas.toDataURL('image/png'),'PNG',0,0,imgW,imgH);
      }else{
        // dividir en varias páginas
        let yPos=0;
        const pxPerMM=canvas.width/pageW;
        const pagePx=Math.floor(pageH*pxPerMM);
        while(yPos<canvas.height){
          const sliceH=Math.min(pagePx, canvas.height-yPos);
          const tmpC=document.createElement('canvas');
          tmpC.width=canvas.width; tmpC.height=sliceH;
          const ctx=tmpC.getContext('2d');
          ctx.fillStyle='#fff';ctx.fillRect(0,0,tmpC.width,tmpC.height);
          ctx.drawImage(canvas,0,yPos,canvas.width,sliceH,0,0,canvas.width,sliceH);
          if(yPos>0) doc.addPage();
          doc.addImage(tmpC.toDataURL('image/png'),'PNG',0,0,pageW,sliceH/pxPerMM);
          yPos+=sliceH;
        }
      }
      doc.save('Factura-Carta-'+fac.folio+'.pdf');
      toast('PDF generado','ok');
    }catch(e){console.error(e);toast('No se pudo generar el PDF','err');}
    finally{cont.remove();}
  }).catch(e=>{console.error(e);toast('No se pudo generar el PDF','err');cont.remove();});
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(()=>setTimeout(render,140));}
  else{setTimeout(render,220);}
}

      <div>
        <label class="lbl">📅 Desde</label>
        <input class="input" type="date" id="cierreDesde" value="${cierreEstado.desde}" oninput="cierreSetFecha('desde',this.value)">
      </div>
      <div>
        <label class="lbl">📅 Hasta</label>
        <input class="input" type="date" id="cierreHasta" value="${cierreEstado.hasta}" oninput="cierreSetFecha('hasta',this.value)">
      </div>
    </div>
  </div>

  <!-- ===== CONTENIDO DEL CIERRE ===== -->
  <div id="cierreContenido"></div>`;
  pintarCierre();
}

function cierrePreset(p){
  const hoy = todayISO();
  const d = new Date();
  let desde = hoy, hasta = hoy;
  if(p==='hoy'){ desde = hoy; hasta = hoy; }
  else if(p==='ayer'){
    const a = new Date(d); a.setDate(d.getDate()-1);
    desde = hasta = a.toISOString().slice(0,10);
  }
  else if(p==='semana'){
    const i = new Date(d); i.setDate(d.getDate()-d.getDay());
    desde = i.toISOString().slice(0,10); hasta = hoy;
  }
  else if(p==='mes'){ desde = hoy.slice(0,8)+'01'; hasta = hoy; }
  else if(p==='custom'){
    cierreEstado.preset='custom'; _cierreMarcarPreset(); return;
  }
  cierreEstado = { desde, hasta, preset: p };
  if($('#cierreDesde')) $('#cierreDesde').value = desde;
  if($('#cierreHasta')) $('#cierreHasta').value = hasta;
  _cierreMarcarPreset();
  pintarCierre();
}

function cierreSetFecha(campo, val){
  cierreEstado[campo] = val;
  cierreEstado.preset = 'custom';
  _cierreMarcarPreset();
  pintarCierre();
}

function _cierreMarcarPreset(){
  $$('#cierrePresets [data-rp]').forEach(b=>b.classList.toggle('on', b.dataset.rp===cierreEstado.preset));
}

/* ---- Helpers de UI ---- */
function _kvLinea(k, v){
  return `<div class="flex items-center justify-between" style="padding:6px 0">
    <span style="color:var(--text-soft);font-weight:600">${k}</span>
    <span style="font-weight:600;text-align:right">${v}</span>
  </div>`;
}
function _fechaBonita(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

/* ============================================================
   IMPRESIÓN POS 80mm — INFORME DE CIERRE DE CAJA
   ============================================================
   Formato térmico configurable a partir de DB.config.cierrePlantilla.
   El usuario puede personalizar tipografía, secciones, orden,
   encabezado y pie desde el editor visual en el módulo "Cierre de Caja".
   Usa #printArea (NO #printAreaCarta).
   ============================================================ */
function informePOSHTML(r, desde, hasta, cpOverride){
  const c = DB.config;
  const cp = cpOverride || cierrePlantilla();
  const tkt = r.nFac > 0 ? r.ventas / r.nFac : 0;
  const cats = Object.entries(r.gastosPorCat||{}).sort((a,b)=>b[1]-a[1]);
  const ahora = new Date();
  const hora = ahora.toLocaleString('es-CO',{hour:'2-digit',minute:'2-digit',hour12:true});
  const fechaImp = ahora.toLocaleString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});
  const negocio = c.negocio || 'PetPOS';
  const txt = s => {
    const out = esc(String(s==null?'':s));
    return cp.mayusculas ? out.toUpperCase() : out;
  };

  // Estilos derivados de la plantilla
  const base = num(cp.tamBase) || 13;
  const lineH = num(cp.interlineado) || 1.4;
  const col = cp.color || '#000';
  const fuente = cp.fuente || "'Courier New', 'Roboto Mono', monospace";
  const sepStyle = cp.separador === 'none'
    ? 'none'
    : `${cp.separador||'dashed'} ${col}`;
  const fwEnc = cp.encNegrita ? 'bold' : 'normal';

  // Helper para fila etiqueta/valor.
  // Usamos <table width="100%"> en vez de flex porque las tablas se comportan
  // de forma mucho más predecible en @media print — el flex puede colapsar el
  // ancho cuando el contenido es muy corto, dejando aire injustificado a la
  // derecha del papel. Con tabla, el valor SIEMPRE pega al borde derecho.
  const sep = cp.separador === 'none'
    ? '<div style="height:6px"></div>'
    : `<div style="border-top:1px ${sepStyle};margin:6px 0"></div>`;
  const dblSep = cp.separador === 'none'
    ? '<div style="height:8px"></div>'
    : `<div style="border-top:3px double ${col};margin:6px 0"></div>`;
  const titulo = (t) => `<div style="text-align:center;font-weight:${fwEnc};font-size:${base+2}px;margin:4px 0 4px 0;letter-spacing:.05em">${txt(t)}</div>
    <div style="text-align:center;font-size:${base}px;margin-bottom:4px;letter-spacing:.1em">${'='.repeat(t.length)}</div>`;
  // kv ahora produce una FILA DE TABLA. El primer td (etiqueta) queda a la
  // izquierda; el segundo (valor) tiene text-align:right y white-space:nowrap
  // para garantizar que pegue al borde derecho del papel sin partirse.
  const kv = (k, v, bold) => `<tr style="${bold?'font-weight:bold;':''}">
    <td style="text-align:left;padding:2px 0;vertical-align:baseline">${txt(k)}</td>
    <td style="text-align:right;padding:2px 0;white-space:nowrap;vertical-align:baseline">${v}</td>
  </tr>`;
  const linea = (texto) => `<tr><td colspan="2" style="padding:1px 0">${texto}</td></tr>`;
  // Wrapper: cualquier secuencia de kv() debe ir envuelta en wrapTable() para
  // que el navegador interprete las filas como una sola tabla width:100%.
  const wrapTable = (rows) => `<table style="width:100%;border-collapse:collapse;table-layout:fixed"><tbody>${rows}</tbody></table>`;

  // Rango legible
  const rangoTxt = (desde === hasta)
    ? `${_fechaBonita(desde)}`
    : `${_fechaBonita(desde)} a ${_fechaBonita(hasta)}`;

  // ============================================================
  // SECCIONES — cada una se construye en una closure que devuelve
  // HTML solo si su toggle (cp.secX) está activo.
  // ============================================================
  const blockGastos = cats.length
    ? cats.map(([cat,v]) => kv(cat+':', money(v))).join('')
    : `<tr><td colspan="2" style="text-align:center;font-style:italic;padding:2px 0">Sin gastos</td></tr>`;

  const secciones = {
    ventas: () => !cp.secVentas ? '' : `
      ${sep}
      ${titulo('VENTAS')}
      ${wrapTable(`
        ${kv('Facturas:', fmt(r.nFac))}
        ${kv('Ventas:', money(r.ventas))}
        ${cp.mostrarTktPromedio ? kv('Tkt promedio:', money(tkt)) : ''}
        ${cp.mostrarCostoVenta ? kv('Costo venta:', money(r.costoVenta)) : ''}
        ${cp.mostrarUtilidad ? kv('Utilidad:', money(r.utilidadBruta), true) : ''}
      `)}
    `,
    compras: () => !cp.secCompras ? '' : `
      ${sep}
      ${titulo('COMPRAS')}
      ${wrapTable(`
        ${kv('Total:', money(r.compras))}
        ${kv('N° compras:', fmt(r.nCompras))}
        ${kv('Credito nuevas:', money(r.creditoNuevoPeriodo))}
        ${kv('Abonos pagados:', money(r.abonosDelPeriodo))}
        ${kv('Contado:', money(r.compras - r.creditoNuevoPeriodo))}
      `)}
    `,
    gastos: () => !cp.secGastos ? '' : `
      ${sep}
      ${titulo('GASTOS')}
      ${wrapTable(`
        ${cp.mostrarGastosDetalle ? blockGastos : ''}
        ${cp.mostrarGastosDetalle && cats.length
          ? kv('TOTAL GASTOS:', money(r.gastos), true)
          : kv('Total:', money(r.gastos), true)}
      `)}
    `,
    caja: () => !cp.secCaja ? '' : `
      ${sep}
      ${titulo('CAJA')}
      ${wrapTable(`
        ${kv('Ingreso:', money(r.ventas))}
        ${kv('Salida compras:', money(r.compras))}
        ${kv('Salida gastos:', money(r.gastos))}
        ${kv('TOTAL SALIDA:', money(r.compras + r.gastos))}
      `)}
      ${sep}
      ${wrapTable(`
        ${kv('CAJA:', money(r.flujoCaja), true)}
        ${cp.mostrarUtilidad ? kv('Utilidad neta:', money(r.utilidadNeta), true) : ''}
      `)}
    `,
    inventario: () => !cp.secInventario ? '' : `
      ${sep}
      ${titulo('INVENTARIO')}
      ${wrapTable(`
        ${kv('SKUs:', fmt(r.invSKUs))}
        ${kv('Unidades:', fmt(r.invUnidades))}
        ${kv('Valor (costo):', money(r.invValorCosto))}
        ${kv('Stock bajo:', fmt(r.invBajoStock) + ' prod.')}
        ${kv('Agotados:', fmt(r.invSinStock) + ' prod.')}
      `)}
    `,
    porPagar: () => !cp.secPorPagar ? '' : `
      ${sep}
      ${titulo('POR PAGAR')}
      ${wrapTable(`
        ${kv('Saldo total:', money(r.cxpTotal))}
        ${kv('Vencido:', money(r.cxpVencido))}
        ${kv('Por vencer:', money(r.cxpPorVencer))}
        ${kv('N° facturas:', fmt(r.nFacturasPorPagar))}
      `)}
    `
  };

  // Renderizar secciones en el ORDEN definido por la plantilla
  const orden = Array.isArray(cp.ordenSecciones) && cp.ordenSecciones.length
    ? cp.ordenSecciones
    : CIERRE_SECCIONES_TODAS;
  const cuerpoSecciones = orden
    .filter(s => secciones[s])
    .map(s => secciones[s]())
    .join('');

  // ============================================================
  // ENCABEZADO Y PIE — también configurables
  // ============================================================
  const encabezadoLogo = (c.logo && cp.mostrarLogo && !c.ocultarLogoGlobal)
    ? `<div style="text-align:center;margin-bottom:4px"><img src="${c.logo}" style="max-width:60mm;max-height:${num(cp.tamLogo)||24}mm"></div>`
    : '';
  const encNegocio    = cp.mostrarNegocio   ? `<div style="text-align:center;font-weight:bold;font-size:${base+5}px;line-height:1.1">${txt(negocio)}</div>` : '';
  const encNIT        = (cp.mostrarNIT && c.nit) ? `<div style="text-align:center">NIT ${txt(c.nit)}</div>` : '';
  const encDir        = (cp.mostrarDireccion && c.direccion) ? `<div style="text-align:center">${txt(c.direccion)}</div>` : '';
  const encCiudad     = (cp.mostrarCiudad && c.ciudad) ? `<div style="text-align:center">${txt(c.ciudad)}</div>` : '';
  const encTel        = (cp.mostrarTelefono && c.telefono) ? `<div style="text-align:center">Tel: ${txt(c.telefono)}</div>` : '';

  const tituloDoc = cp.tituloDoc || 'CIERRE DE CAJA';
  const bloqueTitulo = `
    ${dblSep}
    <div style="text-align:center;font-weight:bold;font-size:${base+3}px;letter-spacing:.06em">${txt(tituloDoc)}</div>
    <div style="text-align:center;font-size:${base-1}px;margin-top:2px">${'='.repeat(Math.max(6,tituloDoc.length))}</div>
    ${dblSep}`;

  const bloqueFechaHora = cp.mostrarFechaHora
    ? `${kv('Fecha:', fechaImp)}${kv('Hora:', hora)}`
    : '';
  const bloquePeriodo = cp.mostrarPeriodo
    ? kv('Periodo:', rangoTxt)
    : '';
  // Las tres filas (fecha, hora, periodo) son filas de tabla, así que las
  // metemos en un solo wrapTable.
  const bloqueMeta = (bloqueFechaHora || bloquePeriodo)
    ? wrapTable(bloqueFechaHora + bloquePeriodo)
    : '';

  // Pie configurable
  const piePersonal1 = cp.pieMensaje1 ? `<div style="text-align:center;font-size:${base-1}px;margin-top:4px">${txt(cp.pieMensaje1)}</div>` : '';
  const piePersonal2 = cp.pieMensaje2 ? `<div style="text-align:center;font-size:${base-1}px;margin-top:2px">${txt(cp.pieMensaje2)}</div>` : '';
  const pieNegocio = cp.mostrarPieNegocio
    ? `<div style="text-align:center;font-weight:bold;font-size:${base+2}px;margin:4px 0">${txt(negocio)}</div>
       <div style="text-align:center;font-size:${base-1}px">${'='.repeat(negocio.length)}</div>`
    : '';
  const pieFechaGen = cp.mostrarFechaGeneracion
    ? `<div style="text-align:center;font-size:${base-1}px;margin-top:4px">Generado: ${fechaImp} ${hora}</div>
       <div style="text-align:center;font-size:${base-1}px;margin-top:2px">Cierre del periodo ${rangoTxt}</div>`
    : '';

  return `<div style="
    font-family:${fuente};
    font-size:${base}px;
    line-height:${lineH};
    color:${col};
    padding:6px 4px;
    width:100%;
    box-sizing:border-box;
  ">
    ${encabezadoLogo}
    ${encNegocio}
    ${encNIT}
    ${encDir}
    ${encCiudad}
    ${encTel}

    ${bloqueTitulo}

    ${bloqueMeta}

    ${cuerpoSecciones}

    ${dblSep}
    ${pieNegocio}
    ${piePersonal1}
    ${piePersonal2}
    ${pieFechaGen}
    <div style="text-align:center;margin-top:8px">.</div>
  </div>`;
}

/* Imprimir informe POS de un rango concreto */
function imprimirInformePOS(desde, hasta){
  if(!desde || !hasta){
    toast('Rango de fechas inválido','err');
    return;
  }
  if(desde > hasta){
    toast('La fecha "Desde" no puede ser mayor que "Hasta"','err');
    return;
  }
  const r = reporteRango(desde, hasta);
  const cp = cierrePlantilla();
  // Prepara HTML, mide altura real y setea @page con tamaño exacto.
  // Sin esto el navegador encogía la fuente cuando el cierre era largo.
  prepararImpresionPOS(informePOSHTML(r, desde, hasta), cp.ancho || 80);
  _setPrintMode('pos');
  toast('Imprimiendo cierre…','info');
  window.print();
  setTimeout(_clearPrintMode, 400);
}

/* Wrapper que usa el rango activo de la vista Cierre */
function imprimirInformePOSActual(){
  if(!cierreEstado) _cierreInicial();
  imprimirInformePOS(cierreEstado.desde, cierreEstado.hasta);
}

/* PDF del informe POS (formato ticket — ancho según plantilla del cierre) */
function pdfInformePOS(desde, hasta){
  // Si no se pasan fechas, usar el estado actual del cierre
  if(!desde || !hasta){
    if(!cierreEstado) _cierreInicial();
    desde = cierreEstado.desde; hasta = cierreEstado.hasta;
  }
  if(desde > hasta){ toast('Rango inválido','err'); return; }
  if(typeof html2canvas==='undefined' || !window.jspdf){
    toast('PDF requiere html2canvas/jsPDF; usando impresión','warn');
    return imprimirInformePOS(desde, hasta);
  }
  toast('Generando PDF…','info');
  const r = reporteRango(desde, hasta);
  const cp = cierrePlantilla();
  const W = num(cp.ancho) || 80;
  const cont = document.createElement('div');
  cont.style.cssText = `position:fixed;left:-10000px;top:0;width:${W}mm;background:#fff`;
  cont.innerHTML = informePOSHTML(r, desde, hasta);
  document.body.appendChild(cont);
  const render = () => html2canvas(cont, {scale:3, backgroundColor:'#ffffff', useCORS:true}).then(canvas => {
    try{
      const { jsPDF } = window.jspdf;
      const hmm = W * (canvas.height / canvas.width);
      const doc = new jsPDF({ unit:'mm', format:[W, hmm] });
      doc.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, W, hmm);
      const nombre = `Cierre-${desde}_${hasta}.pdf`;
      doc.save(nombre);
      toast('PDF generado','ok');
    }catch(e){ console.error(e); toast('No se pudo generar el PDF','err'); }
    finally{ cont.remove(); }
  }).catch(e => { console.error(e); toast('No se pudo generar el PDF','err'); cont.remove(); });
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>setTimeout(render, 120)); }
  else { setTimeout(render, 200); }
}

/* Render de la lista reorderable de secciones (drag-and-drop HTML5 nativo).
   Se renderiza por separado porque cambia cada vez que se arrastra. */
function cpRenderListaSecciones(){
  const cont = $('#cpListaSecciones'); if(!cont) return;
  const orden = _cpEdit.ordenSecciones || CIERRE_SECCIONES_TODAS;
  // Mapa de toggle por sección
  const toggleKey = { ventas:'secVentas', compras:'secCompras', gastos:'secGastos',
                      caja:'secCaja', inventario:'secInventario', porPagar:'secPorPagar' };
  cont.innerHTML = orden.map((s, i) => {
    const activo = !!_cpEdit[toggleKey[s]];
    const label = CIERRE_SECCIONES_LABEL[s] || s;
    return `<div
      draggable="true"
      data-idx="${i}"
      ondragstart="cpDragStart(event, ${i})"
      ondragover="cpDragOver(event, ${i})"
      ondragleave="cpDragLeave(event)"
      ondrop="cpDrop(event, ${i})"
      ondragend="cpDragEnd(event)"
      class="cp-sec-row"
      style="${activo?'':'opacity:.55'}">
      <span class="cp-sec-handle" title="Arrastra para reordenar">⋮⋮</span>
      <span class="cp-sec-num">${i+1}</span>
      <label class="cp-sec-label">
        <input type="checkbox" ${activo?'checked':''} style="width:18px;height:18px;flex-shrink:0"
          onchange="cpSetBool('${toggleKey[s]}',this.checked)" onclick="event.stopPropagation()">
        <span class="cp-sec-label-text">${esc(label)}</span>
      </label>
      <span class="cp-sec-state">${activo?'Visible':'Oculta'}</span>
    </div>`;
  }).join('');
}

/* Drag-and-drop: handlers HTML5 nativos */
function cpDragStart(e, idx){
  _cpDragIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  // Truco para Firefox: necesita setData para iniciar el drag
  try{ e.dataTransfer.setData('text/plain', String(idx)); }catch(_){}
  // Estilo visual del elemento que se arrastra
  if(e.currentTarget && e.currentTarget.style){
    e.currentTarget.style.opacity = '.4';
  }
}
function cpDragOver(e, idx){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // Indicador visual de la fila objetivo
  if(e.currentTarget && _cpDragIdx !== idx){
    e.currentTarget.style.borderColor = 'var(--primary)';
    e.currentTarget.style.background = 'var(--primary-soft)';
  }
}
function cpDragLeave(e){
  if(e.currentTarget && e.currentTarget.style){
    e.currentTarget.style.borderColor = 'var(--border)';
    e.currentTarget.style.background = '#fff';
  }
}
function cpDrop(e, idx){
  e.preventDefault();
  if(_cpDragIdx === null || _cpDragIdx === idx) return;
  const orden = _cpEdit.ordenSecciones.slice();
  const [movido] = orden.splice(_cpDragIdx, 1);
  orden.splice(idx, 0, movido);
  _cpEdit.ordenSecciones = orden;
  _cpDragIdx = null;
  cpRenderListaSecciones();
  actualizarPreviewCierre();
}
function cpDragEnd(e){
  _cpDragIdx = null;
  // Reset visual por si quedó un drag sin drop limpio
  $$('#cpListaSecciones .cp-sec-row').forEach(el => {
    el.style.opacity = '';
    el.style.borderColor = 'var(--border)';
    el.style.background = '#fff';
  });
}

/* Vista previa: usa el rango activo del cierre. Si no hay datos en el periodo,
   reporteRango devuelve ceros, lo cual igual permite ver el diseño con todos
   los nombres de campos. */
function actualizarPreviewCierre(){
  const box=$('#cpPreview'); if(!box || !_cpEdit) return;
  if(!cierreEstado) _cierreInicial();
  const r = reporteRango(cierreEstado.desde, cierreEstado.hasta);
  box.style.width = (num(_cpEdit.ancho)||80) + 'mm';
  box.innerHTML = informePOSHTML(r, cierreEstado.desde, cierreEstado.hasta, _cpEdit);
}

/* Restaurar valores de fábrica (con confirmación) */
function cpResetDefaults(){
  confirmBox('¿Restaurar todos los valores del diseño del cierre a los de fábrica? Los cambios actuales se perderán.',()=>{
    _cpEdit = JSON.parse(JSON.stringify(CIERRE_PLANTILLA_DEFAULT));
    cpRenderControles();
    actualizarPreviewCierre();
    toast('Diseño restaurado a valores por defecto','ok');
  },'Sí, restaurar');
}

/* Toggle de la vista previa (mobile): colapsar para dejar más espacio a controles.
   En desktop el botón está oculto por CSS, así que esta función no se invoca. */
function cpTogglePreview(btn){
  const wrap = $('#cpPreviewWrap'); if(!wrap) return;
  const colapsada = wrap.classList.toggle('is-collapsed');
  if(btn) btn.textContent = colapsada ? '👁️ Mostrar vista previa' : '👁️ Ocultar vista previa';
}

/* Guardar la plantilla editada en DB.config y sincronizar */
function cpGuardar(){
  DB.config.cierrePlantilla = JSON.parse(JSON.stringify(_cpEdit));
  save('config');
  // Empujar config al sync si está disponible (sin bloquear)
  if(window.posSync && typeof window.posSync.saveConfig==='function'){
    try{ window.posSync.saveConfig(); }catch(_){}
  }
  closeModal();
  toast('Diseño del cierre guardado','ok');
  // Si la vista de cierre está activa, no hace falta repintar nada visible:
  // el cambio aplica al imprimir/exportar PDF.
}

function borrarFactura(id){
  const f=DB.facturas.find(x=>x.id===id);if(!f)return;
  pedirCodigo('Eliminar venta #'+f.folio,
    'Se devolverá el stock de los productos al inventario. Esta acción no se puede deshacer.',
    ()=>{
      // devolver al inventario las unidades que se habían vendido
      let devueltas=0;
      f.items.forEach(it=>{const p=DB.productos.find(x=>x.id===it.id);if(p){p.stock=num(p.stock)+num(it.cantidad);devueltas+=num(it.cantidad);}});
      DB.facturas=DB.facturas.filter(x=>x.id!==id);
      saveAll();pintarFacturas();
      toast('Venta eliminada · '+fmt(devueltas)+' uds devueltas al inventario','ok');
    },'🗑️ Eliminar venta');
}

      <input class="input" id="motivoEdicion" placeholder="Ej: el cliente cambió un producto, corrección de precio, descuento adicional..." autocomplete="off">
    </div>
    <div class="flex gap-3"><button class="btn btn-ghost btn-block" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary btn-block" onclick="guardarEdicionFactura('${f.id}')">💾 Guardar cambios</button></div>
  </div>`);

}
function guardarEdicionFactura(id){
  const f=DB.facturas.find(x=>x.id===id);if(!f)return;
  const snap = window._facturaEditSnapshot || null;
  const motivo = ($('#motivoEdicion')?.value||'').trim();

  // guardar cantidades anteriores para calcular el ajuste de inventario
  const prevQty=f.items.map(i=>num(i.cantidad));
  $$('#editItems input').forEach(inp=>{f.items[+inp.dataset.ei][inp.dataset.ef]=Math.max(0,num(inp.value));});
  // ajustar inventario según la diferencia (delta) de cada producto
  f.items.forEach((it,ix)=>{
    const delta=num(it.cantidad)-prevQty[ix];   // (+) se vendió más → baja stock · (−) se vendió menos → sube stock
    if(delta!==0){const p=DB.productos.find(x=>x.id===it.id);if(p)p.stock=num(p.stock)-delta;}
  });
  let sub=0,desc=0,costo=0;
  f.items.forEach(i=>{sub+=i.precio*i.cantidad;desc+=i.desc*i.cantidad;costo+=i.costo*i.cantidad;});
  f.subtotal=sub;f.descuento=desc;f.total=Math.max(0,sub-desc);f.utilidad=f.total-costo;

  // ===== TRAZABILIDAD DE EDICIÓN =====
  if(snap){
    const cambios=[];
    // Detectar cambios por ítem
    f.items.forEach((it,ix)=>{
      const orig=snap.items[ix];
      if(!orig)return;
      const cant1=num(orig.cantidad), cant2=num(it.cantidad);
      const prec1=num(orig.precio),   prec2=num(it.precio);
      const desc1=num(orig.desc),     desc2=num(it.desc);
      if(cant1!==cant2) cambios.push(`${it.nombre}: cantidad ${fmt(cant1)} → ${fmt(cant2)}`);
      if(prec1!==prec2) cambios.push(`${it.nombre}: precio ${money(prec1)} → ${money(prec2)}`);
      if(desc1!==desc2) cambios.push(`${it.nombre}: descuento ${money(desc1)} → ${money(desc2)}`);
    });
    // Cambio en total
    if(Math.abs(snap.total-f.total)>0.5){
      cambios.push(`Total: ${money(snap.total)} → ${money(f.total)} (diferencia ${money(f.total-snap.total)})`);
    }
    if(cambios.length>0){
      f.ediciones = f.ediciones || [];
      f.ediciones.push({
        fecha: new Date().toISOString(),
        motivo: motivo || '',
        cambios: cambios,
        totalAnterior: snap.total,
        totalNuevo: f.total
      });
      // Actualizar campo obs visible: indica que fue editada
      const fechaTxt = new Date().toLocaleString('es-CO',{dateStyle:'short',timeStyle:'short'});
      const linea = `[EDITADA ${fechaTxt}] ${motivo?motivo+' · ':''}${cambios.length} cambio(s)`;
      f.obs = f.obs ? (f.obs + '\n' + linea) : linea;
    }
  }
  window._facturaEditSnapshot=null;

  saveAll();closeModal();pintarFacturas();toast('Venta actualizada · Cambios registrados','ok');
}

/* ---- Helpers de precios especiales por cliente ----
   Cada cliente puede tener c.preciosEspeciales = { [productoId]: precio }
   Si no existe o el producto no está mapeado -> se usa el precio estándar. */
function getPrecioPara(cliente, producto){
  if(!producto)return 0;
  const std=num(producto.precio);
  if(!cliente || !cliente.preciosEspeciales) return std;
  const pe=cliente.preciosEspeciales[producto.id];
  return (pe!=null && pe!=='') ? num(pe) : std;
}
function tienePrecioEspecial(cliente, producto){
  return !!(cliente && cliente.preciosEspeciales && cliente.preciosEspeciales[producto.id]!=null && cliente.preciosEspeciales[producto.id]!=='');
}

let _peSoloAsignados=false;

function searchPeNombre(q){
  const otra=$('#peSearchCodigo'); if(otra && otra.value) otra.value='';
  pintarListaPe(q||'','nombre');

function searchPeCodigo(q){
  const otra=$('#peSearchNombre'); if(otra && otra.value) otra.value='';
  pintarListaPe(q||'','codigo');
}

function pintarListaPe(q, modo){
  q=(q||'').trim().toLowerCase();
  let list=DB.productos.slice();
  if(modo==='codigo'){
    if(q){
      list=DB.productos.filter(p=>String(p.codigo||'').toLowerCase().includes(q)||String(p.barras||'').toLowerCase().includes(q));
      list.sort((a,b)=>{
        const ca=String(a.codigo||'').toLowerCase(), cb=String(b.codigo||'').toLowerCase();
        const ba=String(a.barras||'').toLowerCase(), bb=String(b.barras||'').toLowerCase();
        function rank(c,b){ if(c===q)return 0; if(c.startsWith(q))return 1; if(b===q)return 2; if(b.startsWith(q))return 3; if(c.includes(q))return 4; return 5;}
        return rank(ca,ba)-rank(cb,bb);
      });
    }
  }else{
    if(q){
      list=DB.productos.filter(p=>(p.nombre||'').toLowerCase().includes(q)||(p.categoria||'').toLowerCase().includes(q));
    }
  }
  if(_peSoloAsignados){
    list=list.filter(p=>_peEdit[p.id]!=null && _peEdit[p.id]!=='');
  }
  const box=$('#peList'); if(!box)return;
  if(!list.length){ box.innerHTML='<div class="text-center p-4" style="color:var(--muted)">Sin resultados</div>'; return;}
  box.innerHTML=list.slice(0,60).map(p=>{
    const std=num(p.precio);
    const pe=_peEdit[p.id];
    const tiene=(pe!=null && pe!=='');
    return `<div class="card p-2 flex items-center justify-between" style="gap:10px;${tiene?'border:2px solid var(--primary);background:var(--primary-soft)':''}">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:15px">${esc(p.nombre)}</div>
        <div style="color:var(--muted);font-size:12px">${esc(p.codigo||'')} · Estándar: <b>${money(std)}</b></div>
      </div>
      <div class="flex items-center gap-2">
        <input class="input" data-miles="1" style="width:120px;text-align:right;font-weight:700" placeholder="${fmt(std)}"
          value="${tiene?pe:''}"
          oninput="setPrecioEspecial('${p.id}', this.value)">
        <button class="btn-action ba-del" onclick="quitarPrecioEspecial('${p.id}')" title="Quitar precio especial">🗑️</button>
      </div>
    </div>`;
  }).join('');
  bindMilesInputsIn(box);
}

function setPrecioEspecial(prodId, val){
  const n=num(val);
  if(val==='' || n<=0){ delete _peEdit[prodId]; }
  else { _peEdit[prodId]=n; }
}
function quitarPrecioEspecial(prodId){
  delete _peEdit[prodId];
  // re-render lista
  const qn=($('#peSearchNombre')||{}).value||'';
  const qc=($('#peSearchCodigo')||{}).value||'';
  if(qc) pintarListaPe(qc,'codigo'); else pintarListaPe(qn,'nombre');

function cerrarPreciosEspeciales(aplicar){
  if(!aplicar){
    // Recargar _peEdit desde el cliente real (descartar cambios)
    if(_peClienteId){
      const c=DB.clientes.find(x=>x.id===_peClienteId);
      _peEdit=Object.assign({}, (c&&c.preciosEspeciales)||{});
    }else{
      _peEdit={};
    }
  }
  // Cerrar este modal y reabrir el modal de cliente PRESERVANDO:
  //   1) _peEdit (los precios que acaba de configurar el usuario)
  //   2) Los valores del formulario de cliente (nombre, negocio, etc.)
  closeModal();
  const formData = _peClienteForm;
  _peClienteForm = null;
  formCliente(_peClienteId||undefined, formData, true);

function guardarCliente(id){
  const nombre=$('#c_nombre').value.trim();
  if(!nombre){toast('Escribe el nombre del cliente','warn');return;}
  const data={nombre,negocio:$('#c_negocio').value.trim(),telefono:$('#c_tel').value.trim(),direccion:$('#c_dir').value.trim(),ciudad:$('#c_ciudad').value.trim(),obs:$('#c_obs').value.trim()};
  // Aplicar precios especiales editados
  data.preciosEspeciales={};
  Object.keys(_peEdit||{}).forEach(k=>{
    const v=_peEdit[k];
    if(v!=null && v!=='' && num(v)>0) data.preciosEspeciales[k]=num(v);
  });
  if(id){Object.assign(DB.clientes.find(c=>c.id===id),data);}
  else{
    const nuevo=Object.assign({id:uid()},data);
    DB.clientes.push(nuevo);
    id=nuevo.id;
  }
  save('clientes');
  // Si el cliente guardado es el seleccionado en ventas, refrescamos su referencia y los precios del carrito
  if(saleClient && saleClient.id===id){
    saleClient=DB.clientes.find(c=>c.id===id);
    aplicarPreciosClienteAlCarrito();
  }
  _peEdit={}; _peClienteId=null;
  closeModal();pintarClientes($('#cliQ')?.value||'');toast('Cliente guardado','ok');
}

// Recalcula los precios del carrito según el cliente seleccionado.
// Solo cambia el precio si la línea NO ha sido editada manualmente por el usuario.
function aplicarPreciosClienteAlCarrito(){
  if(!cart || !cart.length){ renderCart && renderCart(); return; }
  cart.forEach(l=>{
    const p=DB.productos.find(x=>x.id===l.id); if(!p)return;
    // Si la línea no fue editada manualmente, refrescamos al precio que corresponda al cliente actual
    if(!l.precioManual){

const CATS=['Perros','Gatos','Aves','Peces','Roedores','Snacks','Higiene','Accesorios','Otros'];

/* Calcula el siguiente código de producto siguiendo el patrón de los existentes.
   - Si los códigos tienen formato "PREFIJO + número" (ej: P001, P002, P600), devuelve "P601".
   - Si son puramente numéricos (ej: 1, 2, 600), devuelve "601".
   - Respeta el padding de ceros del último código (P001 → P002, no P2).
   - Si no hay productos o ninguno encaja, devuelve "P001".
   - Ignora códigos repetidos por seguridad y siempre busca uno libre.
*/
function siguienteCodigoProducto(){
  const productos=DB.productos||[];
  if(!productos.length) return 'P001';

  // Parsea cada código en {prefijo, numero, padding}
  const parsed=productos.map(p=>{
    const c=String(p.codigo||'').trim();
    const m=c.match(/^([^\d]*)(\d+)$/); // prefijo opcional + dígitos al final
    if(!m) return null;
    return {prefijo:m[1], numero:parseInt(m[2],10), padding:m[2].length, codigo:c};
  }).filter(Boolean);

  if(!parsed.length) return 'P001';

  // Detecta el prefijo más frecuente para mantener consistencia
  const conteoPref={};
  parsed.forEach(x=>{conteoPref[x.prefijo]=(conteoPref[x.prefijo]||0)+1;});
  let prefijoDominante='', maxConteo=0;
  for(const pre in conteoPref){
    if(conteoPref[pre]>maxConteo){ maxConteo=conteoPref[pre]; prefijoDominante=pre; }
  }

  // Filtra los del prefijo dominante para encontrar el número más alto
  const mismosPref=parsed.filter(x=>x.prefijo===prefijoDominante);
  const maxNumero=Math.max(...mismosPref.map(x=>x.numero));

  // Padding: el del código con número más alto (ej: P600 → 3 dígitos)
  const refPad=mismosPref.find(x=>x.numero===maxNumero);
  const padding=Math.max(refPad?refPad.padding:3, 3); // mínimo 3 dígitos

  // Busca el primer número libre desde max+1 (por si hay huecos o duplicados)
  const usados=new Set(productos.map(p=>String(p.codigo||'').trim()));
  let sig=maxNumero+1;
  let candidato;
  do{
    candidato=prefijoDominante+String(sig).padStart(padding,'0');
    sig++;
  }while(usados.has(candidato) && sig<maxNumero+1000); // failsafe

  return candidato;
}

function updateQCompraSub(){

function confirmarCantidadCompra(prodId){
  const cant=num(($('#qcCant')||{}).value);
  if(cant<=0){toast('Escribe la cantidad','warn');const i=$('#qcCant');if(i)i.focus();return;}
  const costo=num(($('#qcCosto')||{}).value);
  if(costo<0){toast('El costo no puede ser negativo','warn');return;}
  const p=DB.productos.find(x=>x.id===prodId);if(!p)return;
  const ex=compraItems.find(c=>c.prodId===prodId);
  if(ex){ex.cantidad=cant;ex.costo=costo;}
  else{compraItems.push({prodId,nombre:p.nombre,cantidad:cant,costo});}
  beep();closeModal();pintarCompraItems();

  const co=$('#co_search');if(co){co.value='';}
  const inst=(window.__acByInput||{})['co_search']; if(inst) inst.clear();
  if(co)co.focus();

function actualizarRcCambio(){
  const total=compraItems.reduce((s,c)=>s+num(c.costo)*num(c.cantidad),0);
  const rec=num($('#rc_recibido')?.value);
  const cambio=rec-total;
  $('#rc_cambioBox').innerHTML=`<b>Cambio:</b> <span style="font-size:22px;font-weight:800;color:${cambio>=0?'var(--success)':'var(--danger)'}">${money(Math.max(0,cambio))}</span>`+
    (cambio<0?`<div style="color:var(--danger);font-weight:700">Faltan ${money(-cambio)}</div>`:'');

function actualizarRcSaldo(){
  const total=compraItems.reduce((s,c)=>s+num(c.costo)*num(c.cantidad),0);

  const saldo=Math.max(0,total-ab);

function confirmarRegistroCompra(){
  const total=compraItems.reduce((s,c)=>s+num(c.costo)*num(c.cantidad),0);
  if(compraTipoPago==='credito'){

function setAbonoMetodo(m){
  abonoMetodoActual=m;
  document.querySelectorAll('#modal-content [data-abmet]').forEach(b=>{
    if(b.dataset.abmet===m){b.style.background='var(--primary)';b.style.color='#fff';b.style.borderColor='var(--primary)';}

function guardarAbonoCompra(id){
  const c=DB.compras.find(x=>x.id===id);if(!c)return;
  const monto=num(document.getElementById('abMonto')?.value);
  if(monto<=0){toast('Ingresa un monto válido','warn');return;}
  const saldoActual=num(c.saldo);
  if(monto>saldoActual+0.5){toast('El abono no puede ser mayor al saldo','warn');return;}
  const nota=(document.getElementById('abNota')?.value||'').trim();
  const fecha=document.getElementById('abFecha')?.value||todayISO();
  c.abonos=c.abonos||[];
  c.abonos.push({id:uid(),fecha,monto,metodo:abonoMetodoActual,nota});
  c.saldo=Math.max(0,saldoActual-monto);
  saveAll();
  closeModal();
  toast(c.saldo<0.5?'✓ Compra pagada en su totalidad':'Abono registrado','ok');beep();
  renderCompras();
  // Reabrir el detalle para que vea la trazabilidad actualizada
  setTimeout(()=>verDetalleCompra(id),200);
}
function eliminarAbonoCompra(compraId,abonoId){
  if(!confirm('¿Eliminar este abono? El saldo se ajustará automáticamente.'))return;
  const c=DB.compras.find(x=>x.id===compraId);if(!c||!c.abonos)return;
  const ab=c.abonos.find(a=>a.id===abonoId);if(!ab)return;
  c.saldo=num(c.saldo)+num(ab.monto);
  c.abonos=c.abonos.filter(a=>a.id!==abonoId);
  saveAll();
  closeModal();
  toast('Abono eliminado · Saldo ajustado','info');
  renderCompras();
  setTimeout(()=>verDetalleCompra(compraId),200);
}

  msg+='⚠ Esto va a REVERTIR el inventario:\n';
  (c.items||[]).forEach(it=>{
    msg+='  • '+it.nombre+': -'+num(it.cantidad)+' unidades\n';
  });
  if(tipo==='credito' && totalAbonado>0){
    msg+='\n⚠ Esta compra tenía '+(c.abonos||[]).length+' abono(s) por '+money(totalAbonado)+' que también se perderán.\n';
  }
  msg+='\nEsta acción NO se puede deshacer. ¿Continuar?';
  if(!confirm(msg))return;

  // Revertir stock
  const productosTocados=[];
  (c.items||[]).forEach(it=>{
    const p=DB.productos.find(x=>x.id===it.prodId);
    if(p){
      const nuevoStock=num(p.stock)-num(it.cantidad);
      p.stock=Math.max(0,nuevoStock); // no permitir stock negativo
      productosTocados.push(p);
    }
  });

  // Eliminar la compra
  DB.compras=DB.compras.filter(x=>x.id!==id);

  // Notificar al sync: cada producto modificado debe subirse a la nube,
  // de lo contrario el sync trae el stock viejo y sobrescribe el cambio local.
  if(window.posSync){
    if(typeof window.posSync.upsert==='function'){
      productosTocados.forEach(p=>{ try{ window.posSync.upsert('productos', p); }catch(e){} });
    }
    if(typeof window.posSync.remove==='function'){
      try{ window.posSync.remove('compras', id); }catch(e){}
    }
  }

  saveAll();
  closeModal();
  toast('Compra eliminada · Inventario revertido','info');
  renderCompras();
}

function editarCompra(id){
  const c=DB.compras.find(x=>x.id===id);if(!c)return;
  const tipo=c.tipoPago||'contado';
  const totalAbonado=(c.abonos||[]).reduce((s,a)=>s+num(a.monto),0);

  if(tipo==='credito' && totalAbonado>0){
    if(!confirm('⚠ Esta compra ya tiene '+(c.abonos||[]).length+' abono(s) registrado(s) por '+money(totalAbonado)+'.\n\nSi la editas se perderán todos los abonos y deberás registrarlos de nuevo.\n\n¿Continuar?'))return;
  }

  closeModal();
  compraEditandoId=id;
  // Cargar datos en el formulario
  compraProveedorId=c.proveedorId||null;
  compraTipoPago=tipo;
  compraMetodoPago=c.metodo||'Efectivo';
  compraVence=c.vence||'';
  compraAbonoIni=0; // En edición, los abonos viejos se conservan en la compra original
  compraItems=(c.items||[]).map(it=>({prodId:it.prodId,nombre:it.nombre,cantidad:num(it.cantidad),costo:num(it.costo)}));

  renderCompras();

  // Esperar render y rellenar campos
  setTimeout(()=>{
    const f=$('#co_fecha');if(f)f.value=(c.fecha||todayISO()).slice(0,10);
    const r=$('#co_ref');if(r)r.value=c.ref||'';
    pintarCompraItems();
    // Scroll al formulario
    document.querySelector('#view-compras .card')?.scrollIntoView({behavior:'smooth',block:'start'});
    toast('Editando compra · Modifica y guarda los cambios','info');
  },100);
}

function cancelarEdicionCompra(){
  compraEditandoId=null;
  compraProveedorId=null;
  compraItems=[];
  compraTipoPago='contado';
  compraMetodoPago='Efectivo';
  compraVence='';
  compraAbonoIni=0;
  renderCompras();
  toast('Edición cancelada','info');
}

function guardarCompra(){
  if(!compraItems.length){toast('Agrega al menos un producto','warn');return;}
  // Obtener nombre del proveedor desde compraProveedorId o usar fallback "Sin proveedor"
  let prov='Sin proveedor';
  if(compraProveedorId){
    const p=DB.proveedores.find(x=>x.id===compraProveedorId);
    if(p)prov=p.nombre;
  }
  const fecha=$('#co_fecha').value||todayISO();
  const ref=$('#co_ref').value.trim();
  const total=compraItems.reduce((s,c)=>s+c.costo*c.cantidad,0);
  const tipoPago=compraTipoPago||'contado';
  let metodo='', vence='', abonos=[], saldo=0, abonoIni=0;
  if(tipoPago==='credito'){
    vence=compraVence||'';
    abonoIni=num(compraAbonoIni);
    if(abonoIni>total){toast('El abono inicial no puede ser mayor al total','warn');return;}
    if(abonoIni>0){
      abonos.push({id:uid(),fecha,monto:abonoIni,metodo:'Efectivo',nota:'Abono inicial'});
    }
    saldo=Math.max(0,total-abonoIni);
    metodo='Crédito';
  }else{
    metodo=compraMetodoPago||'Efectivo';
    saldo=0;
  }

  // ===== MODO EDICIÓN: revertir compra anterior antes de aplicar la nueva =====
  if(compraEditandoId){
    const original=DB.compras.find(x=>x.id===compraEditandoId);
    if(original){
      const productosTocadosEdit=new Set();
      // Revertir stock de los items originales
      (original.items||[]).forEach(it=>{
        const p=DB.productos.find(x=>x.id===it.prodId);
        if(p){p.stock=Math.max(0, num(p.stock)-num(it.cantidad));productosTocadosEdit.add(p);}
      });
      // Aplicar nuevo stock con los items actuales
      compraItems.forEach(c=>{
        const p=DB.productos.find(x=>x.id===c.prodId);
        if(p){p.stock=num(p.stock)+num(c.cantidad);p.costo=c.costo;productosTocadosEdit.add(p);}
      });
      // En edición, preservamos los abonos anteriores si los había
      const abonosFinales = tipoPago==='credito' ? (original.abonos||[]).concat(abonos) : [];
      const totalAbonado = abonosFinales.reduce((s,a)=>s+num(a.monto),0);
      const saldoFinal = tipoPago==='credito' ? Math.max(0, total-totalAbonado) : 0;
      // Actualizar la compra existente (mismo id)
      Object.assign(original,{
        fecha,proveedor:prov,
        proveedorId:compraProveedorId||null,
        ref,total,
        items:compraItems.map(c=>({...c})),
        tipoPago,metodo,vence,abonos:abonosFinales,saldo:saldoFinal
      });
      // Notificar al sync los productos cuyo stock/costo cambió
      if(window.posSync && typeof window.posSync.upsert==='function'){
        productosTocadosEdit.forEach(p=>{ try{ window.posSync.upsert('productos', p); }catch(e){} });
        try{ window.posSync.upsert('compras', original); }catch(e){}
      }
      saveAll();
      toast('Compra editada · Inventario actualizado','ok');beep();
      compraEditandoId=null;
      compraTipoPago='contado';compraMetodoPago='Efectivo';compraVence='';compraAbonoIni=0;
      renderCompras();
      return;
    }
    // Si no se encontró la original, sale del modo edición
    compraEditandoId=null;
  }

  // ===== MODO CREACIÓN NORMAL =====
  // actualizar inventario y costo
  const productosTocadosNueva=[];
  compraItems.forEach(c=>{const p=DB.productos.find(x=>x.id===c.prodId);if(p){p.stock=num(p.stock)+c.cantidad;p.costo=c.costo;productosTocadosNueva.push(p);}});
  const compraNueva={
    id:uid(),
    fecha,
    proveedor:prov,
    proveedorId:compraProveedorId||null,
    ref,
    total,
    items:compraItems.map(c=>({...c})),
    tipoPago,
    metodo,
    vence,
    abonos,
    saldo
  };
  DB.compras.push(compraNueva);
  // Notificar al sync los productos cuyo stock/costo cambió y la nueva compra
  if(window.posSync && typeof window.posSync.upsert==='function'){
    productosTocadosNueva.forEach(p=>{ try{ window.posSync.upsert('productos', p); }catch(e){} });
    try{ window.posSync.upsert('compras', compraNueva); }catch(e){}
  }
  saveAll();
  toast(tipoPago==='credito'
    ?`Compra a crédito registrada · Saldo: ${money(saldo)}`
    :'Compra registrada · Inventario actualizado','ok');
  beep();
  // resetear estado del formulario
  compraItems=[];
  compraProveedorId=null;
  compraTipoPago='contado';compraMetodoPago='Efectivo';compraVence='';compraAbonoIni=0;
  renderCompras();
}

/* Búsqueda de productos para baja, espejo de la de Ventas */
function searchGastoProdNombre(q){
  const otra=$('#gp_searchCodigo'); if(otra && otra.value) otra.value='';
  q=(q||'').trim().toLowerCase();
  let list=DB.productos;
  if(q) list=DB.productos.filter(p=>(p.nombre||'').toLowerCase().includes(q)||(p.categoria||'').toLowerCase().includes(q));
  renderGastoProdResults(list);
}
function searchGastoProdCodigo(q){
  const otra=$('#gp_searchNombre'); if(otra && otra.value) otra.value='';
  q=(q||'').trim().toLowerCase();
  let list=[];
  if(q){
    const matches=DB.productos.filter(p=>String(p.codigo||'').toLowerCase().includes(q)||String(p.barras||'').toLowerCase().includes(q));
    function rank(p){
      const c=String(p.codigo||'').toLowerCase(), b=String(p.barras||'').toLowerCase();
      if(c===q)return 0; if(c.startsWith(q))return 1; if(b===q)return 2; if(b.startsWith(q))return 3; if(c.includes(q))return 4; return 5;
    }
    list=matches.sort((a,b)=>rank(a)-rank(b));
  }else{
    list=DB.productos;
  }
  renderGastoProdResults(list);
}
function renderGastoProdResults(list){
  const box=$('#gp_results'); if(!box)return;
  if(!list.length){ box.innerHTML='<div class="text-center p-3" style="color:var(--muted)">Sin resultados</div>'; return; }
  box.innerHTML=list.slice(0,30).map(p=>{
    const yaEn=_gastoItems.find(x=>x.prodId===p.id);
    return `<div class="result-item" onclick="agregarGastoProd('${p.id}')" style="${yaEn?'opacity:.5':''}">
      <div><b>${esc(p.nombre)}</b><br><span style="color:var(--muted);font-size:13px">${esc(p.codigo||'')} · Stock: ${fmt(p.stock)} · Costo: ${money(p.costo)}</span></div>
      <span class="badge ${yaEn?'badge-info':'badge-ok'}">${yaEn?'Ya agregado':'＋ Añadir'}</span>
    </div>`;
  }).join('');
}
function agregarGastoProd(prodId){
  const p=DB.productos.find(x=>x.id===prodId); if(!p)return;
  if(_gastoItems.find(x=>x.prodId===prodId)){ toast('Ya está en la lista','info'); return; }
  if(num(p.stock)<=0){ toast('Este producto no tiene stock','warn'); return; }
  _gastoItems.push({prodId:p.id, nombre:p.nombre, codigo:p.codigo||'', cantidad:1, costo:num(p.costo), motivo:'Dañado'});
  pintarGastoProdItems();
  // refrescar resultados para marcar como ya agregado
  const qn=($('#gp_searchNombre')||{}).value||''; const qc=($('#gp_searchCodigo')||{}).value||'';
  if(qc) searchGastoProdCodigo(qc); else searchGastoProdNombre(qn);
}
function quitarGastoProd(prodId){
  _gastoItems=_gastoItems.filter(x=>x.prodId!==prodId);
  pintarGastoProdItems();
  const qn=($('#gp_searchNombre')||{}).value||''; const qc=($('#gp_searchCodigo')||{}).value||'';

function guardarGasto(id){
  const fecha=$('#g_fecha').value||todayISO();
  const categoria=$('#g_cat').value;

  if(categoria==='Productos'){
    // Validar
    if(!_gastoItems.length){ toast('Agrega al menos un producto','warn'); return; }
    const conCantidadCero=_gastoItems.find(it=>num(it.cantidad)<=0);
    if(conCantidadCero){ toast('Hay productos con cantidad en cero','warn'); return; }
    // Validar stock disponible
    const sinStock=_gastoItems.find(it=>{const p=DB.productos.find(x=>x.id===it.prodId);return p && num(it.cantidad)>num(p.stock)+(()=>{
      // Si estamos editando, el stock actual ya tiene descontados los items originales del propio gasto
      if(!id)return 0;
      const orig=(DB.gastos.find(x=>x.id===id)||{}).items||[];
      const o=orig.find(x=>x.prodId===it.prodId);
      return o?num(o.cantidad):0;
    })();});
    if(sinStock){
      const p=DB.productos.find(x=>x.id===sinStock.prodId);
      toast(`Stock insuficiente para "${p?p.nombre:'producto'}"`,'warn');return;
    }

    const total=_gastoItems.reduce((s,it)=>s+num(it.cantidad)*num(it.costo),0);
    const conceptoAuto=_gastoItems.length===1
      ? `Baja de ${_gastoItems[0].nombre} (${_gastoItems[0].motivo})`
      : `Baja de ${_gastoItems.length} producto(s) del inventario`;
    const notaP=($('#g_nota_p')||{}).value||'';

    // EDICIÓN: revertir stock del gasto original antes de aplicar el nuevo
    if(id){
      const original=DB.gastos.find(x=>x.id===id);
      if(original && original.categoria==='Productos' && original.items){
        original.items.forEach(it=>{
          const p=DB.productos.find(x=>x.id===it.prodId);
          if(p) p.stock=num(p.stock)+num(it.cantidad);
        });
      }
    }

    // Aplicar nuevo descuento de stock
    _gastoItems.forEach(it=>{
      const p=DB.productos.find(x=>x.id===it.prodId);
      if(p) p.stock=Math.max(0, num(p.stock)-num(it.cantidad));
    });

    const data={
      fecha,categoria,
      concepto:conceptoAuto,
      monto:total,
      nota:notaP,
      items:_gastoItems.map(it=>({...it}))
    };
    if(id){ Object.assign(DB.gastos.find(g=>g.id===id), data); }
    else{ DB.gastos.push(Object.assign({id:uid()}, data)); }
    saveAll();
    const nItems=_gastoItems.length;
    closeModal();
    _gastoItems=[];
    renderGastos();
    toast(`Baja registrada: ${fmt(nItems)} producto(s) · ${money(total)}`,'ok');
    beep();
    return;
  }

  // Gasto normal
  const concepto=$('#g_concepto').value.trim();
  const monto=num($('#g_monto').value);
  if(!concepto){toast('Escribe el concepto del gasto','warn');return;}
  if(monto<=0){toast('Escribe un monto mayor a cero','warn');return;}
  const data={fecha,categoria,concepto,monto,nota:$('#g_nota').value.trim()};

  // Si estaba editando y antes era de categoría Productos, revertir stock
  if(id){
    const original=DB.gastos.find(g=>g.id===id);
    if(original && original.categoria==='Productos' && Array.isArray(original.items)){
      original.items.forEach(it=>{
        const p=DB.productos.find(x=>x.id===it.prodId);
        if(p) p.stock=num(p.stock)+num(it.cantidad);
      });
    }
    Object.assign(DB.gastos.find(g=>g.id===id),data);
    // Eliminar items si los tenía (porque ya no es de Productos)
    const editado=DB.gastos.find(g=>g.id===id);
    if(editado && editado.items) delete editado.items;
  }
  else{ DB.gastos.push(Object.assign({id:uid()},data)); }
  saveAll();closeModal();renderGastos();toast('Gasto guardado','ok');beep();
}

function borrarGasto(id){
  const g=DB.gastos.find(x=>x.id===id); if(!g)return;
  const esProducto = g.categoria==='Productos' && Array.isArray(g.items) && g.items.length;
  const msg=esProducto
    ? `Esta es una baja de ${fmt(g.items.length)} producto(s) del inventario. Al eliminarla, el stock se DEVOLVERÁ al inventario. ¿Continuar?`
    : '¿Eliminar este gasto?';
  confirmBox(msg, ()=>{
    if(esProducto){
      g.items.forEach(it=>{
        const p=DB.productos.find(x=>x.id===it.prodId);
        if(p) p.stock=num(p.stock)+num(it.cantidad);
      });
    }
    DB.gastos=DB.gastos.filter(x=>x.id!==id);
    saveAll();
    pintarGastos();
    toast(esProducto?'Gasto eliminado · Stock devuelto al inventario':'Gasto eliminado','ok');
  },'Sí, eliminar');
}

function repPreset(p){
  const hoy=todayISO();const d=new Date();let desde=hoy,hasta=hoy;
  if(p==='hoy'){desde=hoy;hasta=hoy;}
  else if(p==='ayer'){const a=new Date(d);a.setDate(d.getDate()-1);desde=hasta=a.toISOString().slice(0,10);}
  else if(p==='semana'){const i=new Date(d);i.setDate(d.getDate()-d.getDay());desde=i.toISOString().slice(0,10);hasta=hoy;}
  else if(p==='mes'){desde=hoy.slice(0,8)+'01';hasta=hoy;}
  else if(p==='mesPasado'){const i=new Date(d.getFullYear(),d.getMonth()-1,1);const f=new Date(d.getFullYear(),d.getMonth(),0);
    desde=`${i.getFullYear()}-${String(i.getMonth()+1).padStart(2,'0')}-01`;
    hasta=`${f.getFullYear()}-${String(f.getMonth()+1).padStart(2,'0')}-${String(f.getDate()).padStart(2,'0')}`;}
  else if(p==='anio'){desde=hoy.slice(0,4)+'-01-01';hasta=hoy;}
  else if(p==='custom'){repRango.preset='custom';marcarPreset();return;}
  repRango={desde,hasta,preset:p};
  if($('#repDesde'))$('#repDesde').value=desde;
  if($('#repHasta'))$('#repHasta').value=hasta;
  marcarPreset();pintarReporteRango();
}
function repSetFecha(campo,val){repRango[campo]=val;repRango.preset='custom';marcarPreset();pintarReporteRango();}

    ${(r.invBajoStock>0||r.invSinStock>0)?`<div class="card p-3 mb-3" style="background:var(--surface);box-shadow:none;border:1px solid var(--border)">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">⚠️ Alertas de stock</div>
