<style>
:root{
  /* === Paleta refinada — neutros zinc con MÁS contraste para legibilidad === */
  --bg:           #f8fafc;
  --surface:      #ffffff;
  --surface-2:    #f1f5f9;
  --surface-3:    #e2e8f0;
  --text:         #0f172a;     /* Casi negro — alto contraste para legibilidad */
  --text-soft:    #1e293b;     /* Texto secundario AÚN legible */
  --muted:        #475569;     /* Subido desde #71717a → ya no es gris-claro */
  --muted-soft:   #64748b;

  /* Indigo profesional (Stripe-style) */
  --primary:      #4f46e5;
  --primary-d:    #4338ca;
  --primary-soft: #eef2ff;
  --primary-ring: rgba(79,70,229,.15);

  --accent:       #0ea5e9;
  --accent-d:     #0284c7;
  --accent-soft:  #f0f9ff;

  /* Bordes con presencia (no fantasmas) */
  --border:       #e2e8f0;
  --border-strong:#cbd5e1;

  /* Estados semánticos */
  --success:      #16a34a;
  --success-soft: #f0fdf4;
  --success-ring: rgba(22,163,74,.15);

  --danger:       #dc2626;
  --danger-soft:  #fef2f2;
  --danger-ring:  rgba(220,38,38,.15);

  --warn:         #d97706;
  --warn-soft:    #fffbeb;

  --info:         #2563eb;
  --info-soft:    #eff6ff;

  --edit:         #ca8a04;
  --edit-soft:    #fefce8;

  /* Sombras VISIBLES estilo Stripe/Notion (no minimalismo extremo) */
  --shadow-xs:    0 1px 2px rgba(15,23,42,.06);
  --shadow-sm:    0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.05);
  --shadow-md:    0 4px 6px -1px rgba(15,23,42,.08), 0 2px 4px -2px rgba(15,23,42,.06);
  --shadow-lg:    0 10px 15px -3px rgba(15,23,42,.10), 0 4px 6px -4px rgba(15,23,42,.08);
  --shadow-xl:    0 20px 25px -5px rgba(15,23,42,.12), 0 8px 10px -6px rgba(15,23,42,.08);
  --shadow-modal: 0 25px 50px -12px rgba(15,23,42,.30);

  /* Radios — modernos pero no caricaturescos */
  --radius-xs:    4px;
  --radius-sm:    6px;
  --radius:       8px;
  --radius-md:    10px;
  --radius-lg:    12px;
  --radius-xl:    16px;

  --ease:         cubic-bezier(.4, 0, .2, 1);
  --ease-out:     cubic-bezier(.16, 1, .3, 1);
}

html.dark{
  --bg:           #0a0a0b;
  --surface:      #18181b;
  --surface-2:    #27272a;
  --surface-3:    #3f3f46;
  --text:         #fafafa;
  --text-soft:    #e4e4e7;
  --muted:        #d4d4d8;     /* Subido para alto contraste en dark */
  --muted-soft:   #a1a1aa;

  --primary:      #818cf8;
  --primary-d:    #6366f1;
  --primary-soft: rgba(99,102,241,.16);
  --primary-ring: rgba(129,140,248,.22);

  --accent:       #38bdf8;
  --accent-d:     #0ea5e9;
  --accent-soft:  rgba(56,189,248,.14);

  --border:       #27272a;
  --border-strong:#3f3f46;

  --success:      #4ade80;
  --success-soft: rgba(74,222,128,.12);

  --danger:       #f87171;
  --danger-soft:  rgba(248,113,113,.12);

  --warn:         #fbbf24;
  --warn-soft:    rgba(251,191,36,.12);

  --info:         #60a5fa;
  --info-soft:    rgba(96,165,250,.12);

  --edit:         #facc15;
  --edit-soft:    rgba(250,204,21,.12);

  --shadow-xs:    0 1px 2px rgba(0,0,0,.45);
  --shadow-sm:    0 1px 3px rgba(0,0,0,.50), 0 1px 2px rgba(0,0,0,.40);
  --shadow-md:    0 4px 6px -1px rgba(0,0,0,.55), 0 2px 4px -2px rgba(0,0,0,.45);
  --shadow-lg:    0 10px 15px -3px rgba(0,0,0,.60), 0 4px 6px -4px rgba(0,0,0,.50);
  --shadow-xl:    0 20px 25px -5px rgba(0,0,0,.70), 0 8px 10px -6px rgba(0,0,0,.60);
  --shadow-modal: 0 25px 50px -12px rgba(0,0,0,.80);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:'Inter','SF Pro Display',system-ui,-apple-system,sans-serif;
  font-size:15px;line-height:1.55;letter-spacing:-0.003em;
  font-feature-settings:'cv11','ss01','ss03';
  transition:background .25s var(--ease),color .25s var(--ease);
  overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}
h1,h2,h3,h4{font-family:inherit;font-weight:700;letter-spacing:-0.022em;margin:0;color:var(--text)}
h1{font-size:28px;line-height:1.2}
h2{font-size:22px;line-height:1.25}
h3{font-size:18px;line-height:1.3}
h4{font-size:16px;line-height:1.4}
.brandfont{font-family:'Inter',sans-serif;letter-spacing:-0.028em;font-weight:700;font-feature-settings:'cv11','ss01'}

/* Scrollbar moderna estilo macOS/Linear */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:transparent;border-radius:999px;border:2px solid transparent;background-clip:padding-box;transition:background .15s}
*:hover::-webkit-scrollbar-thumb{background:var(--border-strong);background-clip:padding-box;border:2px solid transparent}
::-webkit-scrollbar-thumb:hover{background:var(--muted-soft);background-clip:padding-box;border:2px solid transparent}
::-webkit-scrollbar-corner{background:transparent}
*{scrollbar-color:var(--border-strong) transparent;scrollbar-width:thin}

/* === Iconografía Lucide === */
[data-lucide]{width:20px;height:20px;flex-shrink:0;stroke-width:1.75;display:inline-block;vertical-align:middle}
.btn [data-lucide]{width:17px;height:17px}
.btn-lg [data-lucide]{width:19px;height:19px}
.btn-action [data-lucide]{width:18px;height:18px;stroke-width:2}
.nav-btn [data-lucide]{width:19px;height:19px;stroke-width:2}
.nav-btn .ico{width:19px;height:19px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted);transition:color .15s var(--ease)}
.nav-btn.active .ico,.nav-btn:hover .ico{color:var(--primary)}
html.dark .nav-btn:hover .ico{color:var(--text-soft)}
html.dark .nav-btn.active .ico{color:var(--primary)}

/* ---- Cards ---- */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm);
  transition:box-shadow .2s var(--ease),border-color .2s var(--ease);
}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--border-strong)}

/* ---- Inputs ---- */
.input{
  width:100%;background:var(--surface);
  border:1.5px solid var(--border-strong);
  border-radius:var(--radius-md);
  padding:11px 14px;font-size:15px;color:var(--text);font-family:inherit;
  transition:border-color .15s var(--ease),box-shadow .15s var(--ease),background .15s var(--ease);
  outline:none;font-weight:500;min-height:44px;line-height:1.4;
}
.input:hover{border-color:var(--muted-soft)}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-ring)}
.input::placeholder{color:var(--muted);font-weight:400}
.input[disabled]{background:var(--surface-2);color:var(--muted);cursor:not-allowed}
html.dark .input{background:var(--surface)}
select.input{appearance:none;padding-right:38px;background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 14px center;background-size:16px}
label.lbl{font-weight:600;font-size:13.5px;color:var(--text-soft);margin-bottom:7px;display:block;letter-spacing:-0.005em}

/* ---- Buttons ---- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
  border:1px solid transparent;border-radius:var(--radius-md);font-family:inherit;
  font-weight:600;font-size:14.5px;
  padding:11px 18px;
  transition:background .15s var(--ease),border-color .15s var(--ease),color .15s var(--ease),box-shadow .15s var(--ease),transform .1s var(--ease);
  user-select:none;min-height:44px;line-height:1;letter-spacing:-0.005em;white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--primary);color:#fff;border-color:transparent;box-shadow:inset 0 0 0 1px rgba(255,255,255,.10),var(--shadow-sm),0 1px 2px rgba(79,70,229,.25)}
.btn-primary:hover{background:var(--primary-d);box-shadow:inset 0 0 0 1px rgba(255,255,255,.14),var(--shadow-md),0 2px 4px rgba(79,70,229,.30)}
.btn-accent{background:var(--text);color:var(--surface);border-color:transparent;box-shadow:var(--shadow-sm)}
html.dark .btn-accent{background:var(--surface-3);color:var(--text)}
.btn-accent:hover{filter:brightness(1.15);box-shadow:var(--shadow-md)}
.btn-ghost{background:var(--surface);color:var(--text);border:1.5px solid var(--border-strong);font-weight:600;box-shadow:var(--shadow-xs)}
.btn-ghost:hover{background:var(--surface-2);border-color:var(--muted-soft);box-shadow:var(--shadow-sm)}
.btn-danger{background:var(--danger);color:#fff;border-color:transparent;box-shadow:inset 0 0 0 1px rgba(255,255,255,.10),var(--shadow-sm),0 1px 2px rgba(220,38,38,.25)}
.btn-danger:hover{background:#b91c1c;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14),var(--shadow-md),0 2px 4px rgba(220,38,38,.30)}
.btn-success{background:var(--success);color:#fff;border-color:transparent;box-shadow:inset 0 0 0 1px rgba(255,255,255,.10),var(--shadow-sm),0 1px 2px rgba(22,163,74,.25)}
.btn-success:hover{background:#15803d;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14),var(--shadow-md),0 2px 4px rgba(22,163,74,.30)}
.btn-warn{background:var(--edit);color:#fff;border-color:transparent;box-shadow:var(--shadow-sm)}
.btn-warn:hover{background:#a16207;box-shadow:var(--shadow-md)}
.btn-lg{font-size:16px;padding:14px 22px;min-height:52px;border-radius:var(--radius-md);font-weight:600}
.btn-block{width:100%}

/* ---- Sidebar nav ---- */
.nav-btn{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;cursor:pointer;
  padding:11px 14px;border-radius:var(--radius-md);font-weight:500;font-size:14.5px;
  color:var(--text-soft);
  background:transparent;border:none;font-family:inherit;
  transition:background .15s var(--ease),color .15s var(--ease);
  letter-spacing:-0.005em;min-height:42px;position:relative;
}
.nav-btn:hover{background:var(--surface-2);color:var(--text)}
.nav-btn.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
html.dark .nav-btn.active{background:var(--primary-soft);color:var(--primary)}

/* ---- Badges ---- */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:6px;
  font-size:12.5px;font-weight:600;letter-spacing:-0.005em;
  border:1px solid;
  background:var(--surface-2);color:var(--text-soft);border-color:var(--border);
}
.badge-ok{background:var(--success-soft);color:var(--success);border-color:transparent}
.badge-warn{background:var(--warn-soft);color:var(--warn);border-color:transparent}
.badge-danger{background:var(--danger-soft);color:var(--danger);border-color:transparent}
.badge-info{background:var(--info-soft);color:var(--info);border-color:transparent}

/* ---- KPIs (alta jerarquía visual: totales grandes y notorios) ---- */
.kpi{
  padding:22px;border-radius:var(--radius-lg);
  border:1px solid var(--border);background:var(--surface);
  box-shadow:var(--shadow-sm);
  transition:border-color .15s var(--ease),box-shadow .15s var(--ease);
}
.kpi:hover{box-shadow:var(--shadow-md);border-color:var(--border-strong)}
.kpi .v{font-family:'Inter',sans-serif;font-size:30px;font-weight:700;line-height:1.1;letter-spacing:-0.028em;color:var(--text);font-variant-numeric:tabular-nums}
.kpi .l{font-weight:600;color:var(--muted);font-size:13px;letter-spacing:-0.005em;margin-bottom:10px;text-transform:none}

/* ---- Tables (filas confortables tipo Stripe admin) ---- */
table.tbl{
  width:100%;border-collapse:collapse;
  border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;
  background:var(--surface);
  box-shadow:var(--shadow-xs);
}
table.tbl th{
  text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);padding:14px 16px;font-weight:700;
  background:var(--surface-2);border-bottom:1px solid var(--border);
}
table.tbl td{padding:16px 16px;border-top:1px solid var(--border);font-size:14.5px;color:var(--text);font-weight:500;vertical-align:middle}
table.tbl tr{transition:background .12s var(--ease)}
table.tbl tr:hover td{background:var(--surface-2)}
table.tbl tr:first-child td{border-top:none}
html.dark table.tbl th{background:var(--surface-2);color:var(--muted)}

/* ---- Chips ---- */
.chip{padding:7px 14px;border-radius:999px;background:var(--surface);border:1.5px solid var(--border-strong);font-weight:500;cursor:pointer;font-size:13.5px;color:var(--text-soft);transition:all .15s var(--ease)}
.chip:hover{background:var(--surface-2);color:var(--text);border-color:var(--muted-soft)}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:var(--shadow-sm)}

/* Action buttons confortables (40x40 mínimo para target táctil) */
.btn-action{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:40px;min-height:40px;padding:8px 12px;
  border-radius:var(--radius);
  border:1.5px solid var(--border-strong);
  background:var(--surface);color:var(--text-soft);
  font-size:14px;font-weight:500;cursor:pointer;
  transition:all .15s var(--ease);line-height:1;
  box-shadow:var(--shadow-xs);
}
.btn-action:hover{background:var(--surface-2);border-color:var(--muted-soft);color:var(--text);box-shadow:var(--shadow-sm)}
.btn-action.ba-view{color:var(--info)}
.btn-action.ba-view:hover{background:var(--info-soft);border-color:var(--info);color:var(--info)}
.btn-action.ba-edit{color:var(--edit)}
.btn-action.ba-edit:hover{background:var(--edit-soft);border-color:var(--edit);color:var(--edit)}
.btn-action.ba-del{color:var(--danger)}
.btn-action.ba-del:hover{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
.btn-action.ba-print{background:var(--text);color:var(--surface);border-color:var(--text)}
.btn-action.ba-print:hover{filter:brightness(1.15)}
.btn-action.ba-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-action.ba-primary:hover{background:var(--primary-d)}
.row-actions{display:inline-flex;gap:6px;flex-wrap:nowrap;justify-content:flex-end}

/* ---- Result items ---- */
.result-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px 16px;border-radius:var(--radius);cursor:pointer;border:1.5px solid var(--border);transition:all .15s var(--ease);font-size:14.5px;font-weight:500;background:var(--surface)}
.result-item:hover{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}

/* ---- Keypad ---- */
.key{font-family:'Inter';font-size:24px;font-weight:600;background:var(--surface);border:1.5px solid var(--border-strong);border-radius:var(--radius-md);padding:18px 0;cursor:pointer;transition:all .12s var(--ease);color:var(--text);min-height:56px;box-shadow:var(--shadow-xs)}
.key:hover{background:var(--surface-2);border-color:var(--muted-soft);box-shadow:var(--shadow-sm)}
.key:active{transform:scale(.96);background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}

/* ---- Animaciones ---- */
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes slideR{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
.view{animation:fade .22s var(--ease-out) both}
.stagger>*{animation:fade .28s var(--ease-out) both}
.stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.05s}
.stagger>*:nth-child(3){animation-delay:.08s}.stagger>*:nth-child(4){animation-delay:.11s}
.stagger>*:nth-child(5){animation-delay:.14s}.stagger>*:nth-child(6){animation-delay:.17s}

/* ---- Toast ---- */
#toast-root{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{
  display:flex;align-items:center;gap:11px;
  background:var(--surface);border:1px solid var(--border-strong);
  border-radius:var(--radius-md);padding:14px 18px;
  box-shadow:var(--shadow-lg);font-weight:500;font-size:14.5px;
  animation:slideR .22s var(--ease-out) both;max-width:400px;color:var(--text);
}
.toast .ti{font-size:20px;flex-shrink:0}
.toast.ok{border-left:4px solid var(--success)}
.toast.err{border-left:4px solid var(--danger)}
.toast.warn{border-left:4px solid var(--warn)}

/* ---- Modal premium (backdrop blur + sombra layered Stripe) ---- */
#modal-root{
  position:fixed;inset:0;z-index:9000;
  display:none;align-items:center;justify-content:center;
  padding:18px;
  background:rgba(15,23,42,.55);
  backdrop-filter:blur(8px) saturate(140%);
  -webkit-backdrop-filter:blur(8px) saturate(140%);
}
#modal-root.show{display:flex;animation:fade .18s var(--ease-out) both}
.modal-box{
  width:100%;max-width:560px;max-height:92vh;overflow:auto;
  animation:pop .24s var(--ease-out) both;
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-modal);
  border:1px solid var(--border);
  background:var(--surface);
}

/* ---- Sidebar mobile ---- */
#sidebar{transition:transform .25s var(--ease)}
@media(max-width:900px){
  #sidebar{position:fixed;z-index:8000;height:100%;transform:translateX(-105%);box-shadow:var(--shadow-xl)}
  #sidebar.open{transform:none}
  #overlay.show{display:block}
}
#overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);z-index:7000}

/* ---- Header ---- */
header{box-shadow:var(--shadow-xs);border-bottom:1px solid var(--border)}

/* ---- Header avatar ---- */
.user-chip{
  display:flex;align-items:center;gap:11px;
  padding:5px 14px 5px 5px;border-radius:999px;
  background:var(--surface-2);cursor:default;
  border:1px solid var(--border);
  transition:background .15s var(--ease),border-color .15s var(--ease);
}
.user-chip:hover{background:var(--surface-3);border-color:var(--border-strong)}
.user-chip .avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--primary-d));
  color:#fff;display:flex;align-items:center;justify-content:center;

/* ============================================================
   IMPRESIÓN DUAL — POS 80mm + Carta empresarial
   ============================================================
   El #printArea se conserva. Una clase en <body> elige el modo:
   - body.print-pos    → ticket térmico 80mm
   - body.print-carta  → factura tamaño carta profesional
   La función aplicarAnchoImpresion() sigue funcionando para el ancho
   POS personalizado por plantilla.
   ============================================================ */
#printArea, #printAreaCarta {display:none}

@media print{
  /* ============================================================
     PRINT POS (80mm) — versión rápida con visibility:hidden
     ============================================================
     Usamos visibility:hidden (no display:none) para los elementos no-print.
     visibility:hidden NO dispara reflow del documento, solo repaint, lo que
     hace que window.print() se invoque casi instantáneo incluso con
     documentos grandes. display:none nos costaba 500-1500ms de demora.

     Para evitar el "shrink-to-fit" del navegador cuando hay muchos items
     (Chrome encoge la fuente proporcionalmente cuando un elemento absolute
     es muy alto), añadimos: height:auto + min-height:0 + max-height:none +
     page-break-inside:auto. Esto le indica al browser que paginar dentro
     del ticket es seguro, en lugar de encogerlo todo.
     ============================================================ */
  body *{ visibility:hidden !important; }

  /* MODO POS (80mm) */
  body.print-pos #printArea,
  body.print-pos #printArea *{ visibility:visible !important; }
  body.print-pos #printArea{
    display:block !important;
    position:absolute;
    left:0; top:0;
    width:80mm;
    height:auto !important;
    min-height:0 !important;
    max-height:none !important;
    color:#000;
    background:#fff;
    page-break-inside:auto;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  /* Permitir paginación natural en CUALQUIER elemento dentro del ticket,
     para que Chrome no aplique scale global al ver contenido largo */
  body.print-pos #printArea *,
  body.print-pos #printArea table,
  body.print-pos #printArea tr,
  body.print-pos #printArea tbody{
    page-break-inside:auto !important;
  }
  body.print-pos #printAreaCarta{ display:none !important; }
  body.print-pos @page{ size:80mm auto; margin:0 }

  /* MODO CARTA — factura empresarial tamaño carta */
  body.print-carta #printAreaCarta,
  body.print-carta #printAreaCarta *{ visibility:visible !important; }
  body.print-carta #printAreaCarta{
    display:block !important;
    position:absolute;
    left:0; top:0;
    width:100%;
    color:#000;
    background:#fff;
  }
  body.print-carta #printArea{ display:none !important; }
  body.print-carta @page{ size:letter; margin:0 }
}

/* Reglas específicas adicionales por modo, fuera del default genérico */
@media print {
  body.print-carta header,
  body.print-carta #sidebar,
  body.print-carta #overlay,
  body.print-carta #syncBadge,
  body.print-carta #toast-root,
  body.print-carta #modal-root{ display:none!important; visibility:hidden!important; }
}

  transition:opacity .2s, transform .2s;
}
#syncBadge .sync-dot{

}
#syncBadge.sync-online .sync-dot{background:var(--success);box-shadow:0 0 0 3px var(--success-soft)}
#syncBadge.sync-syncing .sync-dot{background:var(--info);animation:syncPulse 1s infinite}

/* ============================================================
   MEJORAS DE ACCESIBILIDAD PARA ADULTOS MAYORES
   ============================================================
   Aumenta legibilidad, contraste y área táctil sin tocar lógica.
   ============================================================ */

/* Inputs y selects nativos: igualar visibilidad a .input */
input[type="text"], input[type="number"], input[type="email"],
input[type="tel"], input[type="search"], input[type="password"],
input[type="date"], input[type="time"], input[type="datetime-local"],
select, textarea{
  font-size:16.5px; font-weight:500; font-family:inherit;
}
select.input, select.input:not([multiple]){
  cursor:pointer;
}

/* Textarea con buen contraste */
textarea.input{ line-height:1.5; padding:13px 16px; min-height:90px; }

/* Checkboxes y radios más grandes y visibles */
input[type="checkbox"], input[type="radio"]{
  width:20px; height:20px; cursor:pointer;
  accent-color:var(--primary);
}

/* Enlaces más claros */
a{ color:var(--primary-d); font-weight:600; text-decoration:underline; text-underline-offset:2px; }
a:hover{ color:#1e3a8a; }

/* Headings ligeramente mayores para jerarquía */
h1{font-size:1.6em}
h2{font-size:1.35em}
h3{font-size:1.18em}
h4{font-size:1.05em}

/* Foco accesible (3px para usuarios con poca experiencia tecnológica) */
button:focus-visible, .btn:focus-visible, .chip:focus-visible,
.btn-action:focus-visible, .nav-btn:focus-visible, .key:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible{
  outline:3px solid var(--primary-ring);
  outline-offset:2px;
}

/* Texto secundario */
.text-muted, .muted{color:var(--muted)!important;font-weight:500}

/* Cursor pointer claro en elementos clickeables */
button, .btn, .chip, .nav-btn, .btn-action, .key, .result-item, .card[onclick]{cursor:pointer}

/* Dark mode badges */
html.dark .badge-ok{color:#86efac;background:rgba(74,222,128,.14);border-color:transparent}
html.dark .badge-warn{color:#fcd34d;background:rgba(251,191,36,.14);border-color:transparent}
html.dark .badge-danger{color:#fca5a5;background:rgba(248,113,113,.14);border-color:transparent}
html.dark .badge-info{color:#93c5fd;background:rgba(96,165,250,.14);border-color:transparent}

.money, .amount, [data-money]{font-variant-numeric:tabular-nums;font-weight:700}

/* Inputs en modo oscuro: borde más visible */
html.dark .input{ border-color:var(--border-strong) }

/* Asegurar que los botones de impresión y acción tengan buena área táctil */
button{ font-family:inherit }

/* ============================================================
   EDITOR DEL CIERRE POS — layout responsive
   ============================================================
   - Desktop (≥ 900px): 2 columnas — controles a la izquierda, preview a la derecha.
   - Mobile/Tablet angosto (< 900px): 1 columna apilada. La preview se puede
     ocultar con el botón "👁️" para no comer espacio mientras editas.
   ============================================================ */
.cp-editor-grid{
  display:grid; gap:16px;
  grid-template-columns:1.2fr .8fr;
  align-items:start;
}
.cp-editor-controls{
  max-height:68vh; overflow:auto; padding-right:6px;
  display:flex; flex-direction:column; gap:12px;
}
.cp-editor-previewbox{
  background:#9aa7a2; border-radius:14px; padding:14px;
  display:flex; justify-content:center;
  max-height:64vh; overflow:auto;
}
/* Filas drag-and-drop: compactas, label no se corta */
.cp-sec-row{
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; background:#fff;
  border:2px solid var(--border); border-radius:10px;
  cursor:move; user-select:none;
}
.cp-sec-handle{ color:var(--muted); font-size:20px; line-height:1; flex-shrink:0; }
.cp-sec-num{
  display:inline-flex; align-items:center; justify-content:center;
  min-width:22px; height:22px; border-radius:50%;
  background:var(--primary-soft); color:var(--primary-d);
  font-weight:700; font-size:13px; flex-shrink:0;
}
.cp-sec-label{
  flex:1; display:flex; align-items:center; gap:8px;
  cursor:pointer; font-weight:600; min-width:0;
}
.cp-sec-label-text{
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.cp-sec-state{ font-size:12px; color:var(--muted); flex-shrink:0; }
/* Botón toggle de preview — solo visible en mobile */
.cp-preview-toggle{ display:none; }

@media (max-width: 900px){
  .cp-editor-grid{ grid-template-columns:1fr; }
  .cp-editor-controls{
    max-height:none; overflow:visible; padding-right:0;
    /* En mobile el modal entero es el scroll container */
  }
  .cp-editor-previewbox{ max-height:55vh; }
  /* Ocultar el texto "Visible/Oculta": redundante con checkbox + opacidad */
  .cp-sec-state{ display:none; }
  /* En mobile, mostrar el botón toggle de preview */
  .cp-preview-toggle{ display:inline-flex; }
  /* La preview se puede colapsar con .is-collapsed */
  .cp-preview-wrap.is-collapsed .cp-editor-previewbox,
  .cp-preview-wrap.is-collapsed .cp-preview-note{ display:none; }
}

/* =====================================================================
   Autocomplete unificado de productos (Ventas / Compras / Inventario)

.ac-item.active, .ac-item:hover{ background:var(--primary-soft); }

  font-size:11px; font-weight:700;
}

/* ============================================================
   ICONOS LUCIDE
   ============================================================
   Helper para refrescar los iconos. Lucide procesa <i data-lucide="name">
   y los reemplaza por SVG. Hay que llamarlo después de cada render
   dinámico que pueda contener iconos nuevos.
   Es idempotente y barato. Tolera ausencia de la librería (CDN caído).
   ============================================================ */
function renderLucide(root){
  if(typeof window.lucide === 'undefined' || !window.lucide.createIcons) return;
  try{
    if(root && root.nodeType){
      window.lucide.createIcons({ root });
    }else{
      window.lucide.createIcons();
    }
  }catch(e){ /* silencioso, no es crítico */ }
}

/* Parsea un valor a número entendiendo el formato es-CO:
   - Si es número, lo devuelve tal cual.
   - Si es string: el punto es SEPARADOR DE MILES y la coma es decimal.
     Ej: "5.200" -> 5200, "1.234.567,89" -> 1234567.89, "5,2" -> 5.2
   Esto es crítico: parseFloat("5.200") devuelve 5.2, lo cual rompía
   precios mostrados con separador de miles. */
function num(v){
  if(v==null||v==='')return 0;
  if(typeof v==='number')return isFinite(v)?v:0;
  let s=String(v).trim();
  if(!s)return 0;
  // Quitar todo lo que no sea dígito, signo, punto o coma
  s=s.replace(/[^\d.,\-]/g,'');
  if(!s||s==='-')return 0;
  // En es-CO el punto es miles y la coma es decimal. Quitar puntos y cambiar coma por punto.
  s=s.replace(/\./g,'').replace(',','.');
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}

/* ============================================================
   OPTIMIZACIÓN POS: helpers para flujo offline-first
   ============================================================
   El objetivo es que la impresión NUNCA espere a Supabase.
   - withTimeout: corta cualquier promesa lenta para no congelar UI.
   - setSyncStatus: actualiza el badge visual del sync sin acoplar
     la lógica del POS al módulo de sync.                       */
function withTimeout(promise, ms){
  ms = ms || 3000;
  return Promise.race([
    Promise.resolve(promise),
    new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout sync ('+ms+'ms)')), ms))
  ]);
}
function setSyncStatus(state, text){
  // Mapeo amigable: 'printing' | 'syncing' | 'online' | 'offline' | 'error'
  const badge = document.getElementById('syncBadge');
  if(!badge) return;
  const cls = {printing:'syncing', syncing:'syncing', online:'online', offline:'offline', error:'error'}[state] || 'online';
  badge.classList.remove('sync-online','sync-syncing','sync-offline','sync-error');
  badge.classList.add('sync-'+cls);
  const t = badge.querySelector('.sync-text');
  if(!t) return;
  let final = text || '';
  // Mostrar contador de pendientes en el badge si los hay (excepto en error)
  if(state !== 'error' && window.posSync && typeof window.posSync.getQueueStats==='function'){
    try{
      const n = window.posSync.getQueueStats().total;
      if(n > 0) final = final + ' · ' + n + ' pend.';
    }catch(e){}
  }
  t.textContent = final;
}

/* ============================================================
   DEBOUNCE para búsquedas. Sin esto, cada tecla en un input
   con 5000+ productos dispara un re-render completo y la UI
   se nota lenta. 150ms es suficiente para sentirse instantáneo
   y eliminar el 90% de trabajo desperdiciado.
   ============================================================ */
const _debounceTimers = {};
function debounce(fn, key, ms){
  ms = ms || 150;
  return function(){
    const args = arguments;
    if(_debounceTimers[key]) clearTimeout(_debounceTimers[key]);
    _debounceTimers[key] = setTimeout(()=>{ fn.apply(null, args); }, ms);
  };
}
/* Helper inline para usar en oninput="_dbq('clave', expr)".
   Ejecuta expr 150ms después de la última pulsación. */
function _dbq(key, fn){
  if(_debounceTimers[key]) clearTimeout(_debounceTimers[key]);
  _debounceTimers[key] = setTimeout(fn, 150);
}

/* ============================================================
   ÍNDICES Map de productos para búsqueda instantánea O(1).
   En lugar de DB.productos.find(...) que recorre todo el array
   (O(n) — costoso con 5000+ productos en cada tecleada),
   mantenemos dos Maps: uno por código y otro por código de barras.
   Se reconstruyen cuando cambia DB.productos.
   ============================================================ */
let _prodIdxCodigo = new Map();
let _prodIdxBarras = new Map();
function rebuildProductIndex(){
  _prodIdxCodigo.clear();
  _prodIdxBarras.clear();
  for(const p of (DB.productos||[])){
    if(!p) continue;
    if(p.codigo){ _prodIdxCodigo.set(String(p.codigo).toLowerCase(), p); }
    if(p.barras){ _prodIdxBarras.set(String(p.barras).toLowerCase(), p); }
  }
}
/* Búsqueda O(1) por código exacto o barras exacto. Retorna producto o null. */
function findProductoExact(query){
  if(!query) return null;
  const q = String(query).toLowerCase().trim();
  return _prodIdxCodigo.get(q) || _prodIdxBarras.get(q) || null;
}

/* Aplica formato de miles en vivo a un input. El input debe ser type="text" inputmode="numeric".
   El valor "real" se lee con num(input.value) que ya limpia puntos. */
function bindMilesInput(inputEl){
  if(!inputEl || inputEl._milesBound) return;
  inputEl._milesBound = true;
  inputEl.setAttribute('inputmode','numeric');
  inputEl.setAttribute('autocomplete','off');
  // Si tenía type="number" cámbialo a text para permitir el punto visual
  if(inputEl.type==='number') inputEl.type='text';
  // Formato inicial si trae valor
  if(inputEl.value!==''){
    const v0=num(inputEl.value);
    inputEl.value = v0 ? v0.toLocaleString('es-CO') : '';
  }
  inputEl.addEventListener('input', e=>{
    const el=e.target;
    // Guardar posición del cursor relativa al final
    const lenBefore = el.value.length;
    const posBefore = el.selectionStart || 0;
    const raw = el.value.replace(/[^\d-]/g,''); // quita puntos
    if(raw===''||raw==='-'){ el.value=raw; return; }
    const n = parseInt(raw,10);
    if(isNaN(n)){ el.value=''; return; }
    el.value = n.toLocaleString('es-CO');
    // Restaurar cursor (aproximado)
    const lenAfter = el.value.length;
    const newPos = Math.max(0, posBefore + (lenAfter - lenBefore));
    try{ el.setSelectionRange(newPos, newPos); }catch(e){}
  });
  // Al perder foco, normalizar visualización
  inputEl.addEventListener('blur', e=>{
    const v = num(e.target.value);
    e.target.value = v ? v.toLocaleString('es-CO') : '';
  });
}
/* Conecta formato de miles a todos los inputs con data-miles="1" dentro de un contenedor */
function bindMilesInputsIn(root){
  (root||document).querySelectorAll('input[data-miles="1"]').forEach(bindMilesInput);
}

/* ---- Sonido suave ---- */
function beep(){
  if(!DB.config.sonido)return;
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(660,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(990,ctx.currentTime+.12);
    g.gain.setValueAtTime(.0001,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.16,ctx.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.32);
    o.start();o.stop(ctx.currentTime+.33);
  }catch(e){}
}

function ventasDeFecha(f){return DB.facturas.filter(x=>x.fecha.slice(0,10)===f)}
function rangoTotales(desde,hasta){
  let total=0,utilidad=0,n=0;
  DB.facturas.forEach(f=>{const d=f.fecha.slice(0,10); if(d>=desde&&d<=hasta){total+=f.total;utilidad+=(f.utilidad||0);n++}});
  return {total,utilidad,n};
}
/* Totales de compras en un rango de fechas */
function comprasRango(desde,hasta){
  let total=0,n=0;
  DB.compras.forEach(c=>{const d=(c.fecha||'').slice(0,10); if(d>=desde&&d<=hasta){total+=num(c.total);n++}});
  return {total,n};
}
/* Totales de gastos en un rango de fechas (con desglose por categoría) */
function gastosRango(desde,hasta){
  let total=0,n=0; const porCat={};
  DB.gastos.forEach(g=>{const d=(g.fecha||'').slice(0,10); if(d>=desde&&d<=hasta){
    const m=num(g.monto); total+=m; n++;
    const cat=g.categoria||'Otros'; porCat[cat]=(porCat[cat]||0)+m;
  }});
  return {total,n,porCat};
}
/* Reporte financiero completo de un periodo: cruza ventas, compras y gastos */
function reporteRango(desde,hasta){
  let ventas=0,utilidadBruta=0,costoVenta=0,nFac=0;
  DB.facturas.forEach(f=>{const d=f.fecha.slice(0,10); if(d>=desde&&d<=hasta){
    const tot=num(f.total), uti=num(f.utilidad||0);
    ventas+=tot; utilidadBruta+=uti; costoVenta+=(tot-uti); nFac++;
  }});
  const co=comprasRango(desde,hasta);
  const ga=gastosRango(desde,hasta);

  // === CUENTAS POR PAGAR (todas las compras a crédito con saldo > 0) ===
  // Se calcula sobre TODAS las compras (no solo las del rango) para mostrar la
  // foto actual de deuda. Pero los abonos del periodo sí se filtran.
  const hoy=todayISO();
  const porPagar=(DB.compras||[]).filter(c=>(c.tipoPago||'contado')==='credito' && num(c.saldo)>0.5);
  let cxpTotal=0, cxpVencido=0, cxpPorVencer=0, cxpSinFecha=0;
  const cxpPorProveedor={}; // {nombre: {total, saldo, abonado, nFacturas, vencidas}}
  porPagar.forEach(c=>{
    const saldo=num(c.saldo);
    const abonado=(c.abonos||[]).reduce((s,a)=>s+num(a.monto),0);
    cxpTotal+=saldo;
    if(c.vence){
      if(c.vence<hoy) cxpVencido+=saldo;
      else cxpPorVencer+=saldo;
    }else{
      cxpSinFecha+=saldo;
    }
    const prov=c.proveedor||'Sin proveedor';
    if(!cxpPorProveedor[prov]) cxpPorProveedor[prov]={saldo:0,total:0,abonado:0,nFacturas:0,vencidas:0};
    cxpPorProveedor[prov].saldo+=saldo;
    cxpPorProveedor[prov].total+=num(c.total);
    cxpPorProveedor[prov].abonado+=abonado;
    cxpPorProveedor[prov].nFacturas++;
    if(c.vence && c.vence<hoy) cxpPorProveedor[prov].vencidas++;
  });

  // Abonos pagados dentro del rango (salida real de caja por crédito)
  let abonosDelPeriodo=0, nAbonos=0;
  (DB.compras||[]).forEach(c=>{
    (c.abonos||[]).forEach(a=>{
      const d=(a.fecha||'').slice(0,10);
      if(d>=desde && d<=hasta){
        abonosDelPeriodo+=num(a.monto);
        nAbonos++;
      }
    });
  });

  // Compras a crédito nuevas en el periodo (deuda generada)
  let creditoNuevoPeriodo=0, nCreditosNuevos=0;
  (DB.compras||[]).forEach(c=>{
    const d=(c.fecha||'').slice(0,10);
    if(d>=desde && d<=hasta && (c.tipoPago||'contado')==='credito'){
      creditoNuevoPeriodo+=num(c.total);
      nCreditosNuevos++;
    }
  });

  // === VALOR DEL INVENTARIO ACTUAL (foto al día de hoy) ===
  // Se calcula sobre TODOS los productos con stock > 0
  let invValorCosto=0, invValorVenta=0, invUnidades=0, invSKUs=0, invBajoStock=0, invSinStock=0;
  const invPorCategoria={};
  (DB.productos||[]).forEach(p=>{
    const stock=num(p.stock);
    const costo=num(p.costo);
    const precio=num(p.precio);
    const stockMin=num(p.stockMin);
    invSKUs++;
    if(stock<=0){invSinStock++;return;}
    if(stock<=stockMin) invBajoStock++;
    const valCosto=stock*costo;
    const valVenta=stock*precio;
    invValorCosto+=valCosto;
    invValorVenta+=valVenta;
    invUnidades+=stock;
    const cat=p.categoria||'Sin categoría';
    if(!invPorCategoria[cat]) invPorCategoria[cat]={nSKUs:0,unidades:0,valorCosto:0,valorVenta:0};
    invPorCategoria[cat].nSKUs++;
    invPorCategoria[cat].unidades+=stock;
    invPorCategoria[cat].valorCosto+=valCosto;
    invPorCategoria[cat].valorVenta+=valVenta;
  });
  const invUtilidadPotencial=invValorVenta-invValorCosto;
  const invMargenPct=invValorCosto>0?(invUtilidadPotencial/invValorCosto*100):0;

  return {
    desde,hasta,
    ventas, nFac, costoVenta, utilidadBruta,
    compras:co.total, nCompras:co.n,
    gastos:ga.total, nGastos:ga.n, gastosPorCat:ga.porCat,
    utilidadNeta: utilidadBruta - ga.total,   // ganancia real por margen, ya descontados los gastos
    flujoCaja: ventas - co.total - ga.total,   // dinero que entró menos el que salió en el periodo
    // Cuentas por pagar
    cxpTotal, cxpVencido, cxpPorVencer, cxpSinFecha,
    cxpPorProveedor, nFacturasPorPagar: porPagar.length,
    abonosDelPeriodo, nAbonos,
    creditoNuevoPeriodo, nCreditosNuevos,
    flujoCajaProyectado: ventas - co.total - ga.total - cxpTotal, // flujo proyectado restando deuda pendiente
    // Inventario actual
    invValorCosto, invValorVenta, invUtilidadPotencial, invMargenPct,
    invUnidades, invSKUs, invBajoStock, invSinStock, invPorCategoria
  };
}
/* ============================================================
   CIERRE DE CAJA
   ============================================================
   Función agregada al dashboard. Valida estado de sincronización
   (reusa window.posSync.getQueueStats), abre modal con resumen,
   y permite imprimir un ticket POS 80mm con el informe del día.

   Reusa TODO lo existente: openModal/closeModal, prepararImpresionPOS,
   _setPrintMode, window.print, plantillaActiva, ventasDeFecha,
   comprasRango, gastosRango. No introduce dependencias nuevas.
   ============================================================ */

// Lee el estado de sincronización actual. Tolera la ausencia de posSync
// (modo offline puro sin Supabase): devuelve { ok: true, ... } igual.
function __cierreEstadoSync(){
  let pending = 0, dead = 0, total = 0, online = true, available = false;
  if(window.posSync && typeof window.posSync.getQueueStats === 'function'){
    available = true;
    try{
      const s = window.posSync.getQueueStats();
      pending = num(s.pending);
      dead    = num(s.dead);
      total   = num(s.total);
    }catch(e){}
    if(typeof window.posSync.isOnline === 'function'){
      try{ online = !!window.posSync.isOnline(); }catch(e){ online = true; }
    }
  }
  // OK = sin pendientes ni fallidos. Si no hay posSync (sin Supabase) consideramos OK.
  const ok = (pending === 0 && dead === 0);
  return { ok, pending, dead, total, online, available };
}

// Línea breve que aparece en la card del dashboard.
function __cierreEstadoInline(){
  const s = __cierreEstadoSync();
  if(!s.available){
    return `<span style="color:var(--muted)">⚪ Modo local — listo para cerrar</span>`;
  }
  if(s.ok && s.online){
    return `<span style="color:var(--success)">🟢 Sistema sincronizado — listo para cerrar</span>`;
  }
  if(s.ok && !s.online){
    return `<span style="color:var(--warn)">🟡 Sin conexión · datos locales OK</span>`;
  }
  if(s.dead > 0){
    return `<span style="color:var(--danger)">🔴 ${fmt(s.dead)} registro(s) con error · ${fmt(s.pending)} pendiente(s)</span>`;
  }
  return `<span style="color:var(--warn)">🟠 ${fmt(s.pending)} pendiente(s) por sincronizar</span>`;
}

// Calcula todos los totales del día para el ticket.
function generarCierreCaja(fecha){
  const f = fecha || todayISO();
  const facsHoy = DB.facturas.filter(x => (x.fecha||'').slice(0,10) === f);
  const c = DB.config || {};

  // Totales globales
  let ventasTotal = 0, descuentos = 0, utilidadTotal = 0, subtotalGlobal = 0;
  // Métodos de pago
  const metodos = { Efectivo:0, Transferencia:0, QR:0, Tarjeta:0, Crédito:0, Otros:0 };
  // Productos vendidos
  const vendidos = {}; // {id: {nombre, codigo, cantidad, monto}}
  let nLineas = 0, totalUnidades = 0;

  facsHoy.forEach(fac=>{
    const t = num(fac.total);
    ventasTotal   += t;
    descuentos    += num(fac.descuento);
    utilidadTotal += num(fac.utilidad);
    subtotalGlobal+= num(fac.subtotal);

    const m = String(fac.metodo||'');
    if(/^Mixto/i.test(m)){
      // "Mixto (efectivo: $40,000, transferencia: $20,000, qr: $5,000)"
      // El split por ", " es peligroso porque los miles también usan coma.
      // Mejor: separar por "<palabra>:" y quedarnos con cada par método→valor.
      const inner = m.replace(/^Mixto\s*\(/i,'').replace(/\)\s*$/,'');
      // Regex: nombre seguido de ':' seguido del monto hasta antes de la siguiente palabra-con-dos-puntos o fin.
      const re = /([A-Za-zÁÉÍÓÚÑáéíóúñ]+)\s*:\s*([^,]+(?:,\d{3})*(?:\.\d+)?)/g;
      let mm;
      while((mm = re.exec(inner)) !== null){
        const key = mm[1].toLowerCase();
        const val = num(mm[2].replace(/[^\d.-]/g, ''));
        if(/efect/.test(key))              metodos.Efectivo += val;
        else if(/transf/.test(key))        metodos.Transferencia += val;
        else if(/qr/.test(key))            metodos.QR += val;
        else if(/tarj|deb/.test(key))      metodos.Tarjeta += val;
        else if(/cr[eé]d/.test(key))       metodos['Crédito'] += val;
        else                               metodos.Otros += val;
      }
    } else {
      const k = m.toLowerCase();
      if(/efect/.test(k))          metodos.Efectivo += t;
      else if(/transf/.test(k))    metodos.Transferencia += t;
      else if(/qr/.test(k))        metodos.QR += t;
      else if(/tarj|cred|deb/.test(k)) metodos.Tarjeta += t;
      else if(/cr[eé]d/.test(k))   metodos['Crédito'] += t;
      else                         metodos.Otros += t;
    }

    (fac.items||[]).forEach(it=>{
      const id   = it.id || it.codigo || it.nombre;
      const cant = num(it.cantidad);
      const monto= (num(it.precio) - num(it.desc||0)) * cant;
      if(!vendidos[id]) vendidos[id] = { nombre: it.nombre, codigo: it.codigo, cantidad: 0, monto: 0 };
      vendidos[id].cantidad += cant;
      vendidos[id].monto    += monto;
      nLineas++;
      totalUnidades += cant;
    });
  });

  // Compras y gastos del día
  const co = comprasRango(f, f);
  const ga = gastosRango(f, f);

  // Inventario
  const productos    = DB.productos || [];
  const agotados     = productos.filter(p => num(p.stock) <= 0).length;
  const stockBajo    = productos.filter(p => num(p.stock) > 0 && num(p.stock) <= num(p.stockMin)).length;

  // Lista de productos vendidos ordenada por monto descendente
  const vendidosLista = Object.values(vendidos).sort((a,b)=>b.monto - a.monto);

  // Estado del sistema
  const sync = __cierreEstadoSync();

  return {
    fecha: f,
    hora: new Date().toTimeString().slice(0,8),
    cajero: c.cajero || c.usuario || 'Cajero',
    terminal: c.terminal || c.caja || 'Caja 1',
    negocio: c.negocio || 'PetPOS',
    nFacturas: facsHoy.length,
    nLineas, totalUnidades,
    ventasTotal, subtotalGlobal, descuentos, utilidadTotal,
    metodos,
    compras: { total: co.total, n: co.n },
    gastos:  { total: ga.total, n: ga.n, porCat: ga.porCat },
    inventario: {
      totalProductos: productos.length,
      agotados, stockBajo,
      vendidosLista
    },
    sync
  };
}

// HTML del ticket 80mm. Usa estilos inline para no depender de CSS externo.
function cierreHTML(r){
  const w = '74mm'; // ~80mm con padding mínimo
  const css = `
    font-family:'Courier New','Roboto Mono',monospace;
    font-size:11px;line-height:1.35;color:#000;background:#fff;
    width:${w};padding:4mm 3mm`;
  const line = `<div style="border-top:1px dashed #000;margin:4px 0"></div>`;
  const row = (l,r,bold) => `<div style="display:flex;justify-content:space-between;${bold?'font-weight:700':''}">
    <span>${esc(l)}</span><span>${esc(r)}</span></div>`;
  const center = (txt, size, bold) => `<div style="text-align:center;${size?'font-size:'+size+'px;':''}${bold?'font-weight:700;':''}">${esc(txt)}</div>`;
  const sec = (titulo) => `${line}${center(titulo, 12, true)}${line}`;

  // Métodos pago
  const metRows = Object.entries(r.metodos)
    .filter(([_,v])=>v>0)
    .map(([k,v])=>row(k+':', money(v)))
    .join('') || '<div style="text-align:center;font-style:italic">(sin pagos registrados)</div>';

  // Productos vendidos (top 15 para no quedar gigantesco)
  const topVendidos = r.inventario.vendidosLista.slice(0, 15);
  const restoVendidos = r.inventario.vendidosLista.length - topVendidos.length;
  const prodRows = topVendidos.length
    ? topVendidos.map(p =>
        `<div style="display:flex;justify-content:space-between;gap:4px">
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            ${esc(String(p.cantidad)+'x ')}${esc((p.nombre||'').slice(0,22))}
          </span>
          <span style="white-space:nowrap">${esc(money(p.monto))}</span>
        </div>`
      ).join('') + (restoVendidos>0 ? `<div style="text-align:center;color:#444;margin-top:2px">…y ${restoVendidos} producto(s) más</div>` : '')
    : '<div style="text-align:center;font-style:italic">(sin ventas hoy)</div>';

  // Gastos por categoría
  const gastoRows = Object.entries(r.gastos.porCat||{})
    .filter(([_,v])=>v>0)
    .map(([k,v])=>row('  '+k+':', money(v)))
    .join('');

  // Estado del sistema
  const syncRows = [];
  if(r.sync.available){
    syncRows.push(r.sync.online    ? '✓ Conexión a la nube activa'   : '⚠ Sin conexión a la nube');
    syncRows.push(r.sync.pending===0 ? '✓ Cola local vacía'             : '⚠ '+fmt(r.sync.pending)+' pendiente(s)');
    syncRows.push(r.sync.dead===0    ? '✓ Sin registros con error'      : '⚠ '+fmt(r.sync.dead)+' registro(s) con error');
  }else{
    syncRows.push('• Modo local (sin sincronización en nube)');
  }

  return `<div style="${css}">
    ${center(r.negocio, 14, true)}
    ${center('CIERRE DE CAJA', 13, true)}
    ${center('Fecha: '+r.fecha+'  '+r.hora)}
    ${center('Cajero: '+r.cajero+'  ·  '+r.terminal)}

    ${sec('RESUMEN GENERAL')}
    ${row('Facturas emitidas:', fmt(r.nFacturas))}
    ${row('Productos vendidos:', fmt(r.totalUnidades)+' u.')}
    ${row('Subtotal:', money(r.subtotalGlobal))}
    ${row('Descuentos:', '-'+money(r.descuentos))}
    ${row('TOTAL VENTAS:', money(r.ventasTotal), true)}
    ${row('Utilidad estimada:', money(r.utilidadTotal))}

    ${sec('MÉTODOS DE PAGO')}
    ${metRows}

    ${sec('MOVIMIENTOS')}
    ${row('Compras (n='+fmt(r.compras.n)+'):', money(r.compras.total))}
    ${row('Gastos  (n='+fmt(r.gastos.n)+'):', money(r.gastos.total))}
    ${gastoRows}

    ${sec('INVENTARIO')}
    ${row('Total productos:', fmt(r.inventario.totalProductos))}
    ${row('Líneas vendidas:', fmt(r.nLineas))}
    ${row('Agotados:', fmt(r.inventario.agotados))}
    ${row('Stock bajo:', fmt(r.inventario.stockBajo))}
    <div style="margin-top:4px;font-weight:700">Productos vendidos:</div>
    ${prodRows}

    ${sec('ESTADO DEL SISTEMA')}
    ${syncRows.map(s=>`<div>${esc(s)}</div>`).join('')}

    ${line}
    <div style="text-align:center;font-weight:700;font-size:13px;margin-top:4px">
      TOTAL EN CAJA
    </div>
    <div style="text-align:center;font-weight:700;font-size:16px">
      ${esc(money(r.ventasTotal - r.compras.total - r.gastos.total))}
    </div>
    <div style="text-align:center;font-size:9px;color:#444;margin-top:2px">
      (ventas − compras − gastos del día)
    </div>

    ${line}
    <div style="margin-top:14px">Firma cajero:</div>
    <div style="border-bottom:1px solid #000;margin-top:18px;width:60%"></div>

    <div style="margin-top:14px">Firma supervisor:</div>
    <div style="border-bottom:1px solid #000;margin-top:18px;width:60%"></div>

    <div style="text-align:center;font-size:9px;color:#444;margin-top:10px">
      Cierre generado ${new Date().toLocaleString('es-CO')}
    </div>
  </div>`;
}

// Imprime el ticket de cierre usando el mismo pipeline que las facturas:
// prepararImpresionPOS → _setPrintMode('pos') → window.print() → _clearPrintMode.
function imprimirCierre(){
  const r = generarCierreCaja();
  const pl = (typeof plantillaActiva === 'function') ? plantillaActiva() : { ancho: 80 };
  const ancho = num(pl.ancho) || 80;
  prepararImpresionPOS(cierreHTML(r), ancho);
  _setPrintMode('pos');
  window.print();
  setTimeout(_clearPrintMode, 400);
}

// Modal principal: muestra el estado de sync, resumen del día, y acciones.
function abrirModalCierre(){
  const r = generarCierreCaja();

  // Bloque de estado
  let estadoHTML = '';
  if(!s.available){

    estadoHTML = `
      <div class="card p-3" style="background:var(--success-soft);border:1.5px solid var(--success);text-align:left">
        <div style="font-weight:800;font-size:15px;color:var(--success)">✅ Sistema sincronizado correctamente</div>
        <div style="font-size:13px;color:var(--text);margin-top:4px">

    estadoHTML = `
      <div class="card p-3" style="background:rgba(245,158,11,.12);border:1.5px solid var(--warn);text-align:left">
        <div style="font-weight:800;font-size:15px;color:var(--warn)">🟡 Sin conexión a la nube</div>
        <div style="font-size:13px;color:var(--text);margin-top:4px">

          Puedes hacer el cierre.
        </div>
      </div>`;
  } else {
    const cuantos = s.pending + s.dead;
    estadoHTML = `
      <div class="card p-3" style="background:rgba(220,38,38,.10);border:1.5px solid var(--danger);text-align:left">
        <div style="font-weight:800;font-size:15px;color:var(--danger)">⚠️ Hay ${fmt(cuantos)} registro(s) pendientes por sincronizar</div>
        <div style="font-size:13px;color:var(--text);margin-top:6px">
          No es posible cerrar la jornada todavía. Sincroniza primero o revisa errores.
        </div>
        <ul style="font-size:13px;color:var(--text);margin:8px 0 0 18px;padding:0">
          ${s.pending>0 ? `<li><b>${fmt(s.pending)}</b> pendiente(s) por subir</li>` : ''}
          ${s.dead>0    ? `<li style="color:var(--danger)"><b>${fmt(s.dead)}</b> con error</li>` : ''}
          <li>Conexión: ${s.online ? '✓ Online' : '⚠ Offline'}</li>
        </ul>
      </div>`;
  }

  // Resumen rápido
  const resumenHTML = `
    <div class="card p-3 mt-3" style="background:var(--surface-2);border:1.5px solid var(--border);text-align:left">
      <div style="font-weight:800;font-size:14px;margin-bottom:8px;letter-spacing:-0.01em">📊 Resumen del día</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px">
        <div>Facturas: <b>${fmt(r.nFacturas)}</b></div>
        <div>Unidades: <b>${fmt(r.totalUnidades)}</b></div>
        <div>Ventas: <b style="color:var(--primary)">${money(r.ventasTotal)}</b></div>
        <div>Utilidad: <b style="color:var(--success)">${money(r.utilidadTotal)}</b></div>
        <div>Compras: <b>${money(r.compras.total)}</b></div>
        <div>Gastos: <b>${money(r.gastos.total)}</b></div>
      </div>
    </div>`;

  // Botones según estado
  let botonesHTML;
  if(ok){
    botonesHTML = `
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary btn-block" onclick="closeModal();imprimirCierre()">
        🖨 Generar e imprimir cierre
      </button>`;
  } else {
    botonesHTML = `
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary btn-block" onclick="__cierreReintentar()">
        🔄 Sincronizar ahora
      </button>`;
  }

  openModal(`<div class="p-5">
    <div style="text-align:center">
      <div style="width:72px;height:72px;border-radius:50%;
                  background:${ok?'var(--success-soft)':'rgba(220,38,38,.15)'};
                  color:${ok?'var(--success)':'var(--danger)'};
                  display:flex;align-items:center;justify-content:center;
                  font-size:36px;margin:0 auto 14px;
                  border:3px solid ${ok?'var(--success)':'var(--danger)'};
                  box-shadow:0 4px 12px rgba(0,0,0,.10)">${ok?'🔒':'⚠'}</div>
      <h3 style="font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-0.01em">
        Cierre de Caja
      </h3>
      <div style="color:var(--muted);font-size:13px;margin-bottom:14px">
        ${esc(r.fecha)} · ${esc(r.hora)} · ${esc(r.cajero)} · ${esc(r.terminal)}
      </div>
    </div>
    ${estadoHTML}
    ${resumenHTML}
    <div class="flex gap-3 mt-4">
      ${botonesHTML}
    </div>
  </div>`);
}

// Acción del botón "Sincronizar ahora" del modal de cierre.
// Lanza posSync.flushNow y reabre el modal cuando termina (con el estado actualizado).
function __cierreReintentar(){
  if(!window.posSync || typeof window.posSync.flushNow !== 'function'){
    toast('Sincronización no disponible','warn');
    return;
  }
  setSyncStatus('syncing','Sincronizando…');
  toast('Sincronizando registros pendientes…','info');
  closeModal();
  window.posSync.flushNow()
    .then(()=>{
      toast('Sincronizado correctamente','ok');
      // Reabrir el modal con el estado nuevo para que el usuario vea el ✓ verde
      setTimeout(abrirModalCierre, 200);
    })
    .catch(err=>{
      console.warn('[cierre] reintento falló:', err);
      toast('Algunos registros no se pudieron subir','warn');
      setTimeout(abrirModalCierre, 200);
    });
}

// ============================================================================
// Helper compartido de prioridad de búsqueda de productos.
// Usado por VENTAS, PRODUCTOS (inventario) y COMPRAS.
// Orden de resultados:
//   1. Código              (exacto > empieza con > contiene)
//   2. Código de barras    (exacto > empieza con > contiene)
//   3. Nombre              (empieza con > contiene)
//   4. Categoría           (empieza con > contiene)
//   5. Proveedor           (empieza con > contiene)
// Mantiene búsqueda PARCIAL (no exige coincidencia exacta).
// Si q está vacío, devuelve toda la lista (sin orden alterado).
// ============================================================================
function __filtrarProductosPrioridad(q){
  q=(q||'').trim().toLowerCase();
  if(!q) return DB.productos.slice();
  function rank(p){
    const cod=String(p.codigo||'').toLowerCase();
    const bar=String(p.barras||'').toLowerCase();
    const nom=String(p.nombre||'').toLowerCase();
    const cat=String(p.categoria||'').toLowerCase();
    const prv=String(p.proveedor||'').toLowerCase();
    if(cod===q)            return 0;
    if(cod.startsWith(q))  return 1;
    if(bar===q)            return 2;
    if(bar.startsWith(q))  return 3;
    if(cod.includes(q))    return 4;
    if(bar.includes(q))    return 5;
    if(nom.startsWith(q))  return 6;
    if(nom.includes(q))    return 7;
    if(cat.startsWith(q))  return 8;
    if(cat.includes(q))    return 9;
    if(prv.startsWith(q))  return 10;
    if(prv.includes(q))    return 11;
    return 99; // sin coincidencia
  }
  return DB.productos
    .map(p=>({p,r:rank(p)}))
    .filter(x=>x.r<99)
    .sort((a,b)=>{
      if(a.r!==b.r) return a.r-b.r;
      // Desempate: si los códigos son numéricos puros, ordenar numéricamente;
      // si no, por longitud y luego alfabéticamente.
      const ca=String(a.p.codigo||''), cb=String(b.p.codigo||'');
      const na=parseInt(ca,10), nb=parseInt(cb,10);
      if(!isNaN(na) && !isNaN(nb) && String(na)===ca && String(nb)===cb) return na-nb;
      if(ca.length!==cb.length) return ca.length-cb.length;
      return ca.localeCompare(cb);
    })
    .map(x=>x.p);
}

function searchProductosNombre(q){
  renderProductosBusqueda(__filtrarProductosPrioridad(q));

// ============================================================================
// COMPONENTE UNIFICADO DE AUTOCOMPLETE DE PRODUCTOS
// Una sola barra de búsqueda + lista desplegable, reutilizado en
// VENTAS, COMPRAS e INVENTARIO. Soporta teclado (↑↓ Enter Esc), mouse,
// resaltado de coincidencias y modo lector de código de barras.
//
// Uso:
//   const inst = productSearchSetup({
//     inputId:    'prodSearch',          // id del <input>
//     listId:     'prodSearchList',      // id del <div> dropdown
//     onSelect:   (producto) => { ... }, // qué hacer al elegir un producto
//     scannerMode:  true|false,          // si true, exact-match auto-selecciona
//     onLiveUpdate: (lista) => { ... },  // opcional: re-render tabla externa
//     maxResults: 30,                    // máximo de items visibles en el dropdown
//     debounceMs: 60,                    // ms de espera al teclear
//     showStock:  true                   // muestra badge de stock (true por defecto)
//   });
// La instancia se guarda en window.__acByInput[inputId] para acceso externo.
// ============================================================================
function productSearchSetup(cfg){
  const input = document.getElementById(cfg.inputId);
  const list  = document.getElementById(cfg.listId);
  if(!input || !list) return null;

  // Registro de instancias para cerrar todas con un clic fuera (un solo listener global)
  window.__acByInput = window.__acByInput || {};
  window.__acInstances = window.__acInstances || [];
  if(!window.__acDocBound){
    window.__acDocBound = true;
    document.addEventListener('mousedown', (e)=>{
      // Cerrar dropdowns cuyo input y lista NO contienen al elemento clickeado
      (window.__acInstances||[]).forEach(inst=>{
        if(!inst.list.isConnected) return;
        if(!inst.list.contains(e.target) && e.target !== inst.input){
          inst.list.classList.remove('open');
        }
      });
    }, true);
  }

  let active = -1;     // índice activo en el dropdown
  let current = [];    // productos visibles actualmente
  let debTimer = null;

  const showStock = cfg.showStock !== false;
  const maxResults = cfg.maxResults || 30;

  // Resalta substring (case-insensitive) sin perder escape de HTML
  function hl(s, q){
    if(!s) return '';
    const str = String(s);
    if(!q) return esc(str);
    const i = str.toLowerCase().indexOf(q);
    if(i < 0) return esc(str);
    return esc(str.slice(0,i))
         + '<mark>' + esc(str.slice(i, i+q.length)) + '</mark>'
         + esc(str.slice(i+q.length));
  }

  function renderItem(p, isActive, q){
    const low = num(p.stock) <= num(p.stockMin);
    const precio = num(p.precio);
    // Si se ha definido getPrecioPara y hay cliente seleccionado, usar precio especial
    let precioMostrar = precio, especial = false;
    try{
      if(typeof getPrecioPara === 'function' && typeof saleClient !== 'undefined'){
        const pc = getPrecioPara(saleClient, p);
        if(typeof tienePrecioEspecial === 'function' && tienePrecioEspecial(saleClient, p)){
          precioMostrar = pc; especial = true;
        }
      }
    }catch(e){}
    return `<div class="ac-item ${isActive?'active':''}" data-id="${esc(p.id)}" role="option">
      <div style="min-width:0;flex:1">
        <div class="ac-nom">${hl(p.nombre, q)}</div>
        <div class="ac-meta">
          <span class="ac-cod">${hl(p.codigo, q)}</span>
          ${p.barras ? `<span>· ${hl(p.barras, q)}</span>` : ''}
          ${p.categoria ? `<span>· ${hl(p.categoria, q)}</span>` : ''}
          ${p.proveedor ? `<span>· ${hl(p.proveedor, q)}</span>` : ''}
        </div>
      </div>
      <div class="ac-right">
        ${especial ? `<div class="ac-precio-esp">${money(precio)}</div>` : ''}
        <div class="ac-precio" style="${especial?'color:#7c3aed':''}">${especial?'💎 ':''}${money(precioMostrar)}</div>
        ${showStock ? `<div class="badge ${low?'badge-danger':'badge-ok'}" style="margin-top:2px;font-size:11px">Stock ${fmt(p.stock)}</div>` : ''}
      </div>
    </div>`;
  }

  function render(q){
    const ql = (q||'').trim().toLowerCase();
    current = __filtrarProductosPrioridad(q);
    // Live update externo (por ejemplo, tabla del inventario)
    if(cfg.onLiveUpdate){ try{ cfg.onLiveUpdate(current); }catch(e){} }

    if(!ql){
      list.classList.remove('open');
      list.innerHTML = '';
      active = -1;
      return;
    }
    if(!current.length){
      list.innerHTML = `<div class="ac-empty">Sin resultados 🐾</div>`;
      list.classList.add('open');
      active = -1;
      return;
    }
    const subset = current.slice(0, maxResults);
    active = 0;
    list.innerHTML = subset.map((p,i)=>renderItem(p, i===0, ql)).join('')
      + (current.length > maxResults
          ? `<div class="ac-more">+${current.length - maxResults} más… afina la búsqueda</div>`
          : '');
    list.classList.add('open');
  }

  function updateActiveVisuals(){
    const items = list.querySelectorAll('.ac-item');
    items.forEach((el,i)=>el.classList.toggle('active', i===active));
    if(active >= 0 && items[active] && typeof items[active].scrollIntoView === 'function'){
      items[active].scrollIntoView({block:'nearest'});
    }
  }

  function pick(p, isScanner){
    if(!p) return;
    try{ if(cfg.onSelect) cfg.onSelect(p, isScanner === true); }catch(e){ console.error('onSelect error', e); }
    if(cfg.clearOnSelect !== false){
      input.value = '';
      list.classList.remove('open');
      list.innerHTML = '';
      current = [];
      active = -1;
      if(cfg.onLiveUpdate){ try{ cfg.onLiveUpdate(__filtrarProductosPrioridad('')); }catch(e){} }
    }
  }

  // Detecta exact match en código o barras (modo escáner)
  function tryScannerExact(q){
    const qn = (q||'').trim().toLowerCase();
    if(qn.length < 3) return null; // evita disparar con "1" mientras se tipea "100"
    const list = DB.productos || [];
    // Prioriza barras (escáner físico) antes que código
    return list.find(p => String(p.barras||'').toLowerCase() === qn)
        || list.find(p => String(p.codigo||'').toLowerCase() === qn)
        || null;
  }

  // === Eventos ===
  input.addEventListener('input', ()=>{
    clearTimeout(debTimer);
    const q = input.value;
    debTimer = setTimeout(()=>{
      if(cfg.scannerMode){
        const exact = tryScannerExact(q);
        if(exact){ pick(exact, true); return; }
      }
      render(q);
    }, cfg.debounceMs || 60);
  });

  input.addEventListener('keydown', (e)=>{
    const items = list.querySelectorAll('.ac-item');
    if(e.key === 'ArrowDown'){
      if(!items.length) return;
      e.preventDefault();
      active = Math.min(active + 1, items.length - 1);
      updateActiveVisuals();
    } else if(e.key === 'ArrowUp'){
      if(!items.length) return;
      e.preventDefault();
      active = Math.max(active - 1, 0);
      updateActiveVisuals();
    } else if(e.key === 'Enter'){
      // Si hay exactamente uno en current, elegirlo; si no, usar el activo
      if(!current.length) return;
      e.preventDefault();
      const idx = active >= 0 ? active : 0;
      pick(current[idx]);
    } else if(e.key === 'Escape'){
      e.preventDefault();
      list.classList.remove('open');
    }
  });

  input.addEventListener('focus', ()=>{
    if(input.value.trim()) render(input.value);
  });

  list.addEventListener('click', (e)=>{
    const item = e.target.closest('.ac-item');
    if(!item) return;
    const id = item.dataset.id;
    const p = (DB.productos||[]).find(x => x.id === id);
    if(p) pick(p);
  });

  // Refresca instancias activas (evita acumular muertas)
  window.__acInstances = window.__acInstances.filter(x => x.list && x.list.isConnected);
  const instance = {
    input, list,
    refresh: ()=> render(input.value),
    clear:   ()=>{ input.value=''; render(''); },
    focus:   ()=> input.focus(),
    destroy: ()=>{ list.classList.remove('open'); list.innerHTML=''; }
  };
  window.__acInstances.push(instance);
  window.__acByInput[cfg.inputId] = instance;
  return instance;
}

/* ---- Escáner de código de barras por cámara ---- */
let _scanner=null, _scanLast={code:'',t:0}, _scanCount=0;
function stopScannerIfAny(){
  if(_scanner){const s=_scanner;_scanner=null;try{s.stop().then(()=>{try{s.clear()}catch(e){}}).catch(()=>{});}catch(e){}}
}
function abrirEscaner(){
  if(typeof Html5Qrcode==='undefined'){toast('El escáner no se pudo cargar (revisa tu conexión a internet)','err');return;}
  _scanCount=0;_scanLast={code:'',t:0};
  openModal(`<div class="p-4">
    <div class="flex items-center justify-between mb-2">
      <h3 style="font-size:20px">📷 Escanear código de barras</h3>
      <button class="chip" onclick="cerrarEscaner()">✕</button>
    </div>
    <div style="color:var(--muted);font-size:14px" class="mb-3">Apunta la cámara al código de barras. El producto se agrega solo al carrito. Puedes escanear varios seguidos.</div>
    <div id="qrReader" style="width:100%;border-radius:14px;overflow:hidden;background:#000;min-height:200px"></div>
    <div id="scanMsg" class="card p-3 mt-3 text-center" style="background:var(--surface-2);font-weight:600;min-height:54px;display:flex;align-items:center;justify-content:center">Iniciando cámara…</div>
    <div id="scanList" class="flex flex-col gap-1 mt-2" style="max-height:20vh;overflow:auto"></div>
    <button class="btn btn-primary btn-block mt-3" onclick="cerrarEscaner()">✅ Listo</button>
  </div>`);
  let fmts;
  try{const F=Html5QrcodeSupportedFormats;fmts=[F.EAN_13,F.EAN_8,F.UPC_A,F.UPC_E,F.CODE_128,F.CODE_39,F.CODE_93,F.ITF,F.CODABAR];}catch(e){fmts=undefined;}
  const config={fps:10,qrbox:{width:260,height:170},aspectRatio:1.4};
  if(fmts)config.formatsToSupport=fmts;
  _scanner=new Html5Qrcode("qrReader",{verbose:false});
  _scanner.start({facingMode:"environment"},config,onScanResult,()=>{})
    .then(()=>{const m=$('#scanMsg');if(m)m.textContent='Buscando código de barras…';})
    .catch(err=>{
      console.error('escaner',err);
      const m=$('#scanMsg');
      const seguro=window.isSecureContext;
      if(m)m.innerHTML='<span style="color:var(--danger);font-weight:600">No se pudo abrir la cámara.</span><br><span style="font-size:13px;color:var(--text-soft)">'+
        (seguro?'Revisa que el navegador tenga permiso para usar la cámara.':'El escáner por cámara necesita abrir la página por HTTPS o en localhost. El lector USB sí funciona escribiendo en el buscador.')+'</span>';
    });
}
function onScanResult(text){
  const code=String(text).trim();const now=Date.now();
  if(code===_scanLast.code && now-_scanLast.t<1800)return; // evita lecturas repetidas del mismo código
  _scanLast={code,t:now};
  // Búsqueda O(1) por índice Map (antes era O(n) con .find sobre todo el array)
  const p=findProductoExact(code);
  const msg=$('#scanMsg');
  if(p){
    addToCart(p.id);_scanCount++;
    if(msg)msg.innerHTML=`✅ <b>${esc(p.nombre)}</b> · ${money(p.precio)}`;
    const li=$('#scanList');
    if(li){const row=document.createElement('div');row.className='flex justify-between items-center p-2';
      row.style.cssText='background:var(--success-soft);border-radius:10px';
      row.innerHTML=`<span style="font-weight:600">${esc(p.nombre)}</span><b style="color:var(--success)">＋1</b>`;li.prepend(row);}
  }else{
    if(msg)msg.innerHTML=`⚠️ Código <b>${esc(code)}</b> no está en el inventario <button class="chip" style="margin-left:8px" onclick="crearDesdeEscaner()">➕ Crear producto</button>`;
  }
}
function crearDesdeEscaner(){
  const code=_scanLast.code;cerrarEscaner();formProducto();
  setTimeout(()=>{const b=$('#p_barras');if(b)b.value=code;const n=$('#p_nombre');if(n)n.focus();},170);
}
function cerrarEscaner(){const n=_scanCount;closeModal();if(n>0)toast(n+' producto(s) agregados al carrito','ok');}

function addToCart(id){
  const p=DB.productos.find(x=>x.id===id);if(!p)return;
  const ex=cart.find(c=>c.id===id);
  if(ex){ex.cantidad++;}
  else cart.push({id:p.id,codigo:p.codigo,nombre:p.nombre,precio:getPrecioPara(saleClient,p),costo:num(p.costo),cantidad:1,desc:0,precioManual:false});
  beep();renderCart();
}

/* ----------------------------------------------------------------------
 * addToCartConCantidad(prodId)
 * Flujo manual: abre un MODAL PROFESIONAL para preguntar la cantidad,
 * valida y agrega al carrito.
 *
 *   • Cancel del modal           → NO agrega el producto (aborta limpio)
 *   • Cantidad vacía              → cantidad por defecto 1
 *   • No numérico o cantidad ≤ 0 → toast 'Cantidad inválida' y aborta
 *   • Supera stock disponible    → toast 'Stock insuficiente' y aborta
 *   • Si el producto ya está en el carrito → SUMA a la línea existente
 *     (no crea fila duplicada)
 *
 * "Stock disponible" se calcula como (stock real − lo ya cargado en el
 * carrito), para evitar sobreventa al sumar a una línea existente.
 *
 * NOTA: el escáner físico (cámara/pistola) sigue usando addToCart() rápido,
 * sin modal — esto sólo aplica a selección manual desde el autocomplete.
 * -------------------------------------------------------------------- */
function addToCartConCantidad(prodId){
  const p = DB.productos.find(x => x.id === prodId);
  if(!p) return;
  // Abre el modal pro. El callback recibe la cantidad final ya validada
  // (mayor a 0 y dentro del stock disponible).
  modalCantidad(p, function(cantidad){
    const enCarrito = cart.find(c => c.id === prodId);
    if(enCarrito){
      enCarrito.cantidad = num(enCarrito.cantidad) + cantidad;
    }else{
      cart.push({
        id: p.id,
        codigo: p.codigo,
        nombre: p.nombre,
        precio: getPrecioPara(saleClient, p),
        costo: num(p.costo),
        cantidad: cantidad,
        desc: 0,
        precioManual: false
      });
    }
    beep();
    renderCart();
  });
}

/* ----------------------------------------------------------------------
 * modalCantidad(producto, onConfirm)
 * Modal estilizado para pedir la cantidad al agregar un producto al carrito.
 * Reutiliza el sistema de modales existente (openModal / closeModal) y
 * todas las clases CSS del POS (.card, .btn, .input, .key, .badge) y
 * variables CSS (--surface, --primary, --muted, etc.) → herencia automática
 * de modo oscuro y diseño consistente.
 *
 * Animación de entrada: heredada de .modal-box (@keyframes fade + pop ya
 * definidos en el CSS principal).
 *
 * Validaciones in-line:
 *   - Cantidad < 1 o no numérica → bloquea botón Agregar + toast al confirmar
 *   - Cantidad > stock disponible → bloquea botón Agregar + toast
 *   - Stock disponible considera lo YA cargado en el carrito (anti-sobreventa)
 *
 * Atajos de teclado:
 *   - Enter → confirma
 *   - Esc   → cierra (manejado por closeModal vía click en backdrop)
 * -------------------------------------------------------------------- */
function modalCantidad(p, onConfirm){
  // Stock disponible (descontando lo que ya está en el carrito)
  const enCarrito = (typeof cart !== 'undefined') ? cart.find(c => c.id === p.id) : null;
  const yaEnCarrito = enCarrito ? num(enCarrito.cantidad) : 0;
  const stockDisp = Math.max(0, num(p.stock) - yaEnCarrito);
  const low = num(p.stock) <= num(p.stockMin);

  // Precio con cliente especial si aplica
  let precioMostrar = num(p.precio), especial = false;
  try{
    if(typeof getPrecioPara === 'function' && typeof saleClient !== 'undefined'){
      const pc = getPrecioPara(saleClient, p);
      precioMostrar = pc;
      if(typeof tienePrecioEspecial === 'function' && tienePrecioEspecial(saleClient, p)){
        especial = true;
      }
    }
  }catch(e){}

  // Inicial del producto para el avatar
  const inicial = String(p.nombre || '?').trim().charAt(0).toUpperCase() || '?';

  openModal(`<div class="p-5" style="text-align:center">
    <!-- Icono superior -->
    <div style="width:72px;height:72px;border-radius:50%;background:var(--primary-soft);
                color:var(--primary);display:flex;align-items:center;justify-content:center;
                font-size:36px;margin:0 auto 14px;border:3px solid var(--primary);
                box-shadow:0 4px 12px rgba(29,78,216,.18)">
      🛒
    </div>

    <!-- Título -->
    <h3 style="font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-0.01em">
      Agregar producto
    </h3>
    <div style="color:var(--muted);font-size:13px;margin-bottom:18px">
      Selecciona la cantidad para el borrador
    </div>

    <!-- Card del producto -->
    <div class="card p-4" style="background:var(--surface-2);box-shadow:none;
                                  border:1.5px solid var(--border);text-align:left;
                                  margin-bottom:18px">
      <div style="display:flex;gap:12px;align-items:center">
        <div style="width:54px;height:54px;border-radius:12px;
                    background:linear-gradient(135deg,var(--primary-soft),var(--surface));
                    color:var(--primary);display:flex;align-items:center;justify-content:center;
                    font-size:24px;font-weight:800;flex-shrink:0;
                    border:2px solid var(--primary)">
          ${esc(inicial)}
        </div>
        <div style="min-width:0;flex:1">
          <div style="font-weight:800;font-size:16.5px;line-height:1.25;
                      overflow:hidden;text-overflow:ellipsis">${esc(p.nombre)}</div>
          <div style="display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap">
            <span style="font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;
                         color:var(--muted);font-weight:700">${esc(p.codigo||'—')}</span>
            <span class="badge ${low?'badge-danger':'badge-ok'}"
                  style="font-size:11px;padding:3px 9px">Stock ${fmt(p.stock)}</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${especial ? `<div style="font-size:11px;color:var(--muted);text-decoration:line-through">${money(p.precio)}</div>` : ''}
          <div style="font-weight:800;font-size:18px;color:${especial?'#7c3aed':'var(--primary)'};white-space:nowrap">
            ${especial?'💎 ':''}${money(precioMostrar)}
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">por unidad</div>
        </div>
      </div>
    </div>

    <!-- Selector de cantidad -->
    <label style="display:block;font-size:12px;font-weight:700;color:var(--muted);
                  text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;text-align:left">
      Cantidad
    </label>
    <div style="display:flex;gap:8px;align-items:stretch;margin-bottom:8px">
      <button class="key" style="flex:0 0 64px;font-size:28px;padding:0;line-height:1"
              onclick="__mcAj(-1)" type="button" aria-label="Disminuir cantidad">−</button>
      <input class="input" id="mcCant" type="number" inputmode="numeric" min="1"
             value="1" oninput="__mcValidate()"
             onkeydown="if(event.key==='Enter'){event.preventDefault();__mcConfirm()}"
             style="text-align:center;font-size:28px;font-weight:800;flex:1;padding:14px 12px">
      <button class="key" style="flex:0 0 64px;font-size:28px;padding:0;line-height:1"
              onclick="__mcAj(+1)" type="button" aria-label="Aumentar cantidad">+</button>
    </div>
    <div id="mcHint" style="font-size:13px;color:var(--muted);margin-bottom:20px;
                            min-height:18px;transition:color .15s">
      ${stockDisp <= 0
        ? `<span style="color:var(--warn,#d97706)">⚠ Sin stock — puedes agregarlo igual (venta por encargo)</span>`
        : `Stock disponible: <b id="mcDisp">${fmt(stockDisp)}</b> ${stockDisp===1?'unidad':'unidades'}` +
          (yaEnCarrito>0?` <span style="color:var(--muted);font-size:12px">· ya tienes ${fmt(yaEnCarrito)} en el carrito</span>`:'')
      }
    </div>

    <!-- Botones -->
    <div class="flex gap-3">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary btn-block" id="mcAgregar" onclick="__mcConfirm()">
        ＋ Agregar al borrador
      </button>
    </div>
  </div>`);

  // Estado del modal en window para los handlers inline
  window.__mcState = { stockDisp, onConfirm, p };

  // Auto-foco y selección del input para escritura inmediata
  setTimeout(()=>{
    const i = document.getElementById('mcCant');
    if(i){ i.focus(); try{ i.select(); }catch(e){} }
  }, 60);
}

// Ajusta la cantidad con +/- (no permite bajar de 1 ni subir indefinidamente).
function __mcAj(delta){
  const i = document.getElementById('mcCant');
  if(!i) return;
  const cur = parseInt(i.value, 10);
  const next = (isNaN(cur) ? 1 : cur) + delta;
  i.value = Math.max(1, next);
  __mcValidate();
  i.focus();
}

// Valida en vivo: cambia color/mensaje del hint y habilita/deshabilita el botón.
// IMPORTANTE: superar el stock NO bloquea. Es solo una advertencia visual
// (venta por encargo / pedidos futuros / stock no cargado aún son casos válidos).
// El único bloqueo real es cantidad numérica ≤ 0.
function __mcValidate(){
  const st = window.__mcState || {};
  const i = document.getElementById('mcCant');
  const hint = document.getElementById('mcHint');
  const btn = document.getElementById('mcAgregar');
  if(!i || !hint || !btn) return;
  const raw = String(i.value).trim();
  const cant = raw === '' ? 1 : parseInt(raw, 10);
  if(raw === ''){
    // vacío permitido (al confirmar caerá a 1)
    btn.disabled = false; btn.style.opacity = '1';
    hint.style.color = 'var(--muted)';
    return;
  }
  if(isNaN(cant) || cant <= 0){
    btn.disabled = true; btn.style.opacity = '.5';
    hint.innerHTML = '⚠ Cantidad inválida';
    hint.style.color = 'var(--danger)';
    return;
  }
  const subtotalU = num(getPrecioPara(saleClient, st.p)) * cant;
  if(cant > st.stockDisp){
    // Advertencia, NO bloqueo: permite venta sobre stock (encargo / faltante).
    btn.disabled = false; btn.style.opacity = '1';
    hint.innerHTML = `⚠ Excede el stock disponible (${fmt(st.stockDisp)}) — `
      + `igual puedes agregarlo · Subtotal: <b style="color:var(--primary)">${money(subtotalU)}</b>`;
    hint.style.color = 'var(--warn, #d97706)';
    return;
  }
  btn.disabled = false; btn.style.opacity = '1';
  hint.innerHTML = `Subtotal: <b style="color:var(--primary)">${money(subtotalU)}</b> · `
    + `Stock disponible: <b>${fmt(st.stockDisp)}</b>`;
